<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>首席吸猫官 Demo</title>
  <link rel="preload" as="image" href="assets/cats/game-normalized/cat-calico-wink.webp" type="image/webp">
  <link rel="preload" as="image" href="assets/cats/game-normalized/cat-tabby-standing.webp" type="image/webp">
  <link rel="preload" as="image" href="assets/cats/game-normalized/cat-gray-round.webp" type="image/webp">
  <link rel="preload" as="image" href="assets/cats/game-normalized/cat-orange-sleek-game.webp" type="image/webp">
  <link rel="preload" as="image" href="assets/cats/game-normalized/cat-cow-game.webp" type="image/webp">
  <link rel="preload" as="image" href="assets/cats/game-normalized/cat-mainecoon-gray.webp" type="image/webp">
  <style>
    :root {
      --paper: #fffaf1;
      --ink: #2d251f;
      --muted: #766556;
      --line: #ecd6b9;
      --can: #ff6656;
      --yellow: #ffc94f;
      --green: #55b96c;
      --blue: #539bed;
      --pink: #e37bc2;
      --red: #f35e4f;
      --soil: #99754e;
      --grass: #68bf76;
      --shadow: 0 18px 38px rgba(72, 45, 22, .18);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      background:
        radial-gradient(circle at 12% 8%, rgba(255, 207, 89, .42), transparent 25%),
        radial-gradient(circle at 88% 10%, rgba(83, 155, 237, .18), transparent 24%),
        radial-gradient(circle at 50% 106%, rgba(85, 185, 108, .2), transparent 34%),
        linear-gradient(160deg, #fff1de 0%, #f6ead3 46%, #dcebd4 100%);
      display: flex;
      justify-content: center;
      padding: 12px 10px 16px;
      letter-spacing: 0;
      user-select: none;
    }

    button {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(440px, 100%);
      display: grid;
      gap: 10px;
    }

    .top {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
    }

    h1 {
      margin: 0;
      font-size: 29px;
      line-height: 1;
    }

    .sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .score {
      min-width: 84px;
      padding: 9px 10px;
      border-radius: 10px;
      background: rgba(255, 253, 247, .92);
      border: 1px solid rgba(234, 219, 196, .95);
      box-shadow: 0 8px 18px rgba(70, 50, 25, .1);
      text-align: center;
    }

    .score span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 1000;
    }

    .score strong {
      display: block;
      margin-top: 2px;
      font-size: 24px;
      line-height: 1;
    }

    .career-card {
      border-radius: 10px;
      background: rgba(255, 253, 247, .92);
      border: 1px solid rgba(234, 219, 196, .95);
      box-shadow: 0 8px 18px rgba(70, 50, 25, .1);
      padding: 8px 10px;
      display: grid;
      gap: 7px;
    }

    .career-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .rank-block {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .rank-block span,
    .xp-text {
      color: var(--muted);
      font-size: 11px;
      font-weight: 1000;
    }

    .rank-block strong {
      font-size: 16px;
      line-height: 1.1;
    }

    .career-fish {
      min-width: 82px;
      padding: 5px 8px;
      border-radius: 999px;
      color: #fff;
      background: var(--yellow);
      font-size: 12px;
      font-weight: 1000;
      text-align: center;
      box-shadow: inset 0 -2px rgba(120, 80, 20, .12);
    }

    .xp-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .xp-bar {
      height: 8px;
      border-radius: 999px;
      background: #dccdb7;
      overflow: hidden;
      box-shadow: inset 0 -2px rgba(80, 55, 30, .08);
    }

    .xp-fill {
      display: block;
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--green), var(--blue));
      transition: width .24s ease;
    }

    .mission-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .mission {
      min-height: 34px;
      border-radius: 8px;
      padding: 5px 6px;
      background: rgba(244, 236, 222, .78);
      border: 1px solid rgba(222, 204, 176, .9);
      color: var(--muted);
      font-size: 10px;
      font-weight: 1000;
      line-height: 1.18;
      text-align: center;
      display: grid;
      place-items: center;
    }

    .mission.done {
      color: #fff;
      background: var(--green);
      border-color: rgba(255, 255, 255, .85);
    }

    .career-foot {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .career-tag {
      min-height: 26px;
      border-radius: 8px;
      background: rgba(255, 212, 95, .2);
      border: 1px solid rgba(224, 183, 77, .46);
      color: #6a5630;
      display: grid;
      place-items: center;
      padding: 4px 6px;
      font-size: 10px;
      font-weight: 1000;
      line-height: 1.15;
      text-align: center;
    }

    .hud {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .level-card {
      border-radius: 10px;
      background:
        linear-gradient(180deg, rgba(255, 252, 244, .96), rgba(255, 243, 222, .94));
      border: 1px solid rgba(236, 214, 185, .98);
      box-shadow: 0 10px 22px rgba(70, 43, 20, .12);
      padding: 9px 10px;
      display: grid;
      gap: 8px;
    }

    .level-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .level-name {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .level-name span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 1000;
    }

    .level-name strong {
      font-size: 17px;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .goal-pill {
      min-width: 82px;
      max-width: 54%;
      padding: 6px 8px;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(135deg, #50af62, #3f9253);
      text-align: center;
      font-size: 12px;
      font-weight: 1000;
      line-height: 1.15;
    }

    .wave-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .wave-track {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .wave-dot {
      height: 8px;
      flex: 1;
      border-radius: 999px;
      background: rgba(155, 125, 89, .24);
      box-shadow: inset 0 -2px rgba(80, 55, 30, .08);
    }

    .wave-dot.done { background: linear-gradient(90deg, #5fc879, #3fa458); }
    .wave-dot.now { background: linear-gradient(90deg, #ffad59, var(--can)); }

    .fish-pill {
      min-width: 68px;
      padding: 5px 8px;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(145deg, #ffce55, #e2a72c);
      text-align: center;
      font-size: 12px;
      font-weight: 1000;
      box-shadow: inset 0 -2px rgba(120, 80, 20, .12);
    }

    .route {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #dccdb7;
      border: 2px solid #fff;
      box-shadow: 0 2px 5px rgba(70, 50, 25, .1);
    }

    .dot.done { background: var(--green); }
    .dot.now {
      width: 18px;
      background: var(--can);
    }

    .stat {
      min-height: 58px;
      border-radius: 10px;
      background: rgba(255, 253, 247, .92);
      border: 1px solid rgba(234, 219, 196, .95);
      box-shadow: 0 8px 18px rgba(70, 50, 25, .1);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 6px;
    }

    .stat span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 1000;
    }

    .stat strong {
      display: block;
      margin-top: 2px;
      font-size: 22px;
      line-height: 1;
    }

    .can-stat strong { color: var(--can); }
    .cat-stat strong { color: var(--green); }
    .tide-stat strong { color: var(--pink); }

    .tip {
      width: 100%;
      min-height: 32px;
      padding: 7px 14px;
      border-radius: 999px;
      color: #fff;
      background: rgba(47, 41, 35, .92);
      display: grid;
      place-items: center;
      text-align: center;
      font-size: 13px;
      font-weight: 1000;
      line-height: 1.25;
      box-shadow: 0 6px 14px rgba(41, 32, 20, .16);
      pointer-events: none;
    }

    .tip.hot { background: var(--can); }
    .tip.tip-bump { animation: tipPop .24s ease; }

    .yard.level-sun {
      background:
        radial-gradient(ellipse at 20% 9%, rgba(255, 239, 172, .58), transparent 22%),
        radial-gradient(ellipse at 82% 66%, rgba(109, 188, 225, .18), transparent 28%),
        linear-gradient(180deg, rgba(255, 224, 153, .28) 0 20%, transparent 20%),
        linear-gradient(145deg, #9bdc8d 0%, #75c97c 52%, #5ba96a 100%);
    }

    .yard.level-corner {
      background:
        radial-gradient(ellipse at 18% 12%, rgba(255, 228, 152, .5), transparent 24%),
        radial-gradient(ellipse at 76% 74%, rgba(255, 156, 124, .14), transparent 24%),
        linear-gradient(90deg, rgba(151, 105, 64, .2) 0 18%, transparent 18%),
        linear-gradient(145deg, #91d8a0 0%, #6fc47a 56%, #589e65 100%);
    }

    .yard.level-alley {
      background:
        radial-gradient(ellipse at 45% 45%, rgba(255, 229, 142, .26), transparent 22%),
        radial-gradient(ellipse at 80% 20%, rgba(83, 155, 237, .13), transparent 24%),
        linear-gradient(90deg, rgba(117, 91, 64, .24) 0 17%, transparent 17% 83%, rgba(117, 91, 64, .24) 83%),
        linear-gradient(145deg, #88ca8d 0%, #6cb879 58%, #559765 100%);
    }

    .yard.level-rooftop {
      background:
        radial-gradient(ellipse at 20% 10%, rgba(255, 232, 166, .34), transparent 22%),
        linear-gradient(90deg, rgba(255,255,255,.15) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255,255,255,.15) 1px, transparent 1px),
        linear-gradient(145deg, #c39a68 0%, #9abd71 62%, #70a866 100%);
      background-size: 28px 28px, 28px 28px, auto;
    }

    .yard.level-rain {
      background:
        radial-gradient(ellipse at 80% 12%, rgba(255, 255, 255, .18), transparent 22%),
        repeating-linear-gradient(115deg, rgba(255,255,255,.18) 0 2px, transparent 2px 20px),
        linear-gradient(145deg, #8fb8aa 0%, #72a98d 58%, #567e69 100%);
    }

    .yard {
      height: clamp(330px, calc(100svh - 334px), 510px);
      min-height: 0;
      border-radius: 16px;
      background:
        radial-gradient(circle at 24% 18%, rgba(255, 217, 111, .34), transparent 15%),
        radial-gradient(circle at 78% 74%, rgba(255, 255, 255, .3), transparent 13%),
        linear-gradient(145deg, #98d989 0%, #73c87b 56%, #5aa569 100%);
      border: 1px solid rgba(93, 139, 75, .62);
      box-shadow:
        inset 0 1px rgba(255, 255, 255, .35),
        var(--shadow);
      position: relative;
      overflow: hidden;
      touch-action: manipulation;
      cursor: crosshair;
    }

    .yard::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(136, 95, 56, .5) 0 40px, rgba(172, 130, 78, .28) 41px 56px, transparent 57px),
        repeating-linear-gradient(90deg, rgba(89, 58, 34, .32) 0 2px, transparent 2px 43px),
        radial-gradient(ellipse at 51% 106%, rgba(224, 183, 118, .86) 0 22%, rgba(190, 143, 86, .44) 23%, transparent 45%),
        radial-gradient(ellipse at 34% 70%, rgba(255, 231, 153, .18), transparent 23%),
        radial-gradient(circle at 12% 81%, rgba(52, 101, 57, .36), transparent 12%),
        radial-gradient(circle at 88% 24%, rgba(52, 105, 62, .25), transparent 13%),
        repeating-linear-gradient(36deg, rgba(255, 255, 255, .08) 0 2px, transparent 2px 31px);
      pointer-events: none;
    }

    .yard::after {
      content: "";
      position: absolute;
      left: -10%;
      right: -10%;
      bottom: -18px;
      height: 95px;
      background:
        radial-gradient(ellipse at 18% 74%, rgba(35, 105, 59, .66) 0 18px, transparent 19px),
        radial-gradient(ellipse at 31% 69%, rgba(70, 151, 76, .58) 0 23px, transparent 24px),
        radial-gradient(ellipse at 52% 76%, rgba(44, 122, 68, .54) 0 19px, transparent 20px),
        radial-gradient(ellipse at 74% 71%, rgba(70, 151, 76, .52) 0 23px, transparent 24px),
        radial-gradient(ellipse at 88% 76%, rgba(35, 105, 59, .58) 0 19px, transparent 20px);
      opacity: .72;
      pointer-events: none;
      z-index: 3;
    }

    .patio {
      position: absolute;
      right: -24px;
      bottom: -18px;
      width: 188px;
      height: 128px;
      border-radius: 54% 0 0 0;
      background:
        linear-gradient(90deg, rgba(255,255,255,.12) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255,255,255,.12) 1px, transparent 1px),
        radial-gradient(ellipse at 30% 24%, rgba(255, 229, 172, .2), transparent 38%),
        linear-gradient(145deg, #cda36d, #9d7448);
      background-size: 28px 28px;
      box-shadow:
        inset 10px 12px rgba(255, 235, 190, .18),
        -18px -10px 30px rgba(63, 92, 45, .13);
      opacity: .92;
      pointer-events: none;
    }

    .bush {
      position: absolute;
      width: 86px;
      height: 58px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 28% 44%, #4f9b5a 0 22px, transparent 23px),
        radial-gradient(circle at 52% 33%, #5cab62 0 27px, transparent 28px),
        radial-gradient(circle at 76% 48%, #438f4f 0 23px, transparent 24px);
      pointer-events: none;
    }

    .bush.a { left: -18px; top: 18px; }
    .bush.b { right: -20px; top: 120px; transform: scale(.9); }
    .bush.c { left: 18px; bottom: 28px; transform: scale(.78); }

    .rock {
      position: absolute;
      width: 58px;
      height: 38px;
      border-radius: 55% 45% 46% 54%;
      background: linear-gradient(145deg, #9c927f, #6f685c);
      box-shadow: inset -8px -8px rgba(50, 45, 40, .12);
      opacity: .82;
      pointer-events: none;
    }

    .rock.a { left: 43%; top: 26%; transform: rotate(-12deg); }
    .rock.b { left: 32%; top: 62%; transform: rotate(8deg) scale(.86); }

    .hotspot {
      position: absolute;
      left: 50%;
      top: 48%;
      width: 118px;
      height: 118px;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      border: 2px dashed rgba(255, 255, 255, .86);
      background: rgba(255, 212, 95, .14);
      box-shadow: 0 0 0 10px rgba(255, 212, 95, .08);
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 13px;
      font-weight: 1000;
      text-shadow: 0 2px 8px rgba(40, 60, 30, .35);
      pointer-events: none;
      animation: pulse 1s ease-in-out infinite alternate;
      z-index: 2;
    }

    .hotspot.hide { display: none; }

    .hotspot.hint {
      display: grid;
      border-color: rgba(255, 255, 255, .95);
      background: rgba(255, 212, 95, .28);
      box-shadow:
        0 0 0 10px rgba(255, 212, 95, .12),
        0 0 28px rgba(255, 212, 95, .55);
      animation: hintFlash .48s ease-in-out infinite alternate;
    }

    .yard-hud {
      display: none;
    }

    .can-layer,
    .cats-layer,
    .fx-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .can {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: 46px;
      height: 38px;
      transform: translate(-50%, -50%);
      border-radius: 9px 9px 15px 15px;
      background:
        radial-gradient(circle at 30% 32%, rgba(255, 255, 255, .42), transparent 18%),
        linear-gradient(180deg, #ff9e8e, var(--can));
      border: 2px solid rgba(150, 40, 30, .45);
      box-shadow:
        inset 0 -5px rgba(160, 50, 39, .12),
        0 12px 20px rgba(50, 35, 18, .22);
      z-index: 5;
    }

    .can::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -7px;
      width: 42px;
      height: 12px;
      transform: translateX(-50%);
      border-radius: 50%;
      background:
        radial-gradient(ellipse at 45% 38%, #fff3df 0 28%, transparent 30%),
        #ffd2bd;
      border: 2px solid rgba(150, 40, 30, .38);
    }

    .scent {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--d);
      height: var(--d);
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background:
        radial-gradient(circle, rgba(255, 238, 160, .42), rgba(255, 170, 86, .16) 48%, transparent 70%);
      border: 2px solid rgba(255, 255, 255, .66);
      box-shadow: 0 0 28px rgba(255, 207, 89, .22);
      animation: scentPulse .65s ease-in-out infinite alternate;
      z-index: 1;
    }

    .cat-token {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: 66px;
      height: 72px;
      transform: translate(-50%, -50%) scale(var(--s, 1));
      display: grid;
      place-items: center;
      transition: filter .14s ease, transform .16s ease;
      z-index: 4;
    }

    .cat-token.running {
      filter: drop-shadow(0 0 14px rgba(255, 244, 160, .9));
      z-index: 7;
    }

    .cat-token.running .cat {
      animation: catLure .38s ease-in-out infinite alternate;
    }

    .cat-token.caught {
      animation: caught .32s ease forwards;
    }

    .cat {
      width: 66px;
      height: 72px;
      position: relative;
      display: block;
      transform: scale(var(--cat-size, 1));
      filter: drop-shadow(0 8px 7px rgba(52, 48, 26, .24));
      --mood: var(--green);
    }

    .cat.trait-calm { --mood: var(--green); }
    .cat.trait-shy { --mood: var(--blue); }
    .cat.trait-rowdy { --mood: var(--red); }
    .cat.trait-clingy { --mood: var(--pink); }

    .cat-portrait {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      border: 0;
      background: transparent;
      pointer-events: none;
      user-select: none;
      opacity: 0;
      transition: opacity .18s ease;
    }

    .cat-portrait.ready { opacity: 1; }

    .cat::after {
      content: "";
      position: absolute;
      left: 13%;
      right: 13%;
      bottom: -5px;
      height: 10px;
      border-radius: 999px;
      background: rgba(74, 56, 30, .14);
      filter: blur(3px);
      z-index: -1;
    }

    .tail {
      position: absolute;
      left: 3px;
      bottom: 17%;
      width: 20px;
      height: 36px;
      border-radius: 18px 18px 4px 18px;
      background: var(--fur);
      transform: rotate(-34deg);
      transform-origin: bottom center;
    }

    .body {
      position: absolute;
      bottom: 0;
      width: 75%;
      height: 58%;
      border-radius: 48% 48% 38% 38%;
      background: var(--fur);
      box-shadow: inset -7px -8px rgba(80, 50, 24, .08);
    }

    .belly {
      position: absolute;
      width: 34%;
      height: 30%;
      bottom: 6%;
      border-radius: 999px;
      background: rgba(255, 255, 255, .42);
    }

    .face {
      position: absolute;
      top: 5%;
      left: 50%;
      width: 61%;
      height: 55%;
      border-radius: 48% 48% 44% 44%;
      background: var(--fur);
      transform: translateX(-50%);
      box-shadow: inset -5px -6px rgba(80, 50, 24, .07);
    }

    .face::before,
    .face::after {
      content: "";
      position: absolute;
      top: -9px;
      width: 19px;
      height: 20px;
      background: var(--fur);
      clip-path: polygon(50% 0, 0 100%, 100% 100%);
    }

    .face::before {
      left: 4px;
      transform: rotate(-18deg);
    }

    .face::after {
      right: 4px;
      transform: rotate(18deg);
    }

    .eye {
      position: absolute;
      top: 43%;
      width: 5px;
      height: 7px;
      border-radius: 999px;
      background: #2f2924;
    }

    .eye.left { left: 30%; }
    .eye.right { right: 30%; }

    .nose {
      position: absolute;
      left: 50%;
      top: 58%;
      width: 7px;
      height: 5px;
      border-radius: 60% 60% 80% 80%;
      background: #e97e8d;
      transform: translateX(-50%);
    }

    .stripe {
      position: absolute;
      top: 18%;
      width: 4px;
      height: 12px;
      border-radius: 999px;
      background: var(--fur2);
    }

    .stripe.a { left: 38%; transform: rotate(-12deg); }
    .stripe.b { left: 50%; transform: translateX(-50%); }
    .stripe.c { right: 38%; transform: rotate(12deg); }

    .mood {
      position: absolute;
      right: 0;
      bottom: 3px;
      width: 22px;
      height: 22px;
      border-radius: 999px;
      display: grid;

    function startLoop() {
      cancelAnimationFrame(raf);
      clearInterval(loopTimer);
      rafHeartbeat = Date.now();
      raf = requestAnimationFrame(tick);
      loopTimer = setInterval(() => {
        if (Date.now() - rafHeartbeat > 220) {
          step(performance.now());
        }
      }, 120);
    }

    function buildWaves(level) {
      if (level.waves) return level.waves;
      const cats = level.cats;
      const split = Math.ceil(cats.length / 3);
      return [0, 1, 2].map(index => ({
        name: `第 ${index + 1} 波`,
        goal: Math.ceil(level.goal / 3),
        hotspot: index === 0 ? level.hotspot : { x: 50 + (index - 1) * 24, y: 50 + index * 8, text: `第 ${index + 1} 波` },
        tip: index === 0 ? level.tip : `第 ${index + 1} 波来了，找猫群边缘。`,
        hint: level.hint,
        cats: cats.slice(index * split, (index + 1) * split)
      }));
    }

    function loadProgress() {
      try {
        const saved = JSON.parse(localStorage.getItem(saveKey) || "{}");
        return {
          ...defaultProgress,
          ...saved,
          bestStars: { ...defaultProgress.bestStars, ...(saved.bestStars || {}) },
          missions: { ...defaultProgress.missions, ...(saved.missions || {}) }
        };
      } catch {
        return { ...defaultProgress, bestStars: {}, missions: {} };
      }
    }

    function saveProgress() {
      localStorage.setItem(saveKey, JSON.stringify(progress));
    }

    function totalStars() {
      return Object.values(progress.bestStars || {}).reduce((sum, value) => sum + value, 0);
    }

    function rankState() {
      let index = 0;
      for (let i = 0; i < ranks.length; i += 1) {
        if (progress.xp >= ranks[i].xp) index = i;
      }
      const current = ranks[index];
      const next = ranks[index + 1] || null;
      const base = current.xp;
      const span = next ? next.xp - base : 1;
      const gained = next ? progress.xp - base : span;
      return {
        current,
        next,
        ratio: next ? clamp(gained / span, 0, 1) : 1,
        text: next ? `${gained}/${span}` : "满级"
      };
    }

    function rankPerk() {
      return rankState().current;
    }

    function missionList() {
      return [
        {
          id: "firstClear",
          text: "完成首轮考核",
          done: progress.cleared >= 1,
          fish: 8,
          xp: 14
        },
        {
          id: "tide12",
          text: "单罐吸到 12 只",
          done: progress.bestTide >= 12,
          fish: 12,
          xp: 18
        },
        {
          id: "perfect3",
          text: "拿到 3 次三星",
          done: progress.perfectLevels >= 3,
          fish: 18,
          xp: 24
        }
      ];
    }

    function claimReadyRewards() {
      const rewards = [];
      missionList().forEach(mission => {
        if (mission.done && !progress.missions[mission.id]) {
          progress.missions[mission.id] = true;
          progress.totalFish += mission.fish;
          progress.xp += mission.xp;
          rewards.push(`任务 +${mission.fish}鱼干`);
        }
      });

      const claimableChests = Math.floor(totalStars() / 6);
      while ((progress.chestClaims || 0) < claimableChests) {
        progress.chestClaims = (progress.chestClaims || 0) + 1;
        const fishReward = 14 + progress.chestClaims * 2;
        progress.totalFish += fishReward;
        progress.xp += 18;
        rewards.push(`星级宝箱 +${fishReward}鱼干`);
      }

      return rewards;
    }

    function renderCareer() {
      const rank = rankState();
      const stars = totalStars();
      const claimedStars = (progress.chestClaims || 0) * 6;
      const nextChest = Math.min(6, stars - claimedStars);
      rankNameEl.textContent = rank.current.name;
      totalFishEl.textContent = `鱼干 ${progress.totalFish}`;
      xpFillEl.style.width = `${Math.round(rank.ratio * 100)}%`;
      xpTextEl.textContent = rank.text;
      missionRowEl.innerHTML = missionList().map(mission => (
        `<div class="mission ${mission.done ? "done" : ""}">${progress.missions[mission.id] ? "已领奖" : mission.done ? "可领奖" : mission.text}</div>`
      )).join("");
      rankPerkEl.textContent = `${rank.current.perk}`;
      chestStateEl.textContent = `宝箱 ${nextChest}/6`;
    }

    function applyProgressReward(stars, earnedFish, levelId) {
      const previousRank = rankState().current.name;
      const oldStars = progress.bestStars[levelId] || 0;
      const newStars = Math.max(oldStars, stars);
      const starGain = Math.max(0, newStars - oldStars);
      const xpGain = 18 + stars * 14 + Math.max(0, levelBest - 7) * 2 + starGain * 12;
      progress.xp += xpGain;
      progress.totalFish += earnedFish;
      progress.bestStars[levelId] = newStars;
      progress.bestTide = Math.max(progress.bestTide || 0, levelBest);
      progress.cleared = Math.max(progress.cleared || 0, levelIndex + 1);
      if (stars >= 3 && oldStars < 3) {
        progress.perfectLevels = (progress.perfectLevels || 0) + 1;
      }
      const claimedRewards = claimReadyRewards();
      saveProgress();
      renderCareer();
      if (claimedRewards.length) {
        popAt(50, 14, "奖励到账", "hot");
      }
      return {
        xpGain,
        promoted: previousRank !== rankState().current.name,
        rankName: rankState().current.name,
        newRecord: stars > oldStars,
        rewards: claimedRewards
      };
    }

    function setupWaveView() {
      const point = currentWave.hotspot || currentLevel.hotspot;
      const show = currentLevel.showHotspot && waveIndex === 0;
      hotspotEl.classList.toggle("hide", !show);
      hotspotEl.textContent = waveIndex === 0 ? (point.text || "开罐") : "找边缘";
      hotspotEl.style.left = `${displayX(point.x)}%`;
      hotspotEl.style.top = `${displayY(point.y)}%`;
      say(currentWave.tip || currentLevel.tip);
      renderLevelHud();
    }

    function createCat(cat, index) {
      const trait = Array.isArray(cat) ? cat[0] : cat.trait;
      const x = Array.isArray(cat) ? cat[1] : cat.x;
      const y = Array.isArray(cat) ? cat[2] : cat.y;
      const jitterX = Array.isArray(cat) ? ((index % 3) - 1) * .35 : 0;
      const jitterY = Array.isArray(cat) ? (((index + 1) % 3) - 1) * .28 : 0;
      const kinds = traitInfo[trait].kinds;
      return {
        id: `cat-${index}`,
        trait,
        kind: kinds[index % kinds.length],
        x: x + jitterX,
        y: y + jitterY,
        homeX: x,
        homeY: y,
        caught: false,
        active: false,
        burst: false,
        helped: false,
        element: null
      };
    }

    function renderCats() {
      catsLayerEl.innerHTML = "";
      cats.forEach(cat => {
        const token = document.createElement("div");
        token.className = `cat-token trait-${cat.trait}`;
        token.innerHTML = catMarkup(cat);
        catsLayerEl.appendChild(token);
        cat.element = token;
        placeCatElement(cat);
      });
    }

    function catMarkup(cat) {
      const info = traitInfo[cat.trait];
      return `
        <div class="cat kind-${cat.kind} trait-${cat.trait}" style="--cat-size:${catScale(cat)}">
          <img class="cat-portrait" src="${catImage(cat)}" data-fallback="${catFallbackImage(cat)}" alt="" draggable="false" width="192" height="192" loading="eager" decoding="async" onload="this.classList.add('ready')" onerror="this.onerror=null;this.src=this.dataset.fallback;">
          <span class="mood">${info.label}</span>
        </div>
      `;
    }

    function catImage(cat) {
      const images = {
        orangeCute: "assets/cats/game-normalized/cat-orange-cute.webp",
        calicoWink: "assets/cats/game-normalized/cat-calico-wink.webp",
        mainecoonGray: "assets/cats/game-normalized/cat-mainecoon-gray.webp",
        ragdollLong: "assets/cats/game-normalized/cat-ragdoll-long.webp",
        tabbyStanding: "assets/cats/game-normalized/cat-tabby-standing.webp",
        blackStar: "assets/cats/game-normalized/cat-black-star.webp",
        silverRound: "assets/cats/game-normalized/cat-silver-round.webp",
        grayRound: "assets/cats/game-normalized/cat-gray-round.webp",
        whiteSit: "assets/cats/game-normalized/cat-white-sit.webp",
        whiteStand: "assets/cats/game-normalized/cat-white-stand.webp",
        orangeLarge: "assets/cats/game-normalized/cat-orange-large-game.webp",
        orangeSleek: "assets/cats/game-normalized/cat-orange-sleek-game.webp",
        cowLarge: "assets/cats/game-normalized/cat-cow-game.webp",
        tabbyLarge: "assets/cats/game-normalized/cat-tabby-large-game.webp"
      };
      return images[cat.kind] || images.orangeCute;
    }

    function catFallbackImage(cat) {
      return catImage(cat).replace(".webp", ".png");
    }

    function preloadCatImages() {
      const urls = new Set();
      (currentLevel.waves || []).forEach(wave => {
        (wave.cats || []).forEach((item, index) => {
          urls.add(catImage(createCat(item, index)));
        });
      });
      urls.forEach(url => {
        if (preloadedCatImages.has(url)) return;
        const img = new Image();
        img.decoding = "async";
        img.src = url;
        preloadedCatImages.set(url, img);
      });
    }

    function catScale(cat) {
      return 1;
    }

    function displayX(x) {
      return 7 + x * .86;
    }

    function worldX(displayXValue) {
      return clamp((displayXValue - 7) / .86, 0, 100);
    }

    function displayY(y) {
      return 18 + y * .78;
    }

    function worldY(displayYValue) {
      return clamp((displayYValue - 18) / .78, 0, 100);
    }

    function displayScale() {
      return .82;
    }

    function placeCan(event) {
      if (ended) return;
      if (activeCan) {
        say("等猫潮停下，再开下一罐。");
        popAt(activeCan.x, activeCan.y, "等一下", "hot");
        return;
      }
      if (cans <= 0) {
        checkEnd();
        return;
      }

      const rect = yardEl.getBoundingClientRect();
      const visualX = clamp(((event.clientX - rect.left) / rect.width) * 100, 12, 88);
      const x = clamp(worldX(visualX), 8, 92);
      const visualY = clamp(((event.clientY - rect.top) / rect.height) * 100, 22, 90);
      const y = clamp(worldY(visualY), 8, 92);
      cans -= 1;
      activeCan = {
        x,
        y,
        age: 0,
        duration: Math.round((firstCan ? 3600 : 3000) * (1 + (rankPerk().durationBonus || 0))),
        radius: Math.round((firstCan ? currentLevel.firstRadius : currentLevel.radius) * (1 + (rankPerk().radiusBonus || 0))),
        caught: 0,
        chain: { clingy: 0, rowdy: 0, calm: 0 },
        finished: false
      };
      firstCan = false;
      hotspotEl.classList.add("hide");
      cats.forEach(cat => {
        cat.active = false;
        cat.burst = false;
        cat.helped = false;
      });
      renderCan();
      say("开罐！猫猫来了。", true);
      updateStats();
    }

    function renderCan() {
      if (!activeCan) {
        canLayerEl.innerHTML = "";
        return;
      }
      const diameter = activeCan.radius * 2 * displayScale();
      canLayerEl.innerHTML = `
        <div class="scent" style="--x:${displayX(activeCan.x)}%;--y:${displayY(activeCan.y)}%;--d:${diameter}px"></div>
        <div class="can" style="--x:${displayX(activeCan.x)}%;--y:${displayY(activeCan.y)}%"></div>
      `;
    }

    function tick(time) {
      rafHeartbeat = Date.now();
      step(time);
      raf = requestAnimationFrame(tick);
    }

    function step(time) {
      const dt = Math.min(0.032, lastTime ? (time - lastTime) / 1000 : 0.016);
      lastTime = time;

      if (activeCan && !ended) {
        activeCan.age += dt * 1000;
        spreadScent();
        moveCats(dt);
        if (activeCan.age >= activeCan.duration || shouldFinishCan()) {
          finishCan();
        }
      } else {
        idleCats(time);
      }

      cats.forEach(placeCatElement);
    }

    function spreadScent() {
      if (!activeCan) return;
      let changed = true;
      let loops = 0;

      while (changed && loops < 5) {
        changed = false;
        loops += 1;

        cats.forEach(cat => {
          if (cat.caught || cat.active) return;
          const d = distanceToCan(cat);
          const direct = cat.trait === "shy" ? activeCan.radius * .62 : activeCan.radius;
          if (d <= direct || (cat.trait === "rowdy" && d <= activeCan.radius * 1.12)) {
            activate(cat);
            changed = true;
          }
        });

        cats.filter(cat => cat.active && !cat.caught).forEach(cat => {
          if (cat.trait === "clingy") {
            cats.forEach(other => {
              if (other.caught || other.active) return;
              if (catDistance(cat, other) <= 86) {
                activate(other);
                other.helped = true;
                activeCan.chain.clingy += 1;
                changed = true;
              }
            });
          }

          if (cat.trait === "rowdy" && !cat.burst) {
            cat.burst = true;
            popAt(cat.x, cat.y, "猫潮起！", "hot");
            cats.forEach(other => {
              if (other.caught || other.active) return;
              if (catDistance(cat, other) <= 94) {
                activate(other);
                activeCan.chain.rowdy += 1;
                changed = true;
              }
            });
          }

          if (cat.trait === "calm") {
            cats.forEach(other => {
              if (other.caught || other.active || other.trait !== "shy") return;
              if (catDistance(cat, other) <= 94) {
                activate(other);
                other.helped = true;
                activeCan.chain.calm += 1;
                changed = true;
              }
            });
          }
        });
      }
    }

    function activate(cat) {
      cat.active = true;
      cat.element?.classList.add("running");
    }

    function moveCats(dt) {
      cats.forEach(cat => {
        if (cat.caught || !cat.active || !activeCan) return;
        const dx = activeCan.x - cat.x;
        const dy = activeCan.y - cat.y;
        const length = Math.max(.001, Math.hypot(dx, dy));
        const speed = traitInfo[cat.trait].speed * (currentLevel.speedScale || 1) * (cat.helped ? 1.18 : 1);
        cat.x += (dx / length) * speed * dt;
        cat.y += (dy / length) * speed * dt;

        if (distanceToCan(cat) <= 22) {
          catchCat(cat);
        }
      });
    }

    function catchCat(cat) {
      if (cat.caught || !activeCan) return;
      cat.caught = true;
      cat.active = false;
      activeCan.caught += 1;
      caught += 1;
      levelCaught += 1;
      score += 12 + Math.max(0, activeCan.caught - 3) * 3;
      best = Math.max(best, activeCan.caught);
      levelBest = Math.max(levelBest, activeCan.caught);
      if (runStats) {
        runStats.caught += 1;
        runStats.bestTide = Math.max(runStats.bestTide, activeCan.caught);
      }
      cat.element?.classList.remove("running");
      cat.element?.classList.add("caught");
      popAt(activeCan.x, activeCan.y, `+${activeCan.caught}`, activeCan.caught >= 6 ? "hot" : "good");
      updateStats();
    }

    function shouldFinishCan() {
      if (!activeCan || activeCan.age < 900) return false;
      return !cats.some(cat => cat.active && !cat.caught);
    }

    function finishCan() {
      if (!activeCan || activeCan.finished) return;
      activeCan.finished = true;
      const count = activeCan.caught;
      const insight = canInsight(activeCan);
      if (count > 0 && count < (currentLevel.minCatch || 0)) {
        cans = Math.max(0, cans - 1);
        say(`${insight || `只来 ${count} 只`}，换个位置。`, false);
        popAt(activeCan.x, activeCan.y, `少了`, "hot");
      } else if (count >= (currentLevel.refundAt || 99)) {
        cans += 1;
        say(`${insight || "猫潮爆了"}！多送一罐。`, true);
        popAt(activeCan.x, activeCan.y, `猫潮 ${count} 只`, "hot");
        if (rankPerk().name === "首席吸猫官") {
          fish += 2;
          renderLevelHud();
        }
      } else if (count >= 5) {
        say(insight || `这一罐不错，来了 ${count} 只。`, true);
      } else if (count > 0) {
        say(`${insight || `来了 ${count} 只`}。下次靠近猫群边缘。`);
      } else {
        say("太远了，猫没闻到。");
      }

      activeCan = null;
      renderCan();
      updateStats();
      checkEnd();
    }

    function canInsight(can) {
      if (!can || !can.chain) return "";
      const chain = can.chain;
      if (chain.rowdy >= 3) return `闹猫带起 ${chain.rowdy} 只，猫潮 ${can.caught} 只`;
      if (chain.clingy >= 3) return `黏人猫拉来 ${chain.clingy} 只，猫潮 ${can.caught} 只`;
      if (chain.calm >= 2) return `安静猫带出 ${chain.calm} 只胆小猫`;
      if (can.caught >= 8) return `猫潮 ${can.caught} 只`;
      return "";
    }

    function idleCats(time) {
      cats.forEach((cat, index) => {
        if (cat.caught) return;
        const sway = Math.sin(time / 900 + index * 1.7) * .04;
        cat.x = clamp(cat.x + sway, 5, 95);
      });
    }

    function placeCatElement(cat) {
      if (!cat.element) return;
      cat.element.style.setProperty("--x", `${displayX(cat.x)}%`);
      cat.element.style.setProperty("--y", `${displayY(cat.y)}%`);
      cat.element.style.setProperty("--s", cat.active ? "1.08" : "1");
    }

    function distanceToCan(cat) {
      if (!activeCan) return Infinity;
      return pixelDistance(cat.x, cat.y, activeCan.x, activeCan.y);
    }

    function catDistance(a, b) {
      return pixelDistance(a.x, a.y, b.x, b.y);
    }

    function pixelDistance(ax, ay, bx, by) {
      const rect = yardEl.getBoundingClientRect();
      const dx = (ax - bx) * rect.width * .86 / 100;
      const dy = (ay - by) * rect.height * .78 / 100;
      return Math.hypot(dx, dy);
    }

    function popAt(x, y, text, type = "") {
      const item = document.createElement("div");
      item.className = `pop ${type}`;
      item.style.setProperty("--x", `${displayX(x)}%`);
      item.style.setProperty("--y", `${displayY(y)}%`);
      item.textContent = text;
      fxLayerEl.appendChild(item);
      setTimeout(() => item.remove(), 850);
    }

    function updateStats() {
      scoreEl.textContent = score;
      cansEl.textContent = cans;
      caughtEl.textContent = `${levelCaught}/${currentLevel.goal}`;
      bestEl.textContent = levelBest;
      yardCansEl.textContent = cans;
      yardCaughtEl.textContent = `${levelCaught}/${currentLevel.goal}`;
      yardBestEl.textContent = levelBest;
    }

    function renderLevelHud() {
      levelStepEl.textContent = `第 ${levelIndex + 1}/${levels.length} 关`;
      levelNameEl.textContent = `${currentLevel.name} · 第 ${waveIndex + 1} 波`;
      const starTarget = currentLevel.starBest || Math.max(8, currentLevel.minCatch + 2 || 9);
      goalPillEl.textContent = currentLevel.minCatch ? `目标${currentLevel.goal} 单≥${currentLevel.minCatch}` : `目标${currentLevel.goal}`;
      levelStepEl.textContent = `第 ${levelIndex + 1}/${levels.length} 关｜三星: 猫潮${starTarget}+省罐`;
      routeEl.innerHTML = levels.map((_, index) => {
        const status = index < levelIndex ? "done" : index === levelIndex ? "now" : "";
        return `<span class="dot ${status}"></span>`;
      }).join("");
      waveTrackEl.innerHTML = currentLevel.waves.map((_, index) => {
        const status = index < waveIndex ? "done" : index === waveIndex ? "now" : "";
        return `<span class="wave-dot ${status}"></span>`;
      }).join("");
      fishPillEl.textContent = `鱼干 ${fish}`;
    }

    function showStrategy() {
      const point = currentWave?.hotspot || currentLevel.hotspot || { x: 50, y: 50, text: "这里" };
      hotspotEl.textContent = point.text || "试这里";
      hotspotEl.style.left = `${displayX(point.x)}%`;
      hotspotEl.style.top = `${displayY(point.y)}%`;
      hotspotEl.classList.remove("hide");
      hotspotEl.classList.add("hint");
      say(currentLevel.hint);
      popAt(point.x, point.y, "试这里", "hot");
      setTimeout(() => {
        hotspotEl.classList.remove("hint");
        if (!(currentLevel.showHotspot && waveIndex === 0)) {
          hotspotEl.classList.add("hide");
        }
      }, 1600);
    }

    function checkEnd() {
      if (levelCaught >= currentLevel.goal) {
        levelComplete();
        return;
      }
      if (cans <= 0 && !activeCan) {
        end(false, buildLoseSummary());
        return;
      }
      if (!activeCan && caught >= (currentWave.goal || Infinity)) {
        nextWave();
        return;
      }
      if (!activeCan && !cats.some(cat => !cat.caught)) {
        nextWave();
        return;
      }
    }

    function nextWave() {
      if (waveIndex >= currentLevel.waves.length - 1) {
        levelComplete();
        return;
      }
      const summary = `来了 ${caught} 只，最大猫潮 ${best}。`;
      waveIndex += 1;
      currentWave = currentLevel.waves[waveIndex];
      caught = 0;
      best = 0;
      activeCan = null;
      firstCan = false;
      showLevelToast(`${summary} 下一波来了。`);
      setTimeout(() => {
        cats = currentWave.cats.map((cat, index) => createCat(cat, waveIndex * 30 + index));
        canLayerEl.innerHTML = "";
        fxLayerEl.innerHTML = "";
        setupWaveView();
        renderCats();
        updateStats();
      }, 1050);
    }

    function levelComplete() {
      const finishedLevel = currentLevel;
      const stars = starCount();
      const earned = 6 + stars * 4 + Math.max(0, cans) + (rankPerk().fishBonus || 0);
      fish += earned;
      const reward = applyProgressReward(stars, earned, finishedLevel.name);
      if (runStats) {
        runStats.stars += stars;
        runStats.levelsCleared += 1;
        if (stars >= 3) runStats.perfectLevels += 1;
      }
      const result = buildWinSummary(stars, earned, reward, finishedLevel);
      if (levelIndex >= levels.length - 1) {
        end(true, { ...result, button: "再开一轮" });
        return;
      }
      pendingNextLevel = true;
      end(true, result);
    }

    function starCount() {
      let count = 1;
      const starBest = currentLevel.starBest || Math.max(8, currentLevel.minCatch + 2 || 9);
      if (levelBest >= starBest) count += 1;
      if (cans > 0 || levelBest >= (currentLevel.refundAt || 99)) count += 1;
      return count;
    }

    function starText(count) {
      return "★".repeat(count) + "☆".repeat(3 - count);
    }

    function starMarkup(count) {
      return [0, 1, 2].map(index => `<span class="${index < count ? "" : "dim"}">★</span>`).join("");
    }

    function buildWinSummary(stars, earned, reward, finishedLevel = currentLevel) {
      const total = totalStars();
      const nextRank = rankState().next;
      const nextLine = nextRank ? `再拿 ${Math.max(1, nextRank.xp - progress.xp)} 经验，冲 ${nextRank.name}` : "已到首席段位，继续刷满星纪录";
      return {
        title: stars >= 3 ? "三星收编！" : "猫猫到岗！",
        text: reward.promoted ? `晋升为${reward.rankName}！` : reward.newRecord ? "刷新本关纪录！" : "奖励已到账。",
        badge: stars >= 3 ? "★" : "猫",
        stars,
        chips: [
          ["吸到", `${levelCaught}/${finishedLevel.goal}`, true],
          ["猫潮", `${levelBest}`, false],
          ["鱼干", `+${earned}`, false]
        ],
        extra: reward.rewards,
        next: reward.rewards.length ? `${reward.rewards.join("，")}。${nextLine}` : `总星 ${total}/${levels.length * 3}｜${nextLine}`,
        button: levelIndex >= levels.length - 1 ? "再开一轮" : "进入下一关"
      };
    }

    function buildLoseSummary() {
      const missing = Math.max(0, currentLevel.goal - levelCaught);
      const keepFish = Math.max(1, Math.floor(levelCaught / 5));
      progress.totalFish += keepFish;
      saveProgress();
      renderCareer();
      return {
        title: `差 ${missing} 只`,
        text: `保底 +${keepFish} 鱼干。换个位置就能过。`,
        badge: "↻",
        stars: 0,
        chips: [
          ["吸到", `${levelCaught}/${currentLevel.goal}`, true],
          ["猫潮", `${levelBest}`, false],
          ["鱼干", `+${keepFish}`, false]
        ],
        extra: [],
        next: currentLevel.hint,
        button: "再试一罐"
      };
    }

    function showLevelToast(text) {
      resultBadgeEl.textContent = "✓";
      starRowEl.innerHTML = "";
      resultTitleEl.textContent = "这罐很成功";
      resultTextEl.textContent = text;
      rewardGridEl.innerHTML = "";
      nextGoalEl.textContent = "下一波猫群已经靠近。";
      dialogEl.classList.add("auto");
      overlayEl.classList.add("show");
      setTimeout(() => {
        overlayEl.classList.remove("show");
        dialogEl.classList.remove("auto");
      }, 950);
    }

    function end(win, result) {
      ended = true;
      const data = typeof result === "string" ? legacyResult(win, result) : result;
      dialogEl.classList.remove("auto", "win", "lose");
      dialogEl.classList.add(win ? "win" : "lose");
      resultBadgeEl.textContent = data.badge;
      starRowEl.innerHTML = starMarkup(data.stars);
      resultTitleEl.textContent = data.title;
      resultTextEl.textContent = data.text;
      rewardGridEl.innerHTML = resultChips(data);
      nextGoalEl.textContent = data.next;
      document.getElementById("againBtn").textContent = data.button;
      overlayEl.classList.add("show");
    }

    function legacyResult(win, text) {
      const rank = rankState();
      return {
        title: win ? "猫猫都来了" : "猫还没聚齐",
        text,
        badge: win ? "★" : "↻",
        stars: win ? 2 : 0,
        chips: [
          ["职位", rank.current.name, true],
          ["累计鱼干", progress.totalFish, false],
          ["总星级", `${totalStars()}/${levels.length * 3}`, false],
          ["最大猫潮", `${levelBest} 只`, false]
        ],
        extra: [],
        next: win ? "继续冲更高星级。" : currentLevel.hint,
        button: win ? "继续吸猫" : "再试一罐"
      };
    }

    function resultChips(data) {
      return data.chips.map(([label, value, highlight]) => `<div class="reward-chip ${highlight ? "highlight" : ""}">${label}<strong>${value}</strong></div>`).join("");
    }

    function handleAgain() {
      if (pendingNextLevel) {
        pendingNextLevel = false;
        levelIndex += 1;
        init(false);
        return;
      }
      init();
    }

    function previewSettlement() {
      const params = new URLSearchParams(location.search);
      const preview = params.get("preview");
      if (!preview) return;
      levelCaught = preview === "win" ? currentLevel.goal : Math.max(1, currentLevel.goal - 6);
      levelBest = preview === "win" ? 14 : 8;
      const reward = { xpGain: 74, promoted: preview === "win", rankName: "金牌吸猫官", newRecord: true, rewards: preview === "win" ? ["星级宝箱 +18鱼干"] : [] };
      if (preview === "win") {
        pendingNextLevel = true;
        end(true, buildWinSummary(3, 22, reward, currentLevel));
      } else if (preview === "lose") {
        end(false, buildLoseSummary());
      }
    }

    function say(text, hot = false) {
      tipEl.textContent = text;
      tipEl.classList.toggle("hot", hot);
      tipEl.classList.remove("tip-bump");
      void tipEl.offsetWidth;
      tipEl.classList.add("tip-bump");
      showFieldToast(text, hot);
    }

    function showFieldToast(text, hot = false) {
      if (!fieldToastEl || !text) return;
      clearTimeout(toastTimer);
      fieldToastEl.textContent = text.length > 22 ? `${text.slice(0, 22)}...` : text;
      fieldToastEl.classList.toggle("hot", hot);
      fieldToastEl.classList.add("visible");
      fieldToastEl.style.opacity = "1";
      fieldToastEl.style.transform = "translateY(0)";
      toastTimer = setTimeout(() => {
        fieldToastEl.classList.remove("visible", "hot");
        fieldToastEl.style.opacity = "";
        fieldToastEl.style.transform = "";
      }, hot ? 1700 : 1400);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    yardEl.addEventListener("pointerdown", placeCan);
    document.getElementById("hintBtn").addEventListener("click", showStrategy);
    document.getElementById("restartBtn").addEventListener("click", init);
    document.getElementById("againBtn").addEventListener("click", handleAgain);

    init();
    previewSettlement();
  </script>
</body>
</html>
