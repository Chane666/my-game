<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>首席吸猫官 Demo</title>

  <link rel="preload" as="image" href="assets/cats/game-normalized/cat-orange-sleek-game.webp" type="image/webp">
  <link rel="preload" as="image" href="assets/cats/game-normalized/cat-cow-game.webp" type="image/webp">
  <link rel="preload" as="image" href="assets/cats/game-normalized/cat-mainecoon-gray.webp" type="image/webp">
  <link rel="preload" as="image" href="assets/ui/menu-bg-lite.webp" type="image/webp">
  <link rel="preload" as="image" href="assets/ui/patio-bg-lite.webp" type="image/webp">

  <link rel="prefetch" as="image" href="assets/backgrounds/yard-alley.webp" type="image/webp">
  <link rel="prefetch" as="image" href="assets/backgrounds/yard-rooftop.webp" type="image/webp">
  <style>
    :root {
      --paper: #fffaf1;
      --ink: #2d251f;
      --muted: #766556;
      --line: #ecd6b9;
      --can: #ff6656;
      --yellow: #ffc94f;
      --green: #55b96c;
      --blue: #539bed;
      --pink: #e37bc2;
      --red: #f35e4f;
      --soil: #99754e;
      --grass: #68bf76;
      --shadow: 0 18px 38px rgba(72, 45, 22, .18);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      background:
        radial-gradient(circle at 12% 8%, rgba(255, 207, 89, .42), transparent 25%),
        radial-gradient(circle at 88% 10%, rgba(83, 155, 237, .18), transparent 24%),
        radial-gradient(circle at 50% 106%, rgba(85, 185, 108, .2), transparent 34%),
        linear-gradient(160deg, #fff1de 0%, #f6ead3 46%, #dcebd4 100%);
      display: flex;
      justify-content: center;
      padding: 12px 10px 16px;
      letter-spacing: 0;
      user-select: none;
    }

    button {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(440px, 100%);
      display: grid;
      gap: 10px;
    }

    .hidden {
      display: none !important;
    }

    .menu-screen {
      width: min(390px, 100%);
      min-height: calc(100svh - 12px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 8px;
      padding: 8px 4px;
      position: relative;
      overflow: hidden;
    }

    .menu-screen::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255, 252, 235, .02), rgba(255, 224, 168, .18)),
        url("assets/ui/menu-bg-lite.webp"),
        linear-gradient(160deg, #9be39a 0%, #f7cf7c 58%, #8fd8e9 100%);
      background-size: cover;
      background-position: center;
      box-shadow: var(--shadow);
      pointer-events: none;
      z-index: -2;
    }

    body.bg-ready .menu-screen::before {
      background:
        linear-gradient(180deg, rgba(255, 252, 235, .02), rgba(255, 224, 168, .18)),
        url("assets/ui/menu-bg.webp"),
        linear-gradient(160deg, #9be39a 0%, #f7cf7c 58%, #8fd8e9 100%);
      background-size: cover;
      background-position: center;
    }

    .menu-screen::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 14%, rgba(255, 255, 255, .68) 0 7px, transparent 8px),
        radial-gradient(circle at 85% 20%, rgba(255, 255, 255, .5) 0 5px, transparent 6px),
        radial-gradient(circle at 12% 78%, rgba(255, 255, 255, .44) 0 6px, transparent 7px),
        linear-gradient(180deg, rgba(70, 42, 22, .02), rgba(70, 42, 22, .18));
      pointer-events: none;
      z-index: -1;
    }

    .menu-topbar {
      display: grid;
      grid-template-columns: 1fr repeat(3, auto);
      align-items: center;
      gap: 6px;
      min-height: 38px;
    }

    .menu-profile {
      min-width: 0;
      min-height: 36px;
      padding: 4px 9px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 7px;
      color: #fff;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 255, 255, .28), transparent 26%),
        rgba(72, 47, 29, .68);
      border: 1px solid rgba(255, 255, 255, .48);
      box-shadow: 0 9px 18px rgba(56, 34, 16, .16);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      font-size: 12px;
      font-weight: 1000;
    }

    .menu-avatar {
      width: 27px;
      height: 27px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, #fff6da, #ffd36f);
      box-shadow: inset 0 -2px rgba(135, 84, 28, .13);
      font-size: 17px;
    }

    .menu-resource {
      min-width: 50px;
      min-height: 32px;
      padding: 4px 8px;
      border: 0;
      border-radius: 999px;
      display: grid;
      grid-template-columns: auto auto;
      align-items: center;
      justify-content: center;
      gap: 3px;
      color: #694726;
      background: linear-gradient(180deg, rgba(255, 252, 238, .96), rgba(255, 226, 145, .92));
      box-shadow: 0 8px 16px rgba(74, 45, 18, .14), inset 0 -2px rgba(151, 98, 27, .09);
      font-size: 12px;
      font-weight: 1000;
    }

    .menu-stage {
      min-height: 512px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 8px 8px 0;
      position: relative;
    }

    .menu-logo {
      justify-self: center;
      min-width: 286px;
      padding: 12px 18px 10px;
      border-radius: 26px;
      color: #7a3d25;
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 255, 255, .78), transparent 24%),
        linear-gradient(180deg, #fff9d9, #ffd36b 74%, #ffb24d);
      border: 3px solid rgba(255, 255, 255, .72);
      box-shadow:
        0 12px 0 #bd6b38,
        0 20px 28px rgba(79, 42, 16, .25),
        inset 0 -4px rgba(177, 92, 34, .12);
      text-align: center;
      transform: rotate(-1.4deg);
      position: relative;
    }

    .menu-logo::before,
    .menu-logo::after {
      content: "";
      position: absolute;
      top: -15px;
      width: 34px;
      height: 34px;
      border-radius: 10px 10px 6px 6px;
      background: linear-gradient(145deg, #fff3bd, #ffbd5d);
      border: 3px solid rgba(255,255,255,.72);
      z-index: -1;
    }

    .menu-logo::before {
      left: 26px;
      transform: rotate(-35deg);
    }

    .menu-logo::after {
      right: 26px;
      transform: rotate(35deg);
    }

    .menu-kicker {
      width: fit-content;
      margin: 0 auto 4px;
      padding: 4px 9px;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(145deg, #ff8d6b, #ef5d4d);
      font-size: 10px;
      font-weight: 1000;
      box-shadow: 0 5px 10px rgba(122, 54, 28, .18);
    }

    .menu-title {
      margin: 0;
      font-size: 38px;
      line-height: .96;
      letter-spacing: 0;
      text-shadow:
        0 2px rgba(255, 255, 255, .72),
        0 5px 10px rgba(125, 64, 24, .18);
    }

    .menu-subtitle {
      margin: 7px 0 0;
      color: #8b5530;
      font-size: 12px;
      line-height: 1.2;
      font-weight: 1000;
    }

    .menu-mascot {
      align-self: stretch;
      position: relative;
      display: grid;
      place-items: center;
      min-height: 246px;
    }

    .menu-cat-hero {
      width: min(255px, 74vw);
      height: min(255px, 74vw);
      border-radius: 30px;
      background: transparent;
      display: grid;
      place-items: center;
      filter: drop-shadow(0 20px 20px rgba(70, 42, 18, .24));
      animation: mascotFloat 1.9s ease-in-out infinite alternate;
      position: relative;
    }

    .menu-cat-hero img {
      width: 108%;
      height: 108%;
      object-fit: contain;
      filter: drop-shadow(0 12px 12px rgba(55, 35, 15, .16));
    }

    .menu-speech {
      position: absolute;
      right: 2px;
      top: 18px;
      max-width: 122px;
      padding: 8px 10px;
      border-radius: 16px 16px 16px 5px;
      color: #744322;
      background: rgba(255, 252, 235, .94);
      border: 2px solid rgba(255,255,255,.8);
      box-shadow: 0 10px 18px rgba(61, 35, 13, .14);
      font-size: 12px;
      font-weight: 1000;
      line-height: 1.2;
    }

    .start-wrap {
      display: grid;
      justify-items: center;
      gap: 8px;
    }

    .start-btn {
      width: min(280px, 86%);
      min-height: 66px;
      border: 0;
      border-radius: 999px;
      color: #fff;
      background:
        radial-gradient(circle at 24% 20%, rgba(255, 255, 255, .34), transparent 22%),
        linear-gradient(180deg, #ff9a65, #f25645 72%, #cf372e);
      border: 4px solid rgba(255, 245, 204, .9);
      box-shadow:
        0 9px 0 #a42f2a,
        0 18px 26px rgba(90, 36, 22, .28),
        inset 0 -4px rgba(118, 33, 28, .15);
      font-size: 24px;
      font-weight: 1000;
      cursor: pointer;
      text-shadow: 0 2px rgba(120, 45, 32, .32);
      animation: startPulse 1.2s ease-in-out infinite alternate;
    }

    .start-btn:active {
      transform: translateY(5px);
      box-shadow:
        0 4px 0 #a42f2a,
        0 12px 18px rgba(90, 36, 22, .24),
        inset 0 -3px rgba(118, 33, 28, .15);
    }

    .menu-tagline {
      padding: 5px 12px;
      border-radius: 999px;
      color: #fff8dc;
      background: rgba(79, 47, 25, .5);
      border: 1px solid rgba(255,255,255,.28);
      font-size: 11px;
      font-weight: 1000;
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }

    .menu-dock {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
      padding: 0 4px 6px;
    }

    .menu-dock-btn {
      min-width: 0;
      min-height: 76px;
      border: 0;
      border-radius: 18px;
      color: #704526;
      background:
        radial-gradient(circle at 28% 18%, rgba(255,255,255,.7), transparent 24%),
        linear-gradient(180deg, #fff7dc, #ffd56e 76%, #f6aa49);
      border: 2px solid rgba(255, 255, 255, .72);
      box-shadow: 0 8px 0 #b86836, 0 14px 18px rgba(69, 39, 17, .18);
      display: grid;
      place-items: center;
      align-content: center;
      gap: 3px;
      padding: 6px 4px 8px;
      font-size: 12px;
      font-weight: 1000;
      cursor: pointer;
      position: relative;
    }

    .menu-dock-btn:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #b86836, 0 10px 14px rgba(69, 39, 17, .16);
    }

    .dock-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      background: transparent;
      box-shadow: none;
      font-size: 0;
      line-height: 1;
    }

    .dock-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 5px 4px rgba(90, 48, 18, .16));
    }

    .dock-badge {
      position: absolute;
      right: 7px;
      top: 5px;
      min-width: 20px;
      height: 20px;
      padding: 0 5px;
      border-radius: 999px;
      color: #fff;
      background: #f35e4f;
      border: 2px solid rgba(255,255,255,.9);
      display: grid;
      place-items: center;
      font-size: 10px;
      font-weight: 1000;
    }

    .menu-modal {
      position: fixed;
      inset: 0;
      z-index: 36;
      display: none;
      place-items: end center;
      padding: 14px 12px;
      background: rgba(48, 34, 24, .44);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .menu-modal.show {
      display: grid;
    }

    .menu-panel {
      width: min(370px, 100%);
      max-height: min(620px, calc(100svh - 28px));
      overflow: auto;
      border-radius: 24px;
      padding: 12px 14px 14px;
      background:
        radial-gradient(circle at 50% -8%, rgba(255, 222, 106, .48), transparent 32%),
        radial-gradient(circle at 10% 96%, rgba(255, 151, 105, .24), transparent 25%),
        linear-gradient(180deg, #fffbed, #ffe4b2 76%, #ffd28c);
      border: 3px solid rgba(255,255,255,.76);
      box-shadow: 0 20px 40px rgba(49, 30, 16, .28), inset 0 -5px rgba(164, 92, 36, .1);
      display: grid;
      gap: 10px;
      animation: modalPop .18s ease both;
    }

    .menu-panel:empty,
    .menu-panel:not(.active-panel) {
      display: none;
    }

    .menu-panel-head {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      min-height: 56px;
      margin: -2px -2px 0;
      padding: 11px 10px 9px 18px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 250, 222, .72), rgba(255, 217, 124, .28)),
        url("assets/ui/panel-frame.webp");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      filter: drop-shadow(0 8px 8px rgba(120, 64, 22, .1));
    }

    .menu-close {
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 50%;
      color: #fff;
      background: linear-gradient(145deg, #ff7a6c, #e94d45);
      box-shadow: 0 5px 0 #b3312d;
      font-size: 18px;
      font-weight: 1000;
      cursor: pointer;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .menu-card {
      min-height: 78px;
      border-radius: 16px;
      padding: 10px;
      color: #5d4834;
      background:
        radial-gradient(circle at 18% 16%, rgba(255,255,255,.7), transparent 24%),
        linear-gradient(180deg, rgba(255,255,255,.88), rgba(255,235,183,.72));
      border: 2px solid rgba(255,255,255,.76);
      box-shadow: 0 7px 0 rgba(190, 113, 49, .48), 0 12px 16px rgba(68, 40, 16, .12);
      display: grid;
      gap: 5px;
      align-content: center;
      font-size: 11px;
      font-weight: 900;
      line-height: 1.25;
      text-align: left;
    }

    .menu-card strong {
      color: var(--ink);
      font-size: 15px;
      line-height: 1.1;
    }

    .menu-card.locked {
      opacity: .52;
      filter: grayscale(.32);
    }

    .menu-cat {
      display: grid;
      grid-template-columns: 42px 1fr;
      align-items: center;
      gap: 8px;
      min-height: 62px;
    }

    .menu-cat img {
      width: 42px;
      height: 42px;
      object-fit: contain;
      filter: drop-shadow(0 5px 5px rgba(55, 40, 20, .14));
    }

    .menu-card.locked img {
      opacity: .42;
      filter: grayscale(1);
    }

    .level-select {
      border: 0;
      cursor: pointer;
    }

    .share-box {
      display: grid;
      gap: 8px;
      text-align: center;
      align-content: center;
      min-height: 190px;
    }

    .share-copy {
      min-height: 52px;
      border: 0;
      border-radius: 999px;
      color: #fff;
      background:
        radial-gradient(circle at 22% 20%, rgba(255,255,255,.26), transparent 24%),
        linear-gradient(180deg, #ffb35f, var(--can));
      box-shadow: 0 7px 0 #b94134, 0 13px 18px rgba(96, 42, 24, .18);
      font-size: 17px;
      font-weight: 1000;
      cursor: pointer;
    }

    .share-state {
      min-height: 20px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .menu-panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 28px;
      color: #7a3d25;
      font-size: 19px;
      font-weight: 1000;
      text-shadow: 0 1px rgba(255, 255, 255, .72);
    }

    .menu-panel-title span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
    }

    .menu-card small {
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      line-height: 1.25;
    }

    .menu-card.primary {
      color: #fff;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 255, 255, .24), transparent 26%),
        linear-gradient(145deg, #ff9a67, #ef5d4d);
      border-color: rgba(255, 255, 255, .62);
      box-shadow: 0 7px 0 #b84236, 0 12px 18px rgba(151, 70, 34, .2);
    }

    .menu-card.primary small,
    .menu-card.primary .menu-meta {
      color: rgba(255, 255, 255, .88);
    }

    .menu-art-card {
      min-height: 112px;
      border-radius: 20px;
      padding: 10px;
      background:
        radial-gradient(circle at 50% 10%, rgba(255,255,255,.72), transparent 28%),
        linear-gradient(180deg, rgba(255, 246, 206, .9), rgba(255, 213, 118, .72));
      border: 2px solid rgba(255,255,255,.78);
      box-shadow: 0 8px 0 rgba(190, 113, 49, .42), 0 14px 18px rgba(68, 40, 16, .12);
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .menu-art-card img {
      width: 100%;
      max-height: 150px;
      object-fit: contain;
      filter: drop-shadow(0 9px 8px rgba(83, 43, 14, .15));
    }

    .tool-art {
      width: 54px;
      height: 54px;
      object-fit: contain;
      justify-self: center;
      filter: drop-shadow(0 7px 6px rgba(83, 43, 14, .16));
    }

    .tool-card {
      text-align: center;
      justify-items: center;
    }

    .menu-meta {
      color: var(--muted);
      font-size: 10px;
      font-weight: 1000;
      line-height: 1.2;
    }

    .menu-level-stars {
      color: #f0a830;
      font-size: 13px;
      letter-spacing: 0;
      line-height: 1;
    }

    .level-select:disabled {
      cursor: not-allowed;
    }

    .menu-badge {
      width: fit-content;
      padding: 4px 7px;
      border-radius: 999px;
      color: #fff;
      background: rgba(47, 37, 30, .78);
      font-size: 10px;
      font-weight: 1000;
      line-height: 1;
    }

    .menu-tool-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .menu-tool-count {
      min-width: 22px;
      min-height: 22px;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(145deg, #62a8ff, #3d7fdd);
      display: grid;
      place-items: center;
      font-size: 11px;
      font-weight: 1000;
    }

    .menu-empty {
      min-height: 104px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      padding: 18px;
      color: var(--muted);
      background: rgba(255, 255, 255, .52);
      border: 1px dashed rgba(191, 154, 105, .58);
      font-size: 12px;
      font-weight: 1000;
      text-align: center;
      line-height: 1.35;
    }

    .top {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
    }

    h1 {
      margin: 0;
      font-size: 29px;
      line-height: 1;
    }

    .sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .score {
      min-width: 84px;
      padding: 9px 10px;
      border-radius: 10px;
      background: rgba(255, 253, 247, .92);
      border: 1px solid rgba(234, 219, 196, .95);
      box-shadow: 0 8px 18px rgba(70, 50, 25, .1);
      text-align: center;
    }

    .score span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 1000;
    }

    .score strong {
      display: block;
      margin-top: 2px;
      font-size: 24px;
      line-height: 1;
    }

    .career-card {
      border-radius: 10px;
      background: rgba(255, 253, 247, .92);
      border: 1px solid rgba(234, 219, 196, .95);
      box-shadow: 0 8px 18px rgba(70, 50, 25, .1);
      padding: 8px 10px;
      display: grid;
      gap: 7px;
    }

    .career-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;

    .tip {

    .yard {
      height: clamp(330px, calc(100svh - 334px), 510px);
      min-height: 0;
      border-radius: 16px;
      background:
        radial-gradient(circle at 24% 18%, rgba(255, 217, 111, .34), transparent 15%),
        radial-gradient(circle at 78% 74%, rgba(255, 255, 255, .3), transparent 13%),
        linear-gradient(145deg, #98d989 0%, #73c87b 56%, #5aa569 100%);
      border: 1px solid rgba(93, 139, 75, .62);
      box-shadow:
        inset 0 1px rgba(255, 255, 255, .35),
        var(--shadow);
      position: relative;
      overflow: hidden;
      touch-action: manipulation;
      cursor: crosshair;
    }

    .yard::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 42%, rgba(255, 245, 188, .16), transparent 32%),
        linear-gradient(180deg, rgba(255, 255, 255, .05), rgba(55, 78, 35, .08));
      pointer-events: none;
    }

    .yard::after {
      content: "";
      position: absolute;
      left: -10%;
      right: -10%;
      bottom: -18px;
      height: 95px;
      background:
        radial-gradient(ellipse at 18% 74%, rgba(35, 105, 59, .66) 0 18px, transparent 19px),
        radial-gradient(ellipse at 31% 69%, rgba(70, 151, 76, .58) 0 23px, transparent 24px),
        radial-gradient(ellipse at 52% 76%, rgba(44, 122, 68, .54) 0 19px, transparent 20px),
        radial-gradient(ellipse at 74% 71%, rgba(70, 151, 76, .52) 0 23px, transparent 24px),
        radial-gradient(ellipse at 88% 76%, rgba(35, 105, 59, .58) 0 19px, transparent 20px);
      opacity: .18;
      pointer-events: none;
      z-index: 3;
    }

    .patio {
      position: absolute;
      right: -24px;
      bottom: -18px;
      width: 188px;
      height: 128px;
      border-radius: 54% 0 0 0;
      background:
        linear-gradient(90deg, rgba(255,255,255,.12) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255,255,255,.12) 1px, transparent 1px),
        radial-gradient(ellipse at 30% 24%, rgba(255, 229, 172, .2), transparent 38%),
        linear-gradient(145deg, #cda36d, #9d7448);
      background-size: 28px 28px;
      box-shadow:
        inset 10px 12px rgba(255, 235, 190, .18),
        -18px -10px 30px rgba(63, 92, 45, .13);
      opacity: 0;
      pointer-events: none;
    }

    .bush {
      position: absolute;
      width: 86px;
      height: 58px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 28% 44%, #4f9b5a 0 22px, transparent 23px),
        radial-gradient(circle at 52% 33%, #5cab62 0 27px, transparent 28px),
        radial-gradient(circle at 76% 48%, #438f4f 0 23px, transparent 24px);
      pointer-events: none;
      opacity: 0;
    }

    .bush.a { left: -18px; top: 18px; }
    .bush.b { right: -20px; top: 120px; transform: scale(.9); }
    .bush.c { left: 18px; bottom: 28px; transform: scale(.78); }

    .rock {
      position: absolute;
      width: 58px;
      height: 38px;
      border-radius: 55% 45% 46% 54%;
      background: linear-gradient(145deg, #9c927f, #6f685c);
      box-shadow: inset -8px -8px rgba(50, 45, 40, .12);
      opacity: 0;
      pointer-events: none;
    }

    .rock.a { left: 43%; top: 26%; transform: rotate(-12deg); }
    .rock.b { left: 32%; top: 62%; transform: rotate(8deg) scale(.86); }

    .hotspot {
      position: absolute;
      left: 50%;
      top: 48%;
      width: 118px;
      height: 118px;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      border: 2px dashed rgba(255, 255, 255, .86);
      background: rgba(255, 212, 95, .14);
      box-shadow: 0 0 0 10px rgba(255, 212, 95, .08);
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 13px;
      font-weight: 1000;
      text-shadow: 0 2px 8px rgba(40, 60, 30, .35);
      pointer-events: none;
      animation: pulse 1s ease-in-out infinite alternate;
      z-index: 2;
    }

    .hotspot.hide { display: none; }

    .hotspot.hint {
      display: grid;
      border-color: rgba(255, 255, 255, .95);
      background: rgba(255, 212, 95, .28);
      box-shadow:
        0 0 0 10px rgba(255, 212, 95, .12),
        0 0 28px rgba(255, 212, 95, .55);
      animation: hintFlash .48s ease-in-out infinite alternate;
    }

    .yard-hud {
      display: none;
    }

    .can-layer,
    .cats-layer,
    .fx-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .can {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: 46px;
      height: 38px;
      transform: translate(-50%, -50%);
      border-radius: 9px 9px 15px 15px;
      background:
        radial-gradient(circle at 30% 32%, rgba(255, 255, 255, .42), transparent 18%),
        linear-gradient(180deg, #ff9e8e, var(--can));
      border: 2px solid rgba(150, 40, 30, .45);
      box-shadow:
        inset 0 -5px rgba(160, 50, 39, .12),
        0 12px 20px rgba(50, 35, 18, .22);
      z-index: 5;
    }

    .can::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -7px;
      width: 42px;
      height: 12px;
      transform: translateX(-50%);
      border-radius: 50%;
      background:
        radial-gradient(ellipse at 45% 38%, #fff3df 0 28%, transparent 30%),
        #ffd2bd;
      border: 2px solid rgba(150, 40, 30, .38);
    }

    .scent {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--d);
      height: var(--d);
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background:
        radial-gradient(circle, rgba(255, 238, 160, .42), rgba(255, 170, 86, .16) 48%, transparent 70%);
      border: 2px solid rgba(255, 255, 255, .66);
      box-shadow: 0 0 28px rgba(255, 207, 89, .22);
      animation: scentPulse .65s ease-in-out infinite alternate;
      z-index: 1;
    }

    .cat-token {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: 66px;
      height: 72px;
      transform: translate(-50%, -50%) scale(var(--s, 1));
      display: grid;
      place-items: center;
      transition: filter .14s ease, transform .16s ease;
      z-index: 4;
    }

    .cat-token.running {
      filter: drop-shadow(0 0 14px rgba(255, 244, 160, .9));
      z-index: 7;
    }

    .cat-token.running .cat {
      animation: catLure .38s ease-in-out infinite alternate;
    }

    .cat-token.caught {
      animation: caught .32s ease forwards;
    }

    .cat {
      width: 66px;
      height: 72px;
      position: relative;
      display: block;
      transform: scale(var(--cat-size, 1));
      filter: drop-shadow(0 8px 7px rgba(52, 48, 26, .24));
      --mood: var(--green);

    .cat.trait-calm { --mood: var(--green); }
    .cat.trait-shy { --mood: var(--blue); }
    .cat.trait-rowdy { --mood: var(--red); }
    .cat.trait-clingy { --mood: var(--pink); }

    .cat-portrait {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      border: 0;
      background: transparent;
      pointer-events: none;
      user-select: none;
      opacity: 0;
      transition: opacity .18s ease;

    .cat-portrait.ready { opacity: 1; }

    .cat::after {
      content: "";
      position: absolute;
      left: 13%;
      right: 13%;
      bottom: -5px;
      height: 10px;
      border-radius: 999px;
      background: rgba(74, 56, 30, .14);
      filter: blur(3px);
      z-index: -1;

    .tail {

      border-radius: 18px 18px 4px 18px;

      transform: rotate(-34deg);
      transform-origin: bottom center;

    .body {
      position: absolute;
      bottom: 0;
      width: 75%;
      height: 58%;
      border-radius: 48% 48% 38% 38%;
      background: var(--fur);
      box-shadow: inset -7px -8px rgba(80, 50, 24, .08);

    .belly {

      height: 30%;

      background: rgba(255, 255, 255, .42);

    .face {
      position: absolute;

      left: 50%;

      height: 55%;

    .face::after {

      background: #2f2924;

    .tool-btn.selected {
      color: #fff;
      background: linear-gradient(145deg, #ffad59, var(--can));
    }

    .tool-btn.empty {
      color: rgba(86, 63, 42, .48);
      filter: grayscale(.2);
      opacity: .66;
    }

    .tool-btn span,
    .tool-btn strong {
      display: block;
      line-height: 1;
    }

    .tool-btn img {
      width: 22px;
      height: 22px;
      object-fit: contain;
      filter: drop-shadow(0 4px 3px rgba(75, 44, 18, .14));
    }

    .tool-btn strong {
      min-width: 18px;
      min-height: 18px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: #fff;
      background: rgba(47, 37, 30, .82);
      font-size: 11px;
    }

    .action {
      min-height: 42px;
      border: 0;
      border-radius: 10px;
      color: #fff;
      font-weight: 1000;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(57, 35, 18, .18);
      transition: transform .12s ease, filter .12s ease, box-shadow .12s ease;
    }

    .action:active {
      transform: translateY(1px) scale(.99);
      filter: brightness(.98);
      box-shadow: 0 6px 12px rgba(57, 35, 18, .16);
    }

    .skip { background: linear-gradient(145deg, #62a8ff, #3d7fdd); }
    .home { background: linear-gradient(145deg, #68c57a, #3e9f59); }
    .restart { background: linear-gradient(145deg, #ff7768, #ee5548); }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      place-items: center;
      padding: 18px;
      background:
        radial-gradient(circle at 50% 24%, rgba(255, 207, 89, .24), transparent 27%),
        radial-gradient(circle at 16% 78%, rgba(85, 185, 108, .16), transparent 24%),
        rgba(33, 28, 23, .58);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .overlay.show { display: grid; }

    .dialog {
      width: min(390px, 100%);
      max-height: calc(100svh - 34px);
      padding: 14px 14px 16px;
      border-radius: 16px;
      background:
        radial-gradient(circle at 50% -6%, rgba(255, 213, 92, .32), transparent 28%),
        linear-gradient(180deg, rgba(255, 253, 247, .99), rgba(255, 246, 232, .99));
      border: 1px solid var(--line);
      box-shadow:
        inset 0 1px rgba(255, 255, 255, .7),
        0 20px 46px rgba(47, 33, 22, .26);
      text-align: center;
      display: grid;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }

    .dialog::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 48px;
      background:
        radial-gradient(circle at 18% 35%, rgba(255, 255, 255, .72) 0 6px, transparent 7px),
        radial-gradient(circle at 84% 28%, rgba(255, 255, 255, .58) 0 5px, transparent 6px),
        linear-gradient(135deg, rgba(255, 207, 89, .82), rgba(85, 185, 108, .38));
      pointer-events: none;
    }

    .dialog.lose::before {
      background:
        radial-gradient(circle at 20% 35%, rgba(255, 255, 255, .56) 0 6px, transparent 7px),
        linear-gradient(135deg, rgba(83, 155, 237, .52), rgba(255, 207, 89, .28));
    }

    .result-badge,
    .result-art,
    .dialog h2,
    .dialog p,
    .reward-grid,
    .next-goal,
    .action {
      position: relative;
      z-index: 1;
    }

    .result-badge {
      width: 70px;
      height: 70px;
      margin: 4px auto -1px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 34% 28%, rgba(255, 255, 255, .86), transparent 25%),
        linear-gradient(145deg, #ffd664, #ff6656);
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 34px;
      font-weight: 1000;
      text-shadow: 0 3px 0 rgba(120, 70, 20, .16);
      border: 5px solid rgba(255, 255, 255, .86);
      box-shadow:
        0 8px 18px rgba(112, 70, 22, .2),
        0 0 0 8px rgba(255, 255, 255, .24);
      animation: badgePop .34s ease both;
    }

    .dialog.lose .result-badge {
      background:
        radial-gradient(circle at 34% 28%, rgba(255, 255, 255, .82), transparent 25%),
        linear-gradient(145deg, #62a8ff, #55b96c);
    }

    .result-art {
      display: none;
      width: min(220px, 70%);
      height: 132px;
      margin: -2px auto -6px;
      object-fit: contain;
      filter: drop-shadow(0 12px 12px rgba(82, 45, 16, .16));
      animation: badgePop .34s ease both;
    }

    .dialog.win .result-art {
      display: block;
    }

    .dialog.win .result-badge {
      display: none;
    }

    .star-row {
      height: 21px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 5px;
      color: #f6b629;
      font-size: 22px;
      line-height: 1;
      text-shadow: 0 2px 0 rgba(120, 75, 20, .12);
      position: relative;
      z-index: 1;
    }

    .star-row .dim {
      color: rgba(117, 105, 92, .28);
      text-shadow: none;
    }

    .dialog.auto .action {
      display: none;
    }

    .dialog.auto {
      width: min(340px, 100%);
      padding: 18px;
      gap: 10px;
    }

    .dialog.auto::before,
    .dialog.auto .result-badge,
    .dialog.auto .result-art,
    .dialog.auto .star-row,
    .dialog.auto .next-goal {
      display: none;
    }

    .dialog h2 {
      margin: 0;
      font-size: 26px;
      line-height: 1.05;
    }

    .dialog p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.38;
    }

    .reward-grid {
      display: none;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .overlay.show .reward-grid {
      display: grid;
    }

    .dialog.auto .reward-grid {
      display: none;
    }

    .reward-chip {
      min-height: 45px;
      border-radius: 10px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .84), rgba(255, 248, 236, .78));
      border: 1px solid rgba(226, 203, 171, .92);
      display: grid;
      place-items: center;
      padding: 5px 6px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 1000;
      line-height: 1.15;
    }

    .reward-chip strong {
      display: block;
      color: var(--ink);
      margin-top: 2px;
      font-size: 16px;
      line-height: 1;
    }

    .reward-chip.highlight {
      color: #fff;
      background:
        radial-gradient(circle at 24% 18%, rgba(255, 255, 255, .28), transparent 24%),
        linear-gradient(145deg, #5fc879, #3f9c57);
      border-color: rgba(255, 255, 255, .82);
      box-shadow: inset 0 -3px rgba(34, 82, 43, .12);
    }

    .reward-chip.highlight strong { color: #fff; }

    .reward-chip.wide {
      grid-column: 1 / -1;
    }

    .next-goal {
      min-height: 34px;
      border-radius: 10px;
      padding: 7px 10px;
      color: #715632;
      background: linear-gradient(180deg, rgba(255, 224, 119, .28), rgba(255, 246, 218, .58));
      border: 1px solid rgba(224, 183, 77, .5);
      font-size: 12px;
      font-weight: 1000;
      line-height: 1.35;
    }

    .dialog.lose .next-goal {
      color: #46613d;
      background: rgba(101, 185, 111, .16);
      border-color: rgba(101, 185, 111, .34);
    }

    .dialog .action {
      margin-top: 1px;
      min-height: 52px;
      font-size: 18px;
      background:
        radial-gradient(circle at 22% 20%, rgba(255, 255, 255, .24), transparent 24%),
        linear-gradient(145deg, #ff7869, #ef5549);
      box-shadow: 0 12px 22px rgba(214, 72, 55, .24);
    }

    @keyframes badgePop {
      0% { transform: scale(.72); opacity: 0; }
      72% { transform: scale(1.06); opacity: 1; }
      100% { transform: scale(1); }
    }

    @keyframes mascotFloat {
      from { transform: translateY(0) rotate(-1deg); }
      to { transform: translateY(-8px) rotate(1deg); }
    }

    @keyframes startPulse {
      from { filter: brightness(1); transform: scale(1); }
      to { filter: brightness(1.05); transform: scale(1.025); }
    }

    @keyframes modalPop {
      from { opacity: 0; transform: translateY(22px) scale(.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes pulse {
      from { transform: translate(-50%, -50%) scale(.96); opacity: .78; }
      to { transform: translate(-50%, -50%) scale(1.04); opacity: 1; }
    }

    @keyframes scentPulse {
      from { transform: translate(-50%, -50%) scale(.94); opacity: .62; }
      to { transform: translate(-50%, -50%) scale(1.05); opacity: .95; }
    }

    @keyframes caught {
      to {
        transform: translate(-50%, -50%) scale(.2) rotate(16deg);
        opacity: 0;
      }
    }

    @keyframes catLure {
      from { transform: translateY(0) rotate(-1deg) scale(var(--cat-size, 1)); }
      to { transform: translateY(-4px) rotate(2deg) scale(var(--cat-size, 1)); }
    }

    @keyframes tipPop {
      50% { transform: translateY(-2px); }
    }

    @keyframes popText {
      0% { opacity: 0; transform: translate(-50%, -20%); }
      16% { opacity: 1; transform: translate(-50%, -50%); }
      100% { opacity: 0; transform: translate(-50%, -120%); }
    }

    @keyframes hintFlash {
      from { transform: translate(-50%, -50%) scale(.94); }
      to { transform: translate(-50%, -50%) scale(1.08); }
    }

    @keyframes canDrop {
      0% { transform: translate(-50%, -68%) scale(.72); opacity: 0; }
      72% { transform: translate(-50%, -47%) scale(1.06); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    @keyframes scentGlow {
      from { filter: saturate(1) brightness(1); }
      to { filter: saturate(1.15) brightness(1.06); }
    }

    body { padding: 4px 8px 8px; }
    .menu-screen {
      width: min(390px, 100%);
      min-height: calc(100svh - 12px);
    }
    .app {
      width: min(390px, 100%);
      gap: 5px;
    }
    .top { display: none; }
    .career-card { display: none; }
    .level-card {
      padding: 8px 10px 9px;
      gap: 6px;
      border-radius: 13px;
    }
    .level-head { gap: 6px; }
    .level-name span { font-size: 10px; }
    .level-name strong {
      font-size: 18px;
      max-width: 210px;
    }
    .goal-pill {
      min-width: 68px;
      max-width: 46%;
      padding: 5px 8px;
      font-size: 11px;
    }
    .route { display: none; }
    .wave-row {
      grid-template-columns: 1fr auto;
      gap: 6px;
    }
    .wave-dot { height: 6px; }
    .fish-pill {
      min-width: 58px;
      padding: 4px 6px;
      font-size: 11px;
    }
    .progress-row {
      gap: 5px;
    }
    .mini-pill {
      min-height: 25px;
      padding: 4px 5px;
      font-size: 10px;
    }
    .hud { display: none; }
    .tip { display: none; }
    .yard {
      height: min(548px, max(448px, calc(100svh - 226px)));
      border-radius: 14px;
    }
    .yard-hud {
      position: absolute;
      left: 8px;
      right: 8px;
      top: 8px;
      z-index: 12;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
      pointer-events: none;
    }

    .play-safe-zone {
      position: absolute;
      left: 8px;
      right: 8px;
      top: 54px;
      height: 1px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.34), transparent);
      opacity: .55;
      pointer-events: none;
      z-index: 11;
    }

    .field-toast {
      position: absolute;
      left: 16px;
      right: 16px;
      top: 55px;
      z-index: 18;
      min-height: 32px;
      padding: 7px 12px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: #fff;
      background:
        radial-gradient(circle at 18% 20%, rgba(255, 255, 255, .2), transparent 24%),
        rgba(47, 37, 30, .9);
      border: 1px solid rgba(255, 255, 255, .3);
      box-shadow: 0 8px 18px rgba(34, 24, 14, .16);
      text-align: center;
      font-size: 12px;
      font-weight: 1000;
      line-height: 1.2;
      opacity: 0;
      transform: translateY(-5px);
      transition: opacity .16s ease, transform .16s ease;
      pointer-events: none;
    }

    .field-toast.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .field-toast.hot {
      background:
        radial-gradient(circle at 18% 20%, rgba(255, 255, 255, .25), transparent 24%),
        linear-gradient(145deg, rgba(255, 141, 90, .94), rgba(239, 84, 73, .94));
    }
    .yard-pill {
      min-width: 0;
      min-height: 38px;
      border-radius: 12px;
      background:
        linear-gradient(180deg, rgba(255, 253, 247, .84), rgba(255, 244, 223, .72));
      border: 1px solid rgba(255, 255, 255, .78);
      box-shadow: 0 7px 14px rgba(44, 34, 20, .12);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 10px;
      font-weight: 1000;
      line-height: 1.1;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .yard-pill strong {
      display: block;
      color: var(--ink);
      margin-top: 1px;
      font-size: 16px;
      line-height: 1;
    }
    .yard-pill.cans strong { color: var(--can); }
    .yard-pill.caught strong { color: var(--green); }
    .yard-pill.best strong { color: var(--pink); }
    .cat-token {
      width: 70px;
      height: 76px;
    }
    .cat {
      width: 70px;
      height: 76px;
    }
    .controls {
      grid-template-columns: 1fr auto auto;
      align-items: center;
      align-content: center;
      gap: 7px;
      height: 42px;
    }
    .controls .action {
      min-height: 42px;
      height: 42px;
      font-size: 15px;
    }
    .controls .home,
    .controls .restart {
      min-width: 62px;
      padding: 0 10px;
      color: var(--muted);
      background: transparent;
      box-shadow: none;
      font-size: 13px;
    }
    .toolbelt {
      gap: 5px;
    }
    .tool-btn {
      min-height: 42px;
      padding: 5px 6px;
      border-radius: 9px;
      font-size: 11px;
    }
    .can {
      animation: canDrop .22s ease both;
    }
    .scent {
      animation: scentPulse .65s ease-in-out infinite alternate, scentGlow 1.2s ease-in-out infinite alternate;
    }
    .dialog {
      width: min(350px, 100%);
      padding: 13px 13px 14px;
      gap: 7px;
    }
    .result-badge {
      width: 66px;
      height: 66px;
      font-size: 32px;
    }
    .dialog h2 { font-size: 24px; }
    .dialog p {
      font-size: 13px;
      line-height: 1.32;
    }
    .reward-grid { gap: 6px; }
    .reward-chip {
      min-height: 41px;
      padding: 5px;
      font-size: 9px;
    }
    .reward-chip strong { font-size: 15px; }
    .next-goal {
      min-height: 32px;
      padding: 7px 9px;
      font-size: 11px;
    }
    .dialog .action {
      min-height: 50px;
      font-size: 18px;
    }

    @media (max-width: 380px) {
      body { padding: 6px 8px 8px; }
      .menu-logo {
        min-width: 262px;
      }
      .menu-title {
        font-size: 34px;
      }
      .menu-cat-hero {
        width: 226px;
        height: 226px;
      }
      .menu-dock-btn {
        min-height: 72px;
      }
      h1 { font-size: 24px; }
      .yard {
        height: min(508px, max(416px, calc(100svh - 232px)));
      }
      .cat-token {
        width: 66px;
        height: 72px;
      }
      .cat {
        width: 66px;
        height: 72px;
      }
      .hud { gap: 6px; }
      .stat { min-height: 44px; }
      .stat strong { font-size: 21px; }
      .dialog {
        width: min(336px, 100%);
        padding: 12px 12px 13px;
      }
      .result-badge {
        width: 60px;
        height: 60px;
        font-size: 29px;
      }
      .star-row {
        height: 19px;
        font-size: 20px;
      }
      .dialog h2 { font-size: 22px; }
      .reward-chip strong { font-size: 15px; }
    }

    @media (max-width: 520px) and (max-height: 720px) {
      .menu-screen {
        gap: 5px;
        padding-top: 5px;
      }
      .menu-topbar {
        min-height: 34px;
      }
      .menu-profile,
      .menu-resource {
        min-height: 30px;
      }
      .menu-stage {
        min-height: 420px;
        gap: 4px;
        padding-top: 4px;
      }
      .menu-logo {
        min-width: 246px;
        padding: 9px 14px 8px;
        border-radius: 22px;
      }
      .menu-title {
        font-size: 31px;
      }
      .menu-subtitle {
        margin-top: 5px;
        font-size: 11px;
      }
      .menu-mascot {
        min-height: 196px;
      }
      .menu-cat-hero {
        width: 194px;
        height: 194px;
      }
      .menu-speech {
        top: 4px;
        right: -2px;
        max-width: 112px;
        font-size: 11px;
      }
      .start-btn {
        min-height: 58px;
        font-size: 21px;
      }
      .menu-dock-btn {
        min-height: 64px;
        border-radius: 15px;
        font-size: 11px;
      }
      .dock-icon {
        width: 30px;
        height: 30px;
        font-size: 18px;
      }
      .app { gap: 4px; }
      .top { gap: 6px; }
      h1 { font-size: 23px; }
      .score {
        min-width: 68px;
        padding: 5px 7px;
      }
      .score span,
      .rank-block span,
      .xp-text,
      .level-name span,
      .stat span {
        font-size: 10px;
      }
      .score strong { font-size: 19px; }
      .level-card {
        padding: 5px 8px;
        gap: 4px;
      }
      .yard {
        height: min(430px, max(374px, calc(100svh - 226px)));
      }
      .controls .action {
        min-height: 44px;
        height: 44px;
      }
      .controls {
        height: 44px;
      }
      .overlay { padding: 10px; }
      .dialog {
        max-height: calc(100svh - 20px);
        padding: 11px 11px 12px;

      }
      .dialog::before { height: 40px; }

        width: 54px;
        height: 54px;
        border-width: 4px;
        font-size: 26px;
      }

      }

        padding: 4px;
      }
      .next-goal {
        min-height: 30px;
        padding: 6px 8px;
      }
      .dialog .action {
        min-height: 46px;
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <main class="menu-screen" id="menuScreen">
    <section class="menu-topbar" aria-label="玩家状态">
      <div class="menu-profile">
        <span class="menu-avatar">🐱</span>
        <span id="menuRank">见习</span>
      </div>
      <button class="menu-resource" data-menu-tab="book" type="button">📖 <span id="menuCollection">0/8</span></button>
      <button class="menu-resource" data-menu-tab="levels" type="button">⭐ <span id="menuStars">0/24</span></button>
      <button class="menu-resource" data-menu-tab="tools" type="button">🐟 <span id="menuFish">0</span></button>
    </section>

    <section class="menu-stage">
      <div class="menu-logo">
        <div class="menu-kicker">策略休闲 · 猫潮收编</div>
        <h1 class="menu-title">首席吸猫官</h1>
        <p class="menu-subtitle">找准一罐的位置，让猫潮自己滚起来。</p>
      </div>

      <div class="menu-mascot">
        <div class="menu-speech">开罐位置对了，猫潮会爆！</div>
        <div class="menu-cat-hero">
          <img src="assets/ui/main-cat.webp" alt="" width="520" height="520" decoding="async">
        </div>
      </div>

      <div class="start-wrap">
        <button class="start-btn" id="startGameBtn" type="button">开始吸猫</button>
        <div class="menu-tagline">一罐开局，连锁猫潮</div>
      </div>
    </section>

    <section class="menu-dock" aria-label="功能入口">
      <button class="menu-dock-btn" data-menu-tab="book" type="button"><span class="dock-badge" id="bookBadge">0</span><span class="dock-icon"><img src="assets/ui/icon-book-small.webp" alt="" width="96" height="96" decoding="async"></span>图鉴</button>
      <button class="menu-dock-btn" data-menu-tab="tools" type="button"><span class="dock-icon"><img src="assets/ui/icon-wand-small.webp" alt="" width="96" height="96" decoding="async"></span>道具</button>
      <button class="menu-dock-btn" data-menu-tab="levels" type="button"><span class="dock-icon"><img src="assets/ui/icon-levels-small.webp" alt="" width="96" height="96" decoding="async"></span>关卡</button>
      <button class="menu-dock-btn" data-menu-tab="share" type="button"><span class="dock-icon"><img src="assets/ui/icon-share-small.webp" alt="" width="96" height="96" decoding="async"></span>分享</button>
    </section>
  </main>

  <div class="menu-modal" id="menuModal">
    <section class="menu-panel" id="menuPanel"></section>
  </div>

  <main class="app" id="gameApp" style="display: none;">
    <header class="top">
      <div>
        <h1>首席吸猫官</h1>
        <div class="sub">一罐开，全员到岗。</div>
      </div>

        levelIndex = startLevel ?? 0;
        score = 0;
        fish = 0;
        runStats = {
          caught: 0,
          bestTide: 0,
          perfectLevels: 0,
          stars: 0,
          levelsCleared: 0
        };
      }
      currentLevel = levels[levelIndex];
      currentLevel.waves = buildWaves(currentLevel);
      preloadCatImages();
      waveIndex = 0;
      currentWave = currentLevel.waves[waveIndex];
      cats = currentWave.cats.map((cat, index) => createCat(cat, index));
      cans = currentLevel.cans;
      caught = 0;
      levelCaught = 0;
      best = 0;
      levelBest = 0;
      activeCan = null;
      ended = false;
      firstCan = true;
      pendingNextLevel = false;
      selectedTool = null;
      canBoost = 1;
      lastUnlocks = [];
      lastTime = 0;
      canLayerEl.innerHTML = "";
      fxLayerEl.innerHTML = "";
      dialogEl.classList.remove("auto", "win", "lose");
      overlayEl.classList.remove("show");
      rewardGridEl.innerHTML = "";
      setupWaveView();
      yardEl.className = `yard level-${currentLevel.theme}`;
      renderCats();
      updateStats();
      renderLevelHud();
      renderCareer();
      startLoop();
    }

    function startLoop() {
      cancelAnimationFrame(raf);
      clearInterval(loopTimer);
      rafHeartbeat = Date.now();
      raf = requestAnimationFrame(tick);
      loopTimer = setInterval(() => {
        if (Date.now() - rafHeartbeat > 220) {
          step(performance.now());
        }
      }, 120);
    }

    function buildWaves(level) {
      if (level.waves) return level.waves;
      const cats = level.cats;
      const split = Math.ceil(cats.length / 3);
      return [0, 1, 2].map(index => ({
        name: `第 ${index + 1} 波`,
        goal: Math.ceil(level.goal / 3),
        hotspot: index === 0 ? level.hotspot : { x: 50 + (index - 1) * 24, y: 50 + index * 8, text: `第 ${index + 1} 波` },
        tip: index === 0 ? level.tip : `第 ${index + 1} 波来了，找猫群边缘。`,
        hint: level.hint,
        cats: cats.slice(index * split, (index + 1) * split)
      }));
    }

    function loadProgress() {
      try {
        const saved = JSON.parse(localStorage.getItem(saveKey) || "{}");
        const savedTools = { ...(saved.tools || {}) };
        if (savedTools.hint && !savedTools.wand) {
          savedTools.wand = savedTools.hint;
        }
        delete savedTools.hint;
        return {
          ...defaultProgress,
          ...saved,
          bestStars: { ...defaultProgress.bestStars, ...(saved.bestStars || {}) },
          missions: { ...defaultProgress.missions, ...(saved.missions || {}) },
          collection: { ...defaultProgress.collection, ...(saved.collection || {}) },
          tools: { ...defaultProgress.tools, ...savedTools }
        };
      } catch {
        return { ...defaultProgress, bestStars: {}, missions: {}, collection: {}, tools: { ...defaultProgress.tools } };
      }
    }

    function saveProgress() {
      localStorage.setItem(saveKey, JSON.stringify(progress));
    }

    function totalStars() {
      return Object.values(progress.bestStars || {}).reduce((sum, value) => sum + value, 0);
    }

    function rankState() {
      let index = 0;
      for (let i = 0; i < ranks.length; i += 1) {
        if (progress.xp >= ranks[i].xp) index = i;
      }
      const current = ranks[index];
      const next = ranks[index + 1] || null;
      const base = current.xp;
      const span = next ? next.xp - base : 1;
      const gained = next ? progress.xp - base : span;
      return {
        current,
        next,
        ratio: next ? clamp(gained / span, 0, 1) : 1,
        text: next ? `${gained}/${span}` : "满级"
      };
    }

    function rankPerk() {
      return rankState().current;
    }

    function renderMenu() {
      if (!menuScreenEl || !menuPanelEl) return;
      const rank = rankState();
      const collectionCount = Object.keys(progress.collection || {}).length;
      menuRankEl.textContent = rank.current.name.replace("吸猫官", "");
      menuCollectionEl.textContent = `${collectionCount}/${Object.keys(catBook).length}`;
      menuStarsEl.textContent = `${totalStars()}/${levels.length * 3}`;
      menuFishEl.textContent = progress.totalFish || 0;
      bookBadgeEl.textContent = collectionCount;
    }

    function openMenuPanel(tab = "book") {
      menuTab = tab;
      renderMenuPanel();
      menuModalEl.classList.add("show");
    }

    function closeMenuPanel() {
      menuModalEl.classList.remove("show");
      menuPanelEl.classList.remove("active-panel");
      menuPanelEl.innerHTML = "";
    }

    function panelHead(title, subtitle = "") {
      return `
        <div class="menu-panel-head">
          <div class="menu-panel-title">${title}${subtitle ? `<span>${subtitle}</span>` : ""}</div>
          <button class="menu-close" type="button" data-menu-close="1">×</button>
        </div>
      `;
    }

    function renderMenuPanel() {
      menuPanelEl.classList.add("active-panel");
      if (menuTab === "book") {
        renderBookPanel();
        return;
      }
      if (menuTab === "tools") {
        renderToolsPanel();
        return;
      }
      if (menuTab === "levels") {
        renderLevelsPanel();
        return;
      }
      if (menuTab === "share") {
        renderSharePanel();
        return;
      }
      renderPlayPanel();
    }

    function renderPlayPanel() {
      menuPanelEl.innerHTML = `
        ${panelHead("玩法", "一眼懂，靠位置赢")}
        <div class="menu-grid">
          <button class="menu-card primary level-select" data-start-level="0" type="button">
            <strong>开一罐</strong>
            <small>点场地，猫会自己闻味聚过来。</small>
          </button>
          <div class="menu-card">
            <strong>滚猫潮</strong>
            <small>连到黏人猫、闹猫，猫潮会突然爆起来。</small>
          </div>
          <div class="menu-card">
            <strong>省罐头</strong>
            <small>单罐越肥，越容易三星和返罐。</small>
          </div>
          <div class="menu-card">
            <strong>养职位</strong>
            <small>收图鉴、拿星级，解锁更强职位加成。</small>
          </div>
        </div>
      `;
    }

    function renderBookPanel() {
      const entries = Object.entries(catBook);
      menuPanelEl.innerHTML = `
        ${panelHead("猫图鉴", `${Object.keys(progress.collection || {}).length}/${entries.length}`)}
        <div class="menu-grid">
          ${entries.map(([kind, info]) => {
            const unlocked = !!progress.collection?.[kind];
            return `
              <div class="menu-card menu-cat ${unlocked ? "" : "locked"}">
                <img src="${catImage({ kind })}" alt="" loading="lazy" decoding="async">
                <div>
                  <strong>${unlocked ? info.name : "未发现"}</strong>
                  <div class="menu-meta">${unlocked ? info.rarity : "继续闯关解锁"}</div>

              </div>
            `;
          }).join("")}
        </div>
      `;
