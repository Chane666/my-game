function safeTextStyle(style){
  var next = {};
  if(style && typeof style === "object"){
    Object.keys(style).forEach(function(key){ next[key] = style[key]; });
  }
  if(!next.fontFamily){
    next.fontFamily = 'Arial, "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", "Microsoft YaHei", "PingFang SC", sans-serif';
  }
  if(next.resolution === undefined){
    next.resolution = Math.min(2, Math.max(1, window.devicePixelRatio || 1));
  }
  var pad = next.padding || {};
  var px = typeof pad.x === "number" ? pad.x : 0;
  var py = typeof pad.y === "number" ? pad.y : 0;
  next.padding = {
    left:Math.max(typeof pad.left === "number" ? pad.left : px, 4),
    right:Math.max(typeof pad.right === "number" ? pad.right : px, 4),
    top:Math.max(typeof pad.top === "number" ? pad.top : py, 6),
    bottom:Math.max(typeof pad.bottom === "number" ? pad.bottom : py, 6)
  };
  return next;
}

function installTextGuard(){
  var factory = Phaser.GameObjects.GameObjectFactory.prototype;
  if(factory._neonTextGuard){ return; }
  var rawText = factory.text;
  factory.text = function(x,y,text,style){
    return rawText.call(this,x,y,text,safeTextStyle(style));
  };
  factory._neonTextGuard = true;
}

function todayKey(){
  var d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

function dailySeed(){
  var s = todayKey(), hash = 2166136261;
  for(var i=0;i<s.length;i++){
    hash ^= s.charCodeAt(i);
    hash = Math.imul(hash,16777619);
  }
  return hash >>> 0;
}

function seededRand(seed){
  seed = (seed + 0x6d2b79f5) | 0;
  var t = Math.imul(seed ^ seed >>> 15, 1 | seed);
  t ^= t + Math.imul(t ^ t >>> 7, 61 | t);
  return {seed:seed, value:((t ^ t >>> 14) >>> 0) / 4294967296};
}

function challengeTarget(){
  var q = new URLSearchParams(location.search);

}

function ratingTitle(score,combo){
  score = Math.floor(score || 0);

  return STYLE_TITLE[index];
}

function nextScoreGoal(score){
  var goals = [
    {score:300,title:STYLE_TITLE[1]},
    {score:900,title:STYLE_TITLE[2]},
    {score:1800,title:STYLE_TITLE[3]},
    {score:3200,title:STYLE_TITLE[4]},
    {score:5000,title:STYLE_TITLE[5]}
  ];
  for(var i=0;i<goals.length;i++){
    if(score < goals[i].score){
      return {score:goals[i].score,title:goals[i].title,left:goals[i].score - score};
    }
  }
  return null;
}

function resultHint(data){
  var score = Math.floor(data.score || 0);
  if(data.challenge){
    var diff = Math.abs(score - data.challenge);
    return score > data.challenge ? "Friend target beaten by " + diff + " points. Share the new mark." : "Need " + diff + " more points to beat your friend.";
  }
  if(data.prevBest && score > data.prevBest){
    return "New personal best. One more run can stretch the lead.";
  }
  if(data.prevBest && score < data.prevBest){
    return "Need " + (data.prevBest - score) + " more points to beat your best.";
  }
  if(data.prevBest && score === data.prevBest){
    return "Matched your best. A cleaner combo breaks it.";
  }
  if(score <= 0){
    return "Deliver the first package, then challenge friends.";
  }
  var next = nextScoreGoal(score);
  return next ? "Score " + next.left + " more to unlock " + next.title : "Streak unlocked. Challenge a friend.";
}

function retryLabel(data){
  if(data.challenge && data.score <= data.challenge){ return "Beat Friend"; }
  if(data.prevBest && data.score <= data.prevBest){ return "Beat Best"; }
  var next = nextScoreGoal(data.score || 0);
  return next ? "Reach " + next.score : "Push Higher";
}

function fitTextWidth(textObj,maxWidth,minScale){
  if(!textObj){ return textObj; }
  minScale = minScale || .78;
  var width = textObj.width || 1;
  if(width > maxWidth){
    textObj.setScale(Math.max(minScale, maxWidth / width));
  }
  return textObj;
}

function fitTextBox(textObj,maxWidth,maxHeight,minScale){
  if(!textObj){ return textObj; }
  minScale = minScale || .72;
  var width = textObj.width || 1;
  var height = textObj.height || 1;
  var scale = Math.min(1, maxWidth / width, maxHeight / height);
  if(scale < 1){ textObj.setScale(Math.max(minScale, scale)); }
  return textObj;
}

function formatScore(value){
  value = Math.floor(value || 0);
  try{ return value.toLocaleString("en-US"); }catch(e){ return String(value); }
}

function cleanCountryCode(code){
  code = String(code || "").trim().toUpperCase();
  return /^[A-Z]{2}$/.test(code) ? code : "";
}

function countryFlag(code){
  code = cleanCountryCode(code);
  if(!code){ return String.fromCodePoint(0x1F310); }
  return String.fromCodePoint(0x1F1E6 + code.charCodeAt(0) - 65, 0x1F1E6 + code.charCodeAt(1) - 65);
}

function countryDisplayName(code,fallback){
  code = cleanCountryCode(code);
  fallback = String(fallback || "").trim();
  if(fallback && fallback !== code){ return fallback.slice(0,32); }
  if(!code){ return "Local"; }
  try{
    if(window.Intl && Intl.DisplayNames){
      var names = new Intl.DisplayNames(["en"],{type:"region"});
      return (names.of(code) || code).slice(0,32);
    }
  }catch(e){}
  return code;
}

function flagTextureKey(code){
  code = cleanCountryCode(code);

function queueFlagTexture(scene,code,onReady){
  code = cleanCountryCode(code);
  if(!code || !scene || !scene.load || !scene.textures){ return false; }
  var key = flagTextureKey(code);
  if(scene.textures.exists(key)){ return true; }
  scene.flagLoading = scene.flagLoading || {};
  scene.flagFailed = scene.flagFailed || {};
  if(scene.flagLoading[key] || scene.flagFailed[key]){ return false; }
  scene.flagLoading[key] = true;
  scene.load.image(key, FLAG_CDN_BASE + code.toLowerCase() + ".png");
  scene.load.once("filecomplete-image-" + key,function(){
    delete scene.flagLoading[key];
    if(onReady){ onReady(); }
  });
  scene.load.on("loaderror",function(file){
    if(file && file.key === key){
      delete scene.flagLoading[key];
      scene.flagFailed[key] = true;
    }
  });
  if(!scene.load.isLoading()){ scene.load.start(); }
  return false;
}

function drawRemoteFlag(scene,x,y,code,onReady){
  code = cleanCountryCode(code);
  var items = [];
  var g = scene.add.graphics();
  var left = x - FLAG_BADGE_W / 2;
  var top = y - FLAG_BADGE_H / 2;
  g.fillStyle(0x000000,.24).fillRoundedRect(left+2,top+3,FLAG_BADGE_W,FLAG_BADGE_H,7);
  g.fillStyle(code ? 0x0b1520 : 0x101923,.96).fillRoundedRect(left,top,FLAG_BADGE_W,FLAG_BADGE_H,7);
  g.lineStyle(1,code ? 0x7de4ff : 0x627487,code ? .30 : .22).strokeRoundedRect(left,top,FLAG_BADGE_W,FLAG_BADGE_H,7);
  items.push(g);
  var key = flagTextureKey(code);
  if(code && scene.textures.exists(key)){
    var img = scene.add.image(x,y,key).setDisplaySize(FLAG_IMAGE_W,FLAG_IMAGE_H);
    items.push(img);
  }else{
    queueFlagTexture(scene,code,onReady);
    var fallback = drawFlag(scene,x,y,code);
    if(fallback && fallback.items){ items = items.concat(fallback.items); }
  }
  return items;
}

function guessedCountryCode(){
  var tz = "";
  try{ tz = Intl.DateTimeFormat().resolvedOptions().timeZone || ""; }catch(e){}
  var tzMap = {
    "Asia/Shanghai":"CN",
    "Asia/Chongqing":"CN",
    "Asia/Harbin":"CN",
    "Asia/Urumqi":"CN",
    "Asia/Hong_Kong":"CN",
    "Asia/Macau":"CN",
    "Asia/Taipei":"CN",
    "America/New_York":"US",
    "America/Chicago":"US",
    "America/Denver":"US",
    "America/Los_Angeles":"US",
    "America/Phoenix":"US",
    "America/Anchorage":"US",
    "Pacific/Honolulu":"US",
    "Europe/London":"GB",
    "Asia/Tokyo":"JP",
    "Asia/Seoul":"KR",
    "Asia/Singapore":"SG",
    "Asia/Bangkok":"TH",
    "Asia/Jakarta":"ID",
    "Asia/Manila":"PH",
    "Asia/Kuala_Lumpur":"MY",
    "Asia/Kolkata":"IN",
    "Australia/Sydney":"AU",
    "Australia/Melbourne":"AU",
    "Europe/Paris":"FR",
    "Europe/Berlin":"DE",
    "Europe/Madrid":"ES",
    "Europe/Rome":"IT",
    "America/Toronto":"CA",
    "America/Vancouver":"CA",
    "America/Sao_Paulo":"BR",
    "America/Mexico_City":"MX"
  };
  if(tzMap[tz]){ return tzMap[tz]; }
  var lang = "";
  try{ lang = (navigator.languages && navigator.languages[0]) || navigator.language || ""; }catch(e){}
  var match = String(lang).match(/[-_]([A-Za-z]{2})\b/);
  var code = match ? cleanCountryCode(match[1]) : "";
  if(code === "HK" || code === "MO" || code === "TW"){ return "CN"; }
  if(code){ return code; }
  lang = String(lang).toLowerCase();
  if(lang.indexOf("zh") === 0){ return "CN"; }
  if(lang.indexOf("ja") === 0){ return "JP"; }
  if(lang.indexOf("ko") === 0){ return "KR"; }
  if(lang.indexOf("th") === 0){ return "TH"; }
  if(lang.indexOf("id") === 0){ return "ID"; }
  if(lang.indexOf("vi") === 0){ return "VN"; }
  if(lang.indexOf("hi") === 0){ return "IN"; }
  if(lang.indexOf("en") === 0){ return "US"; }
  return "";
}

function beatPercent(score){
  score = Math.floor(score || 0);
  return Math.max(12,Math.min(99,Math.round(18 + Math.sqrt(score) * 1.18)));
}

function nextDeliveryGoal(count){
  count = Math.floor(count || 0);
  var goals = [
    {count:8,title:"Starter Sorter"},
    {count:18,title:"Night Courier"},
    {count:32,title:"Route Dispatcher"},
    {count:48,title:"Clutch Master"},
    {count:66,title:"Portal Chief"}
  ];
  for(var i=0;i<goals.length;i++){
    if(count < goals[i].count){
      return {count:goals[i].count,title:goals[i].title,left:goals[i].count - count};
    }
  }
  return null;
}

function readDaily(){
  try{
    var data = JSON.parse(localStorage.getItem(DAILY_KEY) || "{}");
    return data && typeof data === "object" ? data : {};
  }catch(e){ return {}; }
}

function dailyBest(){
  var data = readDaily()[todayKey()];
  return data && typeof data === "object" ? data : null;
}

function saveDaily(record){
  var key = todayKey();
  var data = readDaily();
  var old = data[key];
  if(!old || (record.delivered || 0) > (old.delivered || 0) || ((record.delivered || 0) === (old.delivered || 0) && (record.score || 0) > (old.score || 0))){
    data[key] = record;
    try{ localStorage.setItem(DAILY_KEY, JSON.stringify(data)); }catch(e){}
    return true;
  }
  return false;
}

      }
    }
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === "suspended"){ audioCtx.resume(); }
    var now = audioCtx.currentTime;
    var master = audioCtx.createGain();
    var comp = audioCtx.createDynamicsCompressor();
    comp.threshold.setValueAtTime(-18,now);
    comp.knee.setValueAtTime(16,now);
    comp.ratio.setValueAtTime(8,now);
    comp.attack.setValueAtTime(.003,now);
    comp.release.setValueAtTime(.12,now);
    master.gain.value = 2.35;
    master.connect(comp);
    comp.connect(audioCtx.destination);
    var presets = {
      tap:[[520,.00,.05,"triangle",.08],[760,.032,.055,"sine",.06]],
      ok:[[640,.00,.07,"triangle",.1],[960,.045,.08,"sine",.092],[1280,.105,.105,"sine",.078]],
      boost:[[420,.00,.07,"sine",.092],[760,.045,.09,"triangle",.105],[1220,.105,.12,"sine",.092],[1680,.18,.13,"sine",.07]],
      combo:[[620,.00,.075,"triangle",.105],[930,.045,.085,"sine",.11],[1320,.105,.12,"sine",.098],[1880,.18,.14,"sine",.075],[2380,.255,.10,"sine",.05]],
      bad:[[190,.00,.13,"sawtooth",.115],[96,.06,.19,"square",.082]]
    };
    (presets[type] || presets.tap).forEach(function(n){
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      var start = now + n[1], end = start + n[2];
      osc.type = n[3];
      osc.frequency.setValueAtTime(n[0], start);
      osc.frequency.exponentialRampToValueAtTime(Math.max(48, type === "bad" ? n[0] * .55 : n[0] * 1.18), end);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(n[4], start + .014);
      gain.gain.exponentialRampToValueAtTime(0.0001, end);
      osc.connect(gain);
      gain.connect(master);
      osc.start(start);
      osc.stop(end + .02);
    });
    if(type === "bad" || type === "boost" || type === "combo"){
      var noiseDur = type === "bad" ? .12 : .18;
      var buffer = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * noiseDur), audioCtx.sampleRate);
      var data = buffer.getChannelData(0);
      for(var i=0;i<data.length;i++){ data[i] = (Math.random() * 2 - 1) * (1 - i / data.length); }
      var noise = audioCtx.createBufferSource();
      var ngain = audioCtx.createGain();
      noise.buffer = buffer;
      ngain.gain.setValueAtTime(type === "bad" ? .055 : .032, now);
      ngain.gain.exponentialRampToValueAtTime(.0001, now + noiseDur);
      noise.connect(ngain);
      ngain.connect(master);
      noise.start(now);
    }
  }catch(e){}
}

function readRecords(){
  try{
    var data = JSON.parse(localStorage.getItem(STORE_KEY) || "[]");
    if(!Array.isArray(data)){ return []; }
    data = data.filter(function(item){ return item && typeof item === "object" && (item.score || 0) > 0; }).sort(function(a,b){
      var bs = b.score || 0, as = a.score || 0;
      return bs !== as ? bs - as : (b.delivered || 0) - (a.delivered || 0);
    }).slice(0,1);
    return data;
  }catch(e){ return []; }
}

function cleanPlayerName(name){
  name = String(name || "").replace(/[\u0000-\u001f\u007f<>]/g,"").replace(/\s+/g," ").trim();
  if(!name || name.toLowerCase() === "guest"){ return "Runner"; }
  return Array.from(name).slice(0,MAX_PLAYER_NAME_CHARS).join("");
}

function cleanEditableName(name){
  name = String(name || "").replace(/[\u0000-\u001f\u007f<>]/g,"").replace(/\s+/g," ").trim();
  return Array.from(name).slice(0,MAX_PLAYER_NAME_CHARS).join("");
}

function makeDeviceId(){
  var raw = Date.now().toString(36) + Math.random().toString(36).slice(2,12);
  return "dev_" + raw.slice(0,18);
}

function readDeviceId(){
  try{
    var id = localStorage.getItem(DEVICE_KEY);
    if(!id){
      id = makeDeviceId();
      localStorage.setItem(DEVICE_KEY,id);
    }
    return id;
  }catch(e){ return makeDeviceId(); }
}

function readProfile(){
  var profile = {};
  try{ profile = JSON.parse(localStorage.getItem(PROFILE_KEY) || "{}") || {}; }catch(e){ profile = {}; }
  if(!profile.deviceId){ profile.deviceId = readDeviceId(); }
  profile.name = cleanEditableName(profile.name || "");
  profile.avatar = String(profile.avatar || "bolt").slice(0,18);
  profile.nameChangedAt = Math.floor(Number(profile.nameChangedAt || 0)) || 0;
  if(!profile.name){
    try{
      var oldName = cleanEditableName(localStorage.getItem(PLAYER_KEY) || "");
      if(oldName){ profile.name = oldName; }
    }catch(e){}
  }
  return profile;
}

function saveProfile(profile){
  profile = profile || {};
  var next = {
    deviceId:String(profile.deviceId || readDeviceId()).slice(0,32),
    name:cleanEditableName(profile.name || ""),
    avatar:String(profile.avatar || "bolt").slice(0,18),
    nameChangedAt:Math.floor(Number(profile.nameChangedAt || 0)) || 0
  };
  try{
    localStorage.setItem(PROFILE_KEY,JSON.stringify(next));
    if(next.name){ localStorage.setItem(PLAYER_KEY,next.name); }
  }catch(e){}
  return next;
}

function readPlayerName(){
  return readProfile().name || "";
}

function canChangeProfileName(profile){
  profile = profile || readProfile();
  if(!profile.name || !profile.nameChangedAt){ return true; }
  return Date.now() - profile.nameChangedAt >= NAME_CHANGE_COOLDOWN;
}

function nameChangeDaysLeft(profile){
  profile = profile || readProfile();
  if(canChangeProfileName(profile)){ return 0; }
  return Math.max(1,Math.ceil((NAME_CHANGE_COOLDOWN - (Date.now() - profile.nameChangedAt)) / 86400000));
}

function saveBestRecord(record){
  if(!record || (record.score || 0) <= 0){
    return {saved:false,records:readRecords(),best:readRecords()[0] || null};
  }
  var records = readRecords();
  var name = cleanPlayerName(record.name || readPlayerName());
  var old = records[0] || null;
  if(old && (old.score || 0) >= (record.score || 0)){
    return {saved:false,records:records,best:old};
  }
  var next = Object.assign({},record,{name:name,time:record.time || Date.now()});
  records = [next];
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(records)); }catch(e){}
  return {saved:true,records:records,best:next};
}

function updateBestRecordProfile(name){
  var records = readRecords();
  if(!records.length){ return null; }
  var best = Object.assign({},records[0],{
    name:cleanPlayerName(name || readPlayerName()),
    countryCode:records[0].countryCode || guessedCountryCode()
  });
  try{ localStorage.setItem(STORE_KEY, JSON.stringify([best])); }catch(e){}
  return best;
}

function fetchCloudLeaderboard(scope){
  if(!CLOUD_LEADERBOARD.enabled || !CLOUD_LEADERBOARD.url || !CLOUD_LEADERBOARD.anonKey || !window.fetch){
    return Promise.reject(new Error("Cloud leaderboard disabled"));
  }
  var base = CLOUD_LEADERBOARD.url.replace(/\/$/,"") + "/rest/v1/leaderboard_scores";
  var countryCode = cleanCountryCode(scope === "china" ? "CN" : scope && scope.countryCode);
  var order = "&order=score.desc&limit=50";
  var countryFilter = countryCode ? "&country_code=eq." + encodeURIComponent(countryCode) : "";
  var richUrl = base + "?select=name,score,packages,combo,accuracy,country_code,country_name,avatar,device_id,created_at" + countryFilter + order;
  var legacyUrl = base + "?select=name,score,packages,combo,accuracy,country_code,country_name,created_at" + countryFilter + order;
  function read(url){
    return fetch(url,{headers:cloudHeaders()}).then(function(res){
      if(!res.ok){ throw new Error("Leaderboard " + res.status); }
      return res.json();
    });
  }
  return read(richUrl).catch(function(){
    return read(legacyUrl);
  }).then(function(rows){
    var mapped = Array.isArray(rows) ? rows.map(normalizeCloudRecord) : [];
    return dedupeCloudRecords(mapped);
  });
}

function dedupeCloudRecords(mapped){
  var bestByDevice = {};
  mapped.forEach(function(item,index){
    var legacyKey = [
      cleanPlayerName(item.name || "Runner").toLowerCase(),
      item.score || 0,
      item.time || index,
      item.countryCode || ""
    ].join(":");
    var key = item.deviceId ? "device:" + item.deviceId : "legacy:" + legacyKey;
    if(!bestByDevice[key] || (item.score || 0) > (bestByDevice[key].score || 0)){
      bestByDevice[key] = item;
    }
  });
  return Object.keys(bestByDevice).map(function(key){ return bestByDevice[key]; }).sort(function(a,b){
    return (b.score || 0) - (a.score || 0);
  }).slice(0,50);
}

function fetchLocalCountryLeaderboard(){
  if(!CLOUD_LEADERBOARD.enabled || !CLOUD_LEADERBOARD.url || !CLOUD_LEADERBOARD.anonKey || !window.fetch){
    return Promise.reject(new Error("Cloud leaderboard disabled"));
  }
  var fallbackCode = cleanCountryCode(guessedCountryCode());
  var url = CLOUD_LEADERBOARD.url.replace(/\/$/,"") + "/functions/v1/submit-score?scope=country&limit=50&country_code=" + encodeURIComponent(fallbackCode || "") + "&timezone=" + encodeURIComponent(currentTimezone());
  var controller = window.AbortController ? new AbortController() : null;
  var timeout = controller ? setTimeout(function(){ controller.abort(); },2200) : null;
  return fetch(url,{headers:cloudHeaders(),signal:controller ? controller.signal : undefined}).then(function(res){
    if(timeout){ clearTimeout(timeout); }
    if(!res.ok){ throw new Error("Country leaderboard " + res.status); }
    return res.json();
  }).then(function(data){
    var country = data && data.country ? data.country : {};
    var countryCode = cleanCountryCode(country.country_code || country.countryCode || fallbackCode || "");
    var countryName = countryDisplayName(countryCode,country.country_name || country.countryName || "");
    var mapped = Array.isArray(data && data.records) ? data.records.map(normalizeCloudRecord) : [];
    return {records:dedupeCloudRecords(mapped),countryCode:countryCode,countryName:countryName};
  }).catch(function(error){
    if(timeout){ clearTimeout(timeout); }
    if(!fallbackCode){ throw error; }
    return fetchCloudLeaderboard({countryCode:fallbackCode}).then(function(records){
      return {records:records,countryCode:fallbackCode,countryName:countryDisplayName(fallbackCode)};
    });
  });
}

function submitCloudScore(record){
  if(!CLOUD_LEADERBOARD.enabled || !CLOUD_LEADERBOARD.url || !CLOUD_LEADERBOARD.anonKey || !window.fetch){
    return Promise.reject(new Error("Cloud submit disabled"));
  }
  var url = CLOUD_LEADERBOARD.url.replace(/\/$/,"") + "/functions/v1/submit-score";
  var profile = readProfile();
  return fetch(url,{
    method:"POST",
    headers:cloudHeaders(),
    body:JSON.stringify({
      name:cleanPlayerName(record.name),
      score:Math.floor(record.score || 0),
      packages:Math.floor(record.delivered || 0),
      combo:Math.floor(record.combo || 0),
      accuracy:Math.floor(record.rate || 0),
      device_id:profile.deviceId,
      avatar:profile.avatar,
      country_code:guessedCountryCode(),
      timezone:currentTimezone()
    })
  }).then(function(res){
    if(!res.ok){ throw new Error("Submit " + res.status); }
    return res.json().catch(function(){ return {ok:true}; });
  });
}

  refreshProfileNameDisplay:function(){

      this.profileCursor.x = Math.min(GW/2 + 136,this.profileNameText.x + this.profileNameText.displayWidth / 2 + 13);

  closeProfileDialog:function(reload){
    if(this.profileInputPlace){
      try{ window.removeEventListener("resize",this.profileInputPlace); }catch(e){}
      try{ if(window.visualViewport){ window.visualViewport.removeEventListener("resize",this.profileInputPlace); window.visualViewport.removeEventListener("scroll",lockPageViewport); } }catch(e){}
    }
    this.profileInputPlace = null;
    if(this.profileInput && this.profileInput.parentNode){ this.profileInput.parentNode.removeChild(this.profileInput); }
    this.profileInput = null;
    this.profileLayer && this.profileLayer.destroy(true);
    this.profileLayer = null;
    this.profileNameText = null;
    this.profileCursor = null;
    this.profileAvatarItems = null;
    if(reload){
      if(sceneKey(this) === "GameOverScene" && this.resultData){
        this.scene.restart(Object.assign({},this.resultData,{profileName:readPlayerName(),hasProfile:!!readPlayerName()}));
      }else{
        this.scene.restart();
      }
    }

  saveProfileFromDialog:function(){
    var me = this;
    var profile = readProfile();
    var canEdit = canChangeProfileName(profile);
    var name = cleanEditableName(me.profileInput ? me.profileInput.value : me.profileNameValue);
    if(!name && !profile.name){
      toast(me,"Choose a name first","#ffdf75");
      if(me.profileNameText){
        me.tweens.killTweensOf(me.profileNameText);
        me.profileNameText.setScale(1.12);
        me.tweens.add({targets:me.profileNameText,scale:1,duration:160,ease:"Back.easeOut"});
      }
      if(me.profileInput){
        if(me.profileInputPlace){ me.profileInputPlace(); }
        focusNativeInput(me.profileInput);
      }
      return;
    }
    if(canEdit && name && name !== profile.name){
      profile.name = name;
      profile.nameChangedAt = Date.now();
    }else if(!canEdit){
      name = profile.name;
    }else if(!profile.name && name){
      profile.name = name;
      profile.nameChangedAt = Date.now();
    }
    profile.avatar = me.profileAvatar || profile.avatar || "bolt";
    saveProfile(profile);
    toast(me,"Profile saved","#8ff0bc");
    name = profile.name;
    if(sceneKey(me) === "GameOverScene" && me.resultData && !me.resultData.hasProfile){
      var record = {name:name,score:me.resultData.score || 0,delivered:me.resultData.delivered || 0,combo:me.resultData.combo || 0,hot:me.resultData.hot || 0,rate:me.resultData.rate || 0,countryCode:guessedCountryCode(),time:me.resultData.time || Date.now(),day:todayKey()};
      saveBestRecord(record);
      submitCloudScore(record).catch(function(){});
      me.resultData.autoSaved = true;
    }else{
      var best = updateBestRecordProfile(name);
      if(best && best.score > 0){
        submitCloudScore(best).catch(function(){});
      }
    }
    me.closeProfileDialog(true);
  }
};

  drawTabs:function(active){
    var me = this;
    if(me.tabItems){ me.tabItems.forEach(function(item){ if(item && item.destroy){ item.destroy(); } }); }
    me.tabItems = [];
    function tab(x,w,label,key){
      var selected = active === key;
      var bg = me.add.graphics().setDepth(10);
      bg.fillStyle(selected ? 0x20c879 : 0x0b1520, selected ? 1 : .92).fillRoundedRect(x-w/2,136,w,36,9);

      zone.on("pointerdown",function(){
        if(key === "global"){ me.showGlobalRecords(); }
        else if(key === "local"){ me.showCountryRecords(); }
        else{ me.showLocalRecords(); }
      });
      me.tabItems.push(bg,tx,zone);
    }
    tab(112,116,"Global","global");
    tab(240,116,"Local","local");
    tab(368,116,"Mine","mine");
  },
  showLocalRecords:function(){
    this.drawTabs("mine");
    this.renderRecords(readRecords(),"My records");
  },
  showGlobalRecords:function(){
    var me = this;
    me.drawTabs("global");
    if(!CLOUD_LEADERBOARD.enabled){
      me.drawTabs("mine");
      me.renderRecords(readRecords(),"My records");
      return;
    }
    if(me.boardStatus){ me.boardStatus.setText("Loading Global Top..."); me.boardStatus.setColor("#8ff0bc"); }
    me.renderRecords([],"Loading Global Top...");
    fetchCloudLeaderboard("global").then(function(records){
      if(!me.scene || !me.scene.isActive("RecordsScene")){ return; }
      me.renderRecords(records,"Global Top 50");
    }).catch(function(){
      if(me.boardStatus){ me.boardStatus.setText("Global unavailable - showing mine"); me.boardStatus.setColor("#ffdf75"); }
      me.drawTabs("mine");
      me.renderRecords(readRecords(),"My records");
    });
  },
  showCountryRecords:function(){
    var me = this;
    me.drawTabs("local");
    if(!CLOUD_LEADERBOARD.enabled){
      me.drawTabs("mine");
      me.renderRecords(readRecords(),"My records");
      return;
    }
    if(me.boardStatus){ me.boardStatus.setText("Loading Local Top..."); me.boardStatus.setColor("#ffdf75"); }
    me.renderRecords([],"Loading Local Top...");
    fetchLocalCountryLeaderboard().then(function(result){
      if(!me.scene || !me.scene.isActive("RecordsScene")){ return; }
      var name = countryDisplayName(result.countryCode,result.countryName);
      me.renderRecords(result.records,name + " Top 50");
    }).catch(function(){
      if(me.boardStatus){ me.boardStatus.setText("Local board unavailable"); me.boardStatus.setColor("#ffdf75"); }
      me.renderRecords([],"Local Top 50");
    });
  },
  renderRecords:function(records,label){
    var me = this;
    records = Array.isArray(records) ? records : [];
    if(me.recordItems){
      me.recordItems.forEach(function(item){ if(item && item.destroy){ item.destroy(); } });
    }
    me.recordItems = [];
    var isGlobal = label.indexOf("Global") === 0;
    var isCountry = !isGlobal && label.indexOf("Top 50") > 0;
    var isMine = label.indexOf("My") === 0;
    var isLoading = label.indexOf("Loading") === 0;
    if(me.boardStatus){ me.boardStatus.setText(label); me.boardStatus.setColor((isGlobal || isLoading) ? "#8ff0bc" : "#ffdf75"); }
    if(!records.length){
      var emptyText = isLoading ? (label.indexOf("Local") >= 0 ? "Finding your country board..." : "Loading global scores...") : isMine ? "No best score yet\nSet profile, then finish one run" : isCountry ? "Local board is empty\nSet profile and play to join it" : "Global board is syncing\nSet profile to join automatically";
      me.recordItems.push(me.add.text(GW/2,370,emptyText,{
        fontSize:"18px",color:"#9fb0c1",align:"center",lineSpacing:10
      }).setOrigin(.5));
      return;
    }
    records.slice(0,8).forEach(function(item,index){
      var y = 226 + index * 39;
      var rankColor = index === 0 ? "#ffdf75" : index < 3 ? "#9de6ff" : "#d6e2ee";
      me.recordItems.push(me.add.text(78,y,String(index+1),{fontSize:"20px",color:rankColor,fontStyle:"bold"}).setOrigin(.5));
      if(isGlobal || isCountry){
        if(isCountry){
          var av = drawAvatar(me,118,y,item.avatar || "bolt",false,.68);
          me.recordItems.push(av);
        }else{
          var flagItems = drawRemoteFlag(me,118,y,item.countryCode,function(){
          if(me.scene && me.scene.isActive("RecordsScene")){ me.renderRecords(records,label); }
          });
          me.recordItems = me.recordItems.concat(flagItems);
        }
        var scoreText = me.add.text(390,y,formatScore(item.score || 0) + " pts",{fontSize:"18px",color:index===0?"#ffdf75":"#ffffff",fontStyle:"bold"}).setOrigin(1,.5);
        var nameText = me.add.text(152,y,cleanPlayerName(item.name || "Runner"),{fontSize:"17px",color:"#eaf7ff",fontStyle:"bold"}).setOrigin(0,.5);
        var nameMax = Math.max(74,scoreText.x - scoreText.displayWidth - 18 - nameText.x);
        fitTextWidth(nameText,Math.min(isCountry ? 142 : 132,nameMax),.56);
        me.recordItems.push(nameText);
        me.recordItems.push(scoreText);
      }else{
        var localName = me.add.text(106,y-9,cleanPlayerName(item.name || "Runner"),{fontSize:"13px",color:"#cbd7e3",fontStyle:"bold"}).setOrigin(0,.5);
        fitTextWidth(localName,134,.72);

  update:function(time,delta){
    var me = this;
    if(me.isPaused || me.finished){ return; }
    if(me.modeText){
      me.modeText.setScale(1 + Math.sin(time/420) * .025);
    }
    if(me.rushTimer > 0){
      me.rushTimer -= delta;
      if(me.rushTimer <= 0){ me.taskText.setText("Deliver to the matching portal"); }
    }
    if(me.openingSprintTimer > 0){
      me.openingSprintTimer -= delta;
      if(me.openingSprintTimer <= 0){
        me.spawnDelay = Math.max(1080,me.spawnDelay - 90);
        if(me.packageTimer){ me.packageTimer.delay = me.spawnDelay; }
      }
    }
    if(me.dispatchTimer > 0){
      me.dispatchTimer -= delta;
      if(me.dispatchTimer <= 0){ me.taskText.setText(me.rushTimer > 0 ? "Perfect Route: score x2" : "Deliver to the matching portal"); }
    }
    if(me.autoTimer > 0){ me.autoTimer -= delta; }
    if(me.loopTimer > 0){ me.loopTimer -= delta; }
    if(me.dispatchTimer > 0){
      me.powerText.setText("Dispatch Burst " + Math.ceil(me.dispatchTimer/1000) + "s");
      me.powerText.setColor("#ffdf75");
      me.powerText.setScale(1 + Math.sin(time / 80) * .06);
    }else if(me.autoTimer > 0 || me.loopTimer > 0){
      me.powerText.setText((me.autoTimer > 0 ? "Auto Sort " + Math.ceil(me.autoTimer/1000) + "s" : "") + (me.autoTimer > 0 && me.loopTimer > 0 ? "  |  " : "") + (me.loopTimer > 0 ? "Return Belt " + Math.ceil(me.loopTimer/1000) + "s" : ""));
      me.powerText.setColor(me.autoTimer > 0 ? "#ffdf75" : "#c8b8ff");
      me.powerText.setScale(1 + Math.sin(time / 95) * .045);
    }else{
      me.powerText.setText("Waiting for power-up");
      me.powerText.setColor("#91a0ae");
      me.powerText.setScale(1);
    }
    if(me.trail){
      me.trail.x += (me.player.x - me.trail.x) * .24;
      me.trail.y = me.player.y + 4;
    }
    if(me.engineGlow){
      me.engineGlow.x = me.player.x;
      me.engineGlow.y = me.player.y + 22;
      me.engineGlow.setScale(1 + Math.sin(time/70)*.18);
    }
    if(me.portalGlow){
      var targetLane = me.carry ? colorLaneIndex(me.carry.key) : -1;
      me.portalGlow.forEach(function(glow,i){
        glow.setScale(i === targetLane ? 1.08 : 1);
        glow.setAlpha(i === targetLane ? .12 : .08);
      });
    }
    me.packages.getChildren().forEach(function(pkg){
      if(pkg.glow){ pkg.glow.x = pkg.x; pkg.glow.y = pkg.y; pkg.glow.setAlpha(.10 + Math.sin(time/120 + pkg.y*.02)*.04); }
    });
    me.boosts.getChildren().forEach(function(boost){
      if(boost.aura){ boost.aura.x = boost.x; boost.aura.y = boost.y; boost.aura.setScale(1 + Math.sin(time/100)*.12); }
      if(boost.label){ boost.label.x = boost.x; boost.label.y = boost.y + 25; }
    });
    if(me.challenge && !me.challengeShown && me.score > me.challenge){
      me.challengeShown = true;
      me.score += 50;
      me.floatText(GW/2,150,"Friend beaten +50","#ffdf75");
      toast(me,"Friend beaten. Stretch the lead.","#ffdf75");
      flash(me,0xffdf75,.12,220);
      sfx("boost");
    }
    var newLevel = 1 + Math.floor((me.delivered + me.missed) / 12);
    if(newLevel !== me.level){
      me.level = newLevel;
      me.speed = Math.min(112 + (newLevel-1)*15, 304);
      me.spawnDelay = Math.max(660, 1320 - (newLevel-1)*66);
      if(me.packageTimer){ me.packageTimer.delay = me.spawnDelay; }
      me.modeText.setText("SPEED " + me.level);
      toast(me,"Speed up","#ffdf75");
    }
    me.cleanWorld();
    if(me.autoTimer > 0){ me.autoAssist(); }
    if(me.carry && COLORS[me.lane].key === me.carry.key){ me.deliver(); }
    me.guardPlayerAlignment();
    me.updateCarryBadge();
  },
  rand:function(){
    var next = seededRand(this.rngSeed);
    this.rngSeed = next.seed;
    return next.value;
  },
  randInt:function(min,max){
    return min + Math.floor(this.rand() * (max - min + 1));
  },
  pickColor:function(){
    return COLORS[Math.floor(this.rand() * COLORS.length) % COLORS.length];
  },
  moveLane:function(delta){
    if(this.isPaused){ return; }
    var next = Math.max(0,Math.min(LANE_X.length-1,this.lane + delta));
    if(next === this.lane){ return; }
    var fromX = this.player.x;
    var fromLane = this.lane;
    this.lane = next;
    if(this.laneTween){ this.laneTween.stop(); }
    this.laneTween = this.tweens.add({targets:this.player,x:LANE_X[next],duration:110,ease:"Quad.easeOut",onComplete:function(){ this.laneTween = null; },callbackScope:this});
    this.drawLaneFx();
    var dash = this.add.circle(fromX,this.player.y+2,15,COLORS[fromLane].hex,.22).setDepth(17);
    this.tweens.add({targets:dash,x:LANE_X[next],alpha:0,scaleX:1.65,scaleY:.72,duration:170,ease:"Quad.easeOut",onComplete:function(){dash.destroy();}});
    vibrate(8);
  },
  spawnPackage:function(){

    var c = this.pickColor();
    var lane = this.randInt(0,LANE_X.length-1);
    var pkg = this.packages.create(LANE_X[lane],-36,"pkg_"+c.key).setDepth(12);
    pkg.colorKey = c.key;
    pkg.colorName = c.name;
    pkg.colorHex = c.hex;
    pkg.setVelocityY(this.speed + this.randInt(0,26));
    pkg.setAngularVelocity(this.randInt(-28,28));

    pkg.glow = glow;
  },
  spawnOpeningPackage:function(){
    if(this.isPaused || this.finished || !this.packages || !this.player){ return; }
    if(this.openingDone){ return; }
    this.openingDone = true;
    var c = COLORS[2];
    var lane = this.lane;
    var y = Math.max(190,this.player.y - 265);
    var pkg = this.packages.create(LANE_X[lane],y,"pkg_"+c.key).setDepth(12);
    pkg.colorKey = c.key;
    pkg.colorName = c.name;
    pkg.colorHex = c.hex;
    pkg.setVelocityY(this.speed + 48);
    pkg.setAngularVelocity(24);
    pkg.setScale(1.08);
    var glow = this.add.circle(pkg.x,pkg.y,19,c.hex,.18).setDepth(11);
    pkg.glow = glow;
    this.tweens.add({targets:pkg,scale:1,duration:220,ease:"Back.easeOut"});
    this.bumpScore(this.taskText,1.16);

  spawnBoost:function(){
    if(this.isPaused || this.finished || this.rand() > .62){ return; }
    var lane = this.randInt(0,LANE_X.length-1);
    var roll = this.rand();
    var kind = roll < .46 ? "boost" : roll < .74 ? "auto" : "loop";
    var boost = this.boosts.create(LANE_X[lane],-34,kind).setDepth(13);
    boost.kind = kind;
    boost.setVelocityY(this.speed * .82);
    boost.setAngularVelocity(90);
    boost.aura = this.add.circle(boost.x,boost.y,18,kind === "auto" ? 0xffdf75 : kind === "loop" ? 0x9d7cff : 0x7de4ff,.18).setDepth(12);
    boost.label = this.add.text(boost.x,boost.y+25,kind === "auto" ? "AUTO" : kind === "loop" ? "LOOP" : "x2",{fontSize:"9px",color:"#eaf7ff",fontStyle:"bold",stroke:"#000",strokeThickness:2}).setOrigin(.5).setDepth(14);
  },
  collectPackage:function(player,pkg){
    var me = this;
    if(me.carry){
      me.missPackage(pkg,"Jam -1");
      return;
    }
    me.carry = {key:pkg.colorKey,name:pkg.colorName,hex:pkg.colorHex,hot:COLORS[me.lane].key === pkg.colorKey};
    if(pkg.glow){ pkg.glow.destroy(); }
    pkg.destroy();
    var targetLane = colorLaneIndex(me.carry.key);
    me.taskText.setText("Deliver to " + me.carry.name);
    me.refreshPlayerStyle();
    me.hintTargetPortal(targetLane,me.carry.hex);
    me.carryHint(targetLane,me.carry);
    me.collectFx(me.carry.hex);

  collectBoost:function(player,boost){
    var kind = boost.kind || "boost";
    if(boost.aura){ boost.aura.destroy(); }
    if(boost.label){ boost.label.destroy(); }
    boost.destroy();
    if(kind === "auto"){
      this.autoTimer = 6200;
      this.taskText.setText("Auto Sort: system takeover");
      this.floatText(player.x,player.y-42,"Auto Sort 6s","#ffdf75");
      this.powerText.setText("Auto 6s");
      this.powerBanner("Auto Sort", "6s auto pickup and matching delivery", 0xffdf75, "auto");
      this.powerBurst(player.x,player.y,0xffdf75);
      this.bumpScore(this.powerText,1.32);
      sfx("combo");
      vibrate([12,18,12]);
      return;
    }
    if(kind === "loop"){
      this.loopTimer = 7600;
      this.taskText.setText("Return Belt: missed packages return");
      this.floatText(player.x,player.y-42,"Return Belt 8s","#c8b8ff");
      this.powerText.setText("Loop 8s");
      this.powerBanner("Return Belt", "Missed packages return for 8s", 0x9d7cff, "loop");
      this.powerBurst(player.x,player.y,0x9d7cff);
      this.bumpScore(this.powerText,1.32);
      sfx("boost");
      vibrate([12,18,12]);
      return;
    }
    this.rushTimer = 5000;
    var healed = false;
    if(this.capacity < this.maxCapacity){
      this.capacity++;
      healed = true;
      this.updateHud();
    }
    this.taskText.setText("Neon Overtime: score x2");
    this.floatText(player.x,player.y-42,healed ? "Overtime x2 +1" : "Overtime x2 Full","#7de4ff");
    this.powerText.setText(healed ? "x2 5s +1" : "x2 5s");
    this.powerBanner("Neon Overtime", healed ? "5s double score and +1 capacity" : "5s double score; capacity full", 0x7de4ff, "boost");
    this.powerBurst(player.x,player.y,0x7de4ff);
    this.bumpScore(this.scoreText,1.12);
    this.bumpScore(this.capacityText,1.18);
    sfx("boost");
    vibrate([16,24,16]);
  },
  autoAssist:function(){
    var me = this;
    if(me.carry){
      var target = COLORS.findIndex ? COLORS.findIndex(function(c){return c.key === me.carry.key;}) : -1;
      if(target >= 0 && target !== me.lane){ me.moveLane(target - me.lane); }
      return;
    }
    var best = null, bestY = -9999;
    me.packages.getChildren().forEach(function(pkg){
      if(pkg.y > 30 && pkg.y < me.player.y + 28 && pkg.y > bestY){
        best = pkg;
        bestY = pkg.y;
      }
    });
    if(best){
      var targetLane = laneOfX(best.x);
      if(targetLane !== me.lane){ me.moveLane(targetLane - me.lane); }
    }
  },
  deliver:function(){
    if(!this.carry){ return; }
    this.clearTargetHint();
    var comboBonus = Math.min(this.combo,10) * 2;
    var rushBonus = this.rushTimer > 0 ? 2 : 1;
    var dispatchBonus = this.dispatchTimer > 0 ? 2 : 1;
    var hot = !!this.carry.hot;
    if(hot){ this.hotStreak++; }else{ this.hotStreak = 0; }
    this.maxHotStreak = Math.max(this.maxHotStreak,this.hotStreak);
    var gain = (24 + comboBonus + (hot ? 18 : 0) + Math.min(this.hotStreak,5) * 3) * rushBonus * dispatchBonus;
    this.score += gain;
    this.delivered++;
    this.combo++;
    this.maxCombo = Math.max(this.maxCombo,this.combo);
    this.floatText(this.player.x,this.player.y-54,(hot ? "Hotline +" : "+") + gain,this.carry.hex === 0xffcf45 ? "#ffdf75" : "#ffffff");
    this.pulsePortal(this.lane,this.carry.hex);
    this.spark(this.player.x,GH-74,this.carry.hex,6 + Math.min(this.combo,8));
    if(hot){ this.hotLineFx(this.carry.hex); }
    if(hot && !this.firstHotShown){
      this.firstHotShown = true;
      this.score += 80;
      this.taskText.setText("Hot route found: direct delivery");
      this.floatText(GW/2,138,"Hot Route +80","#ffdf75");
      flash(this,this.carry.hex,.14,220);
      sfx("combo");
    }
    if(hot && this.hotStreak === 3){
      this.dispatchTimer = 4200;
      this.taskText.setText("Dispatch Burst: score x2");
      this.comboText.setText("Dispatch Burst x3");
      this.powerBurst(this.player.x,this.player.y,this.carry.hex);
      toast(this,"Dispatch Burst active","#ffdf75");
    }
    if(!(hot && this.hotStreak === 3)){
      this.comboText.setText(this.combo >= 2 ? "Combo x" + this.combo : "");
    }
    this.comboText.setScale(1.24);
    this.tweens.add({targets:this.comboText,scale:1,duration:180,ease:"Back.easeOut"});
    if(this.combo > 0 && this.combo % 5 === 0){
      this.rewardBurst();
    }
    if(this.combo > 0 && this.combo % 6 === 0){
      this.rushTimer = 5000;
      this.taskText.setText("Perfect Route: score x2");
      this.comboText.setText("Burst x" + this.combo);
      this.spark(this.player.x,this.player.y-22,0xffdf75,14);
      flash(this,0xffdf75,.12,200);
      sfx("combo");
    }
    if(this.capacity <= 1){
      this.clutchStreak++;
      if(!this.clutchShown && this.clutchStreak >= 3){
        this.clutchShown = true;
        this.capacity = Math.min(this.maxCapacity,this.capacity + 1);
        this.score += 120;
        this.taskText.setText("Clutch Save: +1 capacity");
        this.floatText(GW/2,132,"Clutch Save +120","#7de4ff");
        this.powerBurst(this.player.x,this.player.y,0x7de4ff);
        this.bumpScore(this.capacityText,1.22);
      }
    }else{
      this.clutchStreak = 0;
    }
    this.carry = null;
    this.refreshPlayerStyle();
    this.drawLaneFx();
    this.updateHud();
    this.checkPositiveGoals();

  checkPositiveGoals:function(){
    if(this.challenge){
      var delta = Math.ceil(this.challenge - this.score);
      this.goalText.setText(delta > 0 ? "Friend " + this.challenge + " | " + delta + " pts behind" : "Ahead by " + Math.abs(delta));
    }
    if(!this.challenge && this.bestScore > 0 && this.score >= Math.max(1,this.bestScore - 260) && this.score < this.bestScore){
      var left = Math.max(1,Math.ceil(this.bestScore - this.score));
      this.goalText.setText("Best: " + left + " pts behind");
      if(!this.bestHintShown){
        this.bestHintShown = true;
        this.recordSprint = true;
        this.taskText.setText("Best push: every point counts");
        toast(this,"Best push active","#8ff0bc");
        flash(this,0x8ff0bc,.10,180);
        this.bumpScore(this.goalText,1.22);
      }
    }
    if(!this.challenge && this.bestScore > 0 && !this.bestBeatenShown && this.score > this.bestScore){
      this.bestBeatenShown = true;
      this.goalText.setText("New best in progress");
      this.score += 80;
      this.floatText(GW/2,94,"New Best +80","#ffdf75");

      if(me.startGuide){ me.hideStartGuide(); }
      me.tweens.pauseAll();
      if(me.laneTween){ me.laneTween.stop(); me.laneTween = null; }
      if(me.player){ me.player.x = LANE_X[me.lane]; }
      if(me.trail){ me.trail.x = me.player.x; me.trail.y = me.player.y + 4; }
      if(me.engineGlow){ me.engineGlow.x = me.player.x; me.engineGlow.y = me.player.y + 22; }
      me.updateCarryBadge();
      me.drawLaneFx();
      me.pauseLayer = me.add.container(0,0).setDepth(120);

      me.pauseLayer.add([resume.bg,resume.text,resume.zone]);

  finishGame:function(){
    if(this.finished){ return; }
    this.finished = true;
    this.clearTargetHint();
    if(this.packageTimer){ this.packageTimer.remove(false); }
    if(this.boostTimer){ this.boostTimer.remove(false); }
    var total = this.delivered + this.missed;
    var rate = total ? Math.round(this.delivered / total * 100) : 0;
    var finalScore = Math.floor(this.score);
    var prevBest = this.bestScore || 0;
    var playerName = readPlayerName();
    var recordTime = Date.now();
    var record = {name:playerName,score:finalScore,delivered:this.delivered,combo:this.maxCombo,hot:this.maxHotStreak,rate:rate,time:recordTime,day:todayKey()};
    var profile = readProfile();
    var saveResult = {saved:false,records:readRecords(),best:readRecords()[0] || null};
    if(profile.name && finalScore > 0){
      record.name = profile.name;
      record.countryCode = guessedCountryCode();
      saveResult = saveBestRecord(record);
      saveDaily(record);
      if(saveResult.saved){
        submitCloudScore(record).catch(function(){});
      }
    }
    var records = saveResult.records || readRecords();
    var rank = 0;
    for(var i=0;i<records.length;i++){
      if(records[i].time && records[i].score === finalScore){ rank = i + 1; break; }
    }
    this.scene.start("GameOverScene",{name:playerName,score:finalScore,combo:this.maxCombo,hot:this.maxHotStreak,rate:rate,delivered:this.delivered,challenge:this.challenge,prevBest:prevBest,rank:rank,time:recordTime,profileName:profile.name,autoSaved:saveResult.saved,hasProfile:!!profile.name});
  }
};

var GameOverScene = {
  key:"GameOverScene",
  create:function(data){
    activeScene = this;
    var me = this;
    var won = data.challenge && data.score > data.challenge;
    var goal = nextScoreGoal(data.score || 0);
    var title = goal ? "Record Chaser" : "Portal Chief";
    var pct = beatPercent(data.score || 0);
    var hint = resultHint(data);
    var retry = retryLabel(data);
    var playerName = cleanEditableName(data.profileName || data.name || readPlayerName());
    var displayName = playerName || "New Runner";
    gradientBackground(me);
    var panelH = 638;
    var panelTop = Math.max(28,Math.round((GH - panelH) / 2) - 12);
    var panel = me.add.graphics();
    panel.fillStyle(0x061018,.72).fillRoundedRect(58,panelTop,GW-116,panelH,22);
    panel.lineStyle(2,0xffffff,.11).strokeRoundedRect(58,panelTop,GW-116,panelH,22);
    panel.fillStyle(0xffffff,.04).fillRoundedRect(78,panelTop+118,GW-156,132,18);
    panel.fillStyle(0x071018,.50).fillRoundedRect(78,panelTop+274,GW-156,72,16);
    panel.fillStyle(0xffdf75,.085).fillRoundedRect(82,panelTop+370,GW-164,58,14);
    panel.lineStyle(1,0xffdf75,.22).strokeRoundedRect(82,panelTop+370,GW-164,58,14);
    panel.lineStyle(1,0xffffff,.075).lineBetween(100,panelTop+262,GW-100,panelTop+262).lineBetween(100,panelTop+360,GW-100,panelTop+360);
    me.add.image(GW/2,panelTop+38,"shuttle").setScale(1.02).setAlpha(.88);
    me.add.text(GW/2,panelTop+84,won ? "Friend Beaten" : ((data.prevBest || 0) < (data.score || 0) ? "New Best" : "Run Over"),{fontSize:"30px",color:won ? "#ffdf75" : "#eaf7ff",fontStyle:"bold",stroke:"#2a0b12",strokeThickness:5}).setOrigin(.5);
    me.add.text(GW/2,panelTop+154,String(data.score || 0),{fontSize:"53px",color:"#ffdf75",fontStyle:"bold",stroke:"#221909",strokeThickness:4}).setOrigin(.5);
    me.add.text(GW/2,panelTop+192,"score",{fontSize:"17px",color:"#ffdf75",fontStyle:"bold",stroke:"#221909",strokeThickness:3}).setOrigin(.5);
    me.add.text(GW/2,panelTop+214,title,{fontSize:"19px",color:"#8ff0bc",fontStyle:"bold",stroke:"#000",strokeThickness:3}).setOrigin(.5);
    me.add.text(GW/2,panelTop+240,displayName + "  |  Delivered " + (data.delivered || 0) + "  |  beats " + pct + "%",{fontSize:"14px",color:"#cbd7e3",fontStyle:"bold"}).setOrigin(.5);
    [
      {x:128,t:"Combo",v:"x" + (data.combo || 0),c:"#8ff0bc"},
      {x:240,t:"Packages",v:String(data.delivered || 0),c:"#ffdf75"},
      {x:352,t:"Accuracy",v:(data.rate || 0) + "%",c:"#7de4ff"}
    ].forEach(function(item){
      me.add.text(item.x,panelTop+300,item.v,{fontSize:"20px",color:item.c,fontStyle:"bold",stroke:"#000",strokeThickness:3}).setOrigin(.5);
      me.add.text(item.x,panelTop+326,item.t,{fontSize:"12px",color:"#91a0ae",fontStyle:"bold"}).setOrigin(.5);
    });
    var saveHint = playerName ? ((data.score || 0) <= 0 ? "Deliver one package to start your device best." : (data.autoSaved ? "New device best saved automatically." : "Only your best score is kept for this device.")) : "Set a profile name to save your best score.";
    var hintText = me.add.text(GW/2,panelTop+399,saveHint,{
      fontSize:"14px",color:"#ffdf75",fontStyle:"bold",stroke:"#000",strokeThickness:3,
      wordWrap:{width:GW-176,useAdvancedWrap:true},align:"center",lineSpacing:3
    }).setOrigin(.5);
    fitTextBox(hintText,GW-184,40,.70);
    var buttonY = panelTop + 456;
    var buttonGap = 44;
    var buttonW = 232;
    makeButton(me,GW/2,buttonY,buttonW,retry,0x20c879,function(){me.scene.start("PlayScene");});
    makeButton(me,GW/2,buttonY + buttonGap,buttonW,"Challenge Friend",0xffcf45,function(){
      var url = shareUrl(data.delivered || 0,data.score || 0);
      if(navigator.share){
        navigator.share({title:"Neon Sort Rush",text:"I scored " + (data.score || 0) + " in Neon Sort Rush. Can you beat me?",url:url}).catch(function(){});
      }else if(navigator.clipboard){
        navigator.clipboard.writeText(url).then(function(){toast(me,"Challenge link copied","#fff");});
      }else{ toast(me,url,"#fff"); }
    });
    me.resultData = data;
    me.showProfileDialog = MenuScene.showProfileDialog;
    me.closeProfileDialog = MenuScene.closeProfileDialog;
    me.refreshProfileNameDisplay = MenuScene.refreshProfileNameDisplay;
    me.saveProfileFromDialog = MenuScene.saveProfileFromDialog;
    makeButton(me,GW/2,buttonY + buttonGap * 2,buttonW,playerName ? "Profile" : "Set Profile",0xf3a326,function(){
      me.showProfileDialog();
    });
    makeButton(me,GW/2,buttonY + buttonGap * 3,buttonW,"Menu",0x4a8fe7,function(){me.scene.start("MenuScene");});
  }
};

var config = {
  type:Phaser.AUTO,
  width:GW,
  height:GH,
  parent:"gw",
  backgroundColor:"#080d13",
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},
  physics:{default:"arcade",arcade:{gravity:{y:0},debug:false}},
  scene:[BootScene,MenuScene,RecordsScene,PlayScene,GameOverScene]
};

new Phaser.Game(config);
</script>
</body>
</html>
