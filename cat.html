<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Cat Escape!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#120822;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;touch-action:none;font-family:'Segoe UI',Arial,sans-serif}
canvas{display:block;max-width:100%;max-height:100%}
</style>
</head>
<body>
<div id="gw"></div>
<script src="./phaser.min.js"></script>
<script>
var W=480,H=720;
var BK='dodgeMasterHS',RK='dodgeMasterRC';

/* ========== STORY INTRO - CHASE SCENE ========== */
var StoryScene={
  key:'Story',
  create:function(){
    var s=this,mx=W/2,my=H/2;
    s.cameras.main.setBackgroundColor('#0e0620');

    // === RUNNING TABBY CAT (center) ===
    var catG=s.add.graphics();
    // body base (orange)
    catG.fillStyle(0xee7722,1);
    catG.fillEllipse(42,52,58,40);
    // dark stripes on body
    catG.fillStyle(0xcc5500,0.7);
    catG.fillRect(22,38,6,20);
    catG.fillRect(34,32,5,24);
    catG.fillRect(46,30,5,26);
    catG.fillRect(58,35,6,20);
    // belly (lighter)
    catG.fillStyle(0xffbb66,0.85);
    catG.fillEllipse(48,60,30,18);
    // head base
    catG.fillStyle(0xee7722,1);
    catG.fillCircle(72,38,25);
    // head stripes
    catG.fillStyle(0xcc5500,0.65);
    catG.fillRect(56,22,4,16);
    catG.fillRect(66,18,4,18);
    catG.fillRect(76,20,4,17);
    catG.fillRect(86,25,4,14);
    // forehead M shape
    catG.lineStyle(2.5,0xcc5500,0.6);
    catG.beginPath();catG.moveTo(62,22);catG.lineTo(68,28);catG.lineTo(72,23);catG.lineTo(76,28);catG.lineTo(82,22);catG.strokePath();
    // ears
    catG.fillStyle(0xee7722,1);
    catG.fillTriangle(54,20,66,0,70,22);
    catG.fillTriangle(84,18,90,0,94,21);
    // inner ears (pink)
    catG.fillStyle(0xff8899,1);
    catG.fillTriangle(58,18,65,5,68,20);
    catG.fillTriangle(86,16,89,5,92,19);
    // face white area
    catG.fillStyle(0xffeedd,0.9);
    catG.fillEllipse(72,46,20,14);
    // eyes (half-closed confident like the image)
    catG.fillStyle(0xffffff,1);
    catG.fillEllipse(62,36,10,7);catG.fillEllipse(82,36,10,7);
    // pupils (looking to side)
    catG.fillStyle(0x222222,1);
    catG.fillCircle(66,37,3.5);catG.fillCircle(79,37,3.5);
    // eye shine
    catG.fillStyle(0xffffff,1);
    catG.fillCircle(67,35.5,1.2);catG.fillCircle(80,35.5,1.2);
    // nose
    catG.fillStyle(0xff5577,1);
    catG.fillTriangle(68,44,76,44,72,49);
    // mouth (smirk)
    catG.lineStyle(1.5,0xaa3344,1);
    catG.beginPath();catG.moveTo(68,50);catG.lineTo(72,53);catG.lineTo(76,50);catG.strokePath();
    // whiskers
    catG.lineStyle(1.2,0xddccaa,0.55);
    catG.beginPath();catG.moveTo(48,42);catG.lineTo(58,45);catG.strokePath();
    catG.beginPath();catG.moveTo(46,48);catG.lineTo(58,50);catG.strokePath();
    catG.beginPath();catG.moveTo(96,42);catG.lineTo(86,45);catG.strokePath();
    catG.beginPath();catG.moveTo(98,48);catG.lineTo(86,50);catG.strokePath();
    // tail (striped, curving up)
    catG.lineStyle(6,0xee7722,1);
    catG.beginPath();catG.moveTo(12,48);catG.lineTo(-2,28);catG.lineTo(6,10);catG.lineTo(18,-2);catG.strokePath();
    // tail stripes
    catG.lineStyle(3,0xcc5500,0.7);
    catG.beginPath();catG.moveTo(6,15);catG.lineTo(11,13);catG.strokePath();
    catG.beginPath();catG.moveTo(1,25);catG.lineTo(7,23);catG.strokePath();
    // front legs (stretched forward)
    catG.fillStyle(0xee7722,1);
    catG.fillEllipse(58,74,16,10);
    catG.fillEllipse(78,72,16,9);
    // front paws (lighter)
    catG.fillStyle(0xffcc88,1);
    catG.fillEllipse(58,79,12,7);
    catG.fillEllipse(78,77,12,7);
    // back legs (pushing off)
    catG.fillStyle(0xcc5500,1);
    catG.fillEllipse(20,72,18,12);
    catG.fillStyle(0xee7722,1);
    catG.fillEllipse(30,78,14,9);
    // back paw
    catG.fillStyle(0xffcc88,1);
    catG.fillEllipse(30,83,11,6);
    // motion lines behind cat
    catG.lineStyle(2.5,0x553377,0.35);
    for(var li=0;li<6;li++){
      catG.beginPath();
      catG.moveTo(12-li*9,28+li*7);
      catG.lineTo(-4-li*9,26+li*7);
      catG.strokePath();
    }
    // dust paws on ground
    catG.fillStyle(0x997755,0.25);
    catG.fillEllipse(20,92,14,6);
    catG.fillEllipse(42,90,12,5);
    catG.fillEllipse(68,89,14,6);

    catG.generateTexture('story_cat',110,100);
    catG.clear();catG.destroy();

    var catSprite=s.add.sprite(mx-40,my+30,'story_cat');
    catSprite.setScale(1.5);

    // === FLYING SLIPPER (showing SOLE - like reference image!) ===
    var slpG=s.add.graphics();

    // Sole bottom (the visible part when thrown - with tread pattern!)
    slpG.fillStyle(0xddccaa,1);  // rubber sole color (beige/tan)
    slpG.fillRoundedRect(0,4,64,36,10);

    // TREAD PATTERN on sole (zigzag lines like real shoe sole)
    slpG.lineStyle(1.2,0xbbaa88,0.8);
    // horizontal wavy lines
    for(var ti=0;ti<5;ti++){
      var ty=10+ti*6;
      slpG.beginPath();
      slpG.moveTo(6,ty);
      for(var tx=6;tx<58;tx+=8){
        slpG.lineTo(tx+4,ty+2.5);
        slpG.lineTo(tx+8,ty);
      }
      slpG.strokePath();
    }
    // vertical tread lines at heel and toe
    slpG.beginPath();
    slpG.moveTo(8,6);slpG.lineTo(8,38);
    slpG.moveTo(16,6);slpG.lineTo(16,36);
    slpG.moveTo(48,6);slpG.lineTo(48,36);
    slpG.moveTo(56,6);slpG.lineTo(56,38);
    slpG.strokePath();

    // Heel pad (thicker rubber)
    slpG.fillStyle(0xccbb99,1);
    slpG.fillRoundedRect(2,28,20,14,4);
    slpG.lineStyle(1,0xaa9977,0.6);
    slpG.strokeRoundedRect(2,28,20,14,4);

    // Toe pad area
    slpG.fillStyle(0xccbb99,1);
    slpG.fillRoundedRect(46,4,16,32,4);
    slpG.lineStyle(1,0xaa9977,0.6);
    slpG.strokeRoundedRect(46,4,16,32,4);

    // Upper part of slipper (visible from side - pink fabric)
    slpG.fillStyle(0xff4488,1);
    slpG.fillRoundedRect(0,-16,64,22,8);

    // Pink fabric top surface
    slpG.fillStyle(0xff66aa,0.8);
    slpG.fillRect(4,-12,56,14);

    // Opening (dark inside)
    slpG.fillStyle(0x220818,1);
    slpG.fillEllipse(18,-4,18,8);

    // Strap across top
    slpG.fillStyle(0xdd3377,1);
    slpG.fillRect(14,-8,38,5);

    // Fabric outline
    slpG.lineStyle(1.5,0xcc2266,1);
    slpG.strokeRoundedRect(0,-16,64,22,8);

    // Sole outline (thick)
    slpG.lineStyle(2,0x998866,1);
    slpG.beginPath();slpG.moveTo(2,4);slpG.lineTo(2,40);slpG.lineTo(62,40);slpG.lineTo(62,4);slpG.strokePath();
    slpG.strokeRoundedRect(0,4,64,36,10);

    // Brand text on sole (fun detail)
    slpG.lineStyle(1,0x887755,0.5);
    // simple "CAT" text approximation with lines

    // Motion blur lines around slipper
    slpG.lineStyle(2.5,0xff6699,0.45);
    for(var si=0;si<5;si++){
      slpG.beginPath();
      slpG.moveTo(66+si*7,4+si*7);
      slpG.lineTo(76+si*7,2+si*7);
      slpG.strokePath();
    }

    slpG.generateTexture('story_slipper_big',82,56);
    slpG.clear();slpG.destroy();

    var slipSprite=s.add.sprite(mx-200,my+20,'story_slipper_big');
    slipSprite.setScale(1.4);

    // === ANGRY OWNER (upper right) ===
    var ownG=s.add.graphics();
    // head
    ownG.fillStyle(0xffddbb,1);
    ownG.fillCircle(32,32,26);
    // hair (dark, messy angry hair)
    ownG.fillStyle(0x332211,1);
    ownG.fillEllipse(32,8,50,20);
    ownG.fillRect(6,4,52,12);
    // ANGRY EYEBROWS (thick, diagonal)
    ownG.lineStyle(4,0x332211,1);
    ownG.beginPath();ownG.moveTo(8,18);ownG.lineTo(28,28);ownG.strokePath();
    ownG.beginPath();ownG.moveTo(56,18);ownG.lineTo(36,28);ownG.strokePath();
    // eyes (angry, narrowed)
    ownG.fillStyle(0xffffff,1);
    ownG.fillCircle(22,34,7);ownG.fillCircle(42,34,7);
    ownG.fillStyle(0x332211,1);
    ownG.fillCircle(24,35,4);ownG.fillCircle(40,35,4);
    // mouth (shouting/open)
    ownG.fillStyle(0xcc3344,1);
    ownG.fillEllipse(32,50,12,8);
    // teeth hint
    ownG.fillStyle(0xffffff,1);
    ownG.fillRect(28,48,8,3);
    // neck/body
    ownG.fillStyle(0xeeddcc,1);
    ownG.fillRoundedRect(20,58,24,20,6);
    // arm throwing (extended toward cat)
    ownG.fillStyle(0xeeddcc,1);
    ownG.fillRoundedRect(38,52,36,16,6);
    // hand/fist
    ownG.fillStyle(0xffddbb,1);
    ownG.fillCircle(78,60,10);
    // steam/anger marks above head
    ownG.lineStyle(2,0x888888,0.6);
    ownG.beginPath();ownG.moveTo(16,-4);ownG.lineTo(12,-12);ownG.lineTo(20,-10);ownG.strokePath();
    ownG.beginPath();ownG.moveTo(48,-4);ownG.lineTo(52,-12);ownG.lineTo(44,-10);ownG.strokePath();
    ownG.beginPath();ownG.moveTo(32,-8);ownG.lineTo(32,-18);ownG.strokePath();

    ownG.generateTexture('story_owner',95,85);
    ownG.clear();ownG.destroy();

    var ownerSprite=s.add.sprite(mx+155,my-90,'story_owner');
    ownerSprite.setScale(1.15);

    // === ANIMATIONS ===

    // Cat running bounce
    s.tweens.add({
      targets:catSprite,
      y:my+12,
      duration:220,yoyo:true,ease:'Sine.easeInOut',loop:-1,
      onRepeat:function(){catSprite.angle=(catSprite.angle===0?-4:0);}
    });

    // Slipper spinning/chasing (tumbling through air!)
    slipSprite.angle=-20;
    s.tweens.add({
      targets:slipSprite,
      angle:25,duration:130,yoyo:true,ease:'Sine.easeInOut',loop:-1
    });
    // slipper gets closer
    s.tweens.add({
      targets:slipSprite,
      x:mx-120,y:my+10,
      duration:2200,ease:'Cubic.easeOut',
      delay:400,onComplete:function(){
        s.cameras.main.shake(350,0.012);
        s.tweens.add({
          targets:catSprite,scaleX:1.6,scaleY:1.4,
          duration:120,yoyo:true,loop:-1
        });
      }
    });

    // Owner shaking with rage
    s.tweens.add({
      targets:ownerSprite,
      x:mx+148,duration:70,yoyo:true,loop:-1
    });
    ownerSprite.angle=6;
    s.tweens.add({
      targets:ownerSprite,
      angle:-6,duration:90,yoyo:true,loop:-1
    });

    // === TEXT ===
    s.add.text(mx,70,'CAT ESCAPE!',{
      fontSize:'42px',fill:'#ffaa33',fontStyle:'bold',
      fontFamily:'Arial Black',stroke:'#000000',strokeThickness:4
    }).setOrigin(0.5);

    s.add.text(mx,118,'She found the broken vase...',{
      fontSize:'17px',fill:'#ff6699',fontStyle:'italic'
    }).setOrigin(0.5);

    s.add.text(mx,H-135,'Dodge her slippers & collect coins to survive!',{
      fontSize:'16px',fill:'#bbaadd',align:'center'
    }).setOrigin(0.5);

    var tap=s.add.text(mx,H-75,'TAP TO START >',{
      fontSize:'22px',fill:'#ffffff',fontStyle:'bold',
      stroke:'#ff8844',strokeThickness:3
    }).setOrigin(0.5);
    s.tweens.add({targets:tap,alpha:0.3,duration:500,yoyo:true,loop:-1});

    var excl=s.add.text(mx+120,my-175,'!!!',{fontSize:'36px',fill:'#ff3333',fontStyle:'bold'});
    s.tweens.add({targets:excl,scale:1.35,duration:180,yoyo:true,loop:-1});

    s.input.on('pointerdown',function(){
      s.cameras.main.fade(400,14,6,32);
      s.time.delayedCall(400,function(){s.scene.start('Menu')});
    });
    s.cameras.main.flash(300);
  }
};

/* ========== MENU ========== */
var MenuScene={
  key:'Menu',
  create:function(){
    var s=this,mx=W/2;
    s.add.text(mx,85,'CAT ESCAPE!',{fontSize:'44px',fill:'#ffaa33',fontStyle:'bold',fontFamily:'Arial Black'}).setOrigin(0.5);
    s.add.text(mx,135,'Dodge slippers & collect coins!',{fontSize:'15px',fill:'#8877aa'}).setOrigin(0.5);
    s.add.rectangle(mx,170,300,2,0x442266).setOrigin(0.5);
    function btn(y,label,color,action){
      var bg=s.add.rectangle(mx,y,200,40,color,0.9).setStrokeStyle(2,0xffffff,0.3).setInteractive({useHandCursor:true});
      var tx=s.add.text(mx,y,label,{fontSize:'18px',fill:'#000',fontStyle:'bold'}).setOrigin(0.5);
      bg.on('pointerdown',action);
      bg.on('pointerover',function(){bg.setFillStyle(color,1);bg.setScale(1.05)});
      bg.on('pointerout',function(){bg.setFillStyle(color,0.9);bg.setScale(1)});
      return{bg:bg,tex:tx};
    }
    btn(230,'START GAME',0xff8844,function(){s.scene.start('Play')});
    btn(290,'RECORDS',0xeebb00,function(){s.scene.start('Records')});
    btn(350,'SHARE LINK',0xaa55ff,function(){
      if(navigator.clipboard)navigator.clipboard.writeText(location.href)
        .then(function(){
          var ok=s.add.text(mx,405,'Link copied!',{fontSize:'14px',fill:'#ffaa33',fontStyle:'bold'}).setOrigin(0.5);
          s.tweens.add({targets:ok,alpha:0,delay:1500,duration:500,onComplete:function(){ok.destroy()}});
        });
      else prompt('Copy this link:',location.href);
    });
    s.add.text(mx,H-30,'Arrow keys or touch to move',{fontSize:'12px',fill:'#554466'}).setOrigin(0.5);
  }
};

/* ========== RECORDS ========== */
var RecordsScene={
  key:'Records',
  create:function(){
    var s=this,mx=W/2;
    s.add.rectangle(W/2,H/2,W,H,0x100820,0.95);
    s.add.text(mx,70,'RECORDS',{fontSize:'28px',fill:'#ffcc00',fontStyle:'bold'}).setOrigin(0.5);
    s.add.rectangle(mx,98,320,2,0x332244).setOrigin(0.5);
    try{
      var recs=JSON.parse(localStorage.getItem(RK))||[];
      if(recs.length===0){
        s.add.text(mx,H/2,'No records yet!\\nPlay a game to set one.',{fontSize:'18px',color:'#665577',align:'center'}).setOrigin(0.5);
      } else {
        for(var i=0;i<recs.length&&i<10;i++){
          var medal=i===0?'GOLD':i===1?'SILVER':i===2?'BRONZE':'#'+(i+1);
          var col=i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':'#aa99bb';
          var scoreVal = recs[i].sc !== undefined ? recs[i].sc : recs[i].s;
          s.add.text(mx,140+i*34,medal+'  '+scoreVal+' pts',{fontSize:'17px',fill:col}).setOrigin(0.5);
        }
      }
    }catch(e){}
    var bb=s.add.rectangle(mx,H-70,130,42,0xdd4444,0.9).setInteractive({useHandCursor:true});
    s.add.text(mx,H-70,'BACK TO MENU',{fontSize:'16px',fill:'#fff',fontStyle:'bold'}).setOrigin(0.5);
    bb.on('pointerdown',function(){s.scene.start('Menu')});
  }
};

/* ========== PLAY ========== */
var PlayScene={
  key:'Play',
  init:function(){
    this.score=0;this.lives=3;this.baseSpeed=140;
    this.enemies=[];this.coins=[];
    this.isOver=false;this.spawnTimer=null;this.coinTimer=null;
  },
  create:function(){
    var s=this;
    s.physics.world.setBounds(0,0,W,H);

    // === PLAYER: tabby cat with stripes ===
    var pg=s.add.graphics();
    // body
    pg.fillStyle(0xee7722,1);pg.fillCircle(16,20,13);
    pg.fillStyle(0xcc5500,0.7);
    pg.fillRect(10,10,4,14);pg.fillRect(16,7,4,16);pg.fillRect(22,9,4,14);
    // belly
    pg.fillStyle(0xffbb66,0.8);pg.fillEllipse(16,25,14,7);
    // head
    pg.fillStyle(0xee7722,1);pg.fillCircle(16,10,11);
    // head stripes
    pg.fillStyle(0xcc5500,0.5);
    pg.fillRect(8,3,3,7);pg.fillRect(13,1,3,8);pg.fillRect(18,1,3,8);pg.fillRect(23,3,3,7);
    // ears
    pg.fillStyle(0xee7722,1);
    pg.fillTriangle(4,3,10,-4,12,4);
    pg.fillTriangle(22,3,28,-4,20,4);
    pg.fillStyle(0xff8899,1);
    pg.fillTriangle(6,2,10,-2,11,3);
    pg.fillTriangle(24,2,28,-2,21,3);
    // face white
    pg.fillStyle(0xffeedd,0.85);pg.fillEllipse(16,15,14,9);
    // eyes
    pg.fillStyle(0xffffff,1);
    pg.fillEllipse(11,11,5,4);pg.fillEllipse(21,11,5,4);
    pg.fillStyle(0x222222,1);
    pg.fillCircle(12,11.5,2.2);pg.fillCircle(20,11.5,2.2);
    pg.fillStyle(0xffffff,1);
    pg.fillCircle(11.5,10.5,0.8);pg.fillCircle(19.5,10.5,0.8);
    // nose
    pg.fillStyle(0xff5577,1);
    pg.fillTriangle(13,15,19,15,16,18);
    // mouth
    pg.lineStyle(1,0xaa3344,1);
    pg.beginPath();pg.moveTo(13,19);pg.lineTo(16,21);pg.lineTo(19,19);pg.strokePath();
    // whiskers
    pg.lineStyle(0.8,0xddccaa,0.5);
    pg.beginPath();pg.moveTo(3,14);pg.lineTo(9,16);pg.strokePath();
    pg.beginPath();pg.moveTo(2,17);pg.lineTo(9,18);pg.strokePath();
    pg.beginPath();pg.moveTo(29,14);pg.lineTo(23,16);pg.strokePath();
    pg.beginPath();pg.moveTo(30,17);pg.lineTo(23,18);pg.strokePath();
    // tail
    pg.lineStyle(3,0xee7722,1);
    pg.beginPath();pg.moveTo(3,20);pg.lineTo(-4,10);pg.lineTo(2,2);pg.strokePath();
    pg.lineStyle(1.5,0xcc5500,0.6);
    pg.beginPath();pg.moveTo(0,5);pg.lineTo(3,4);pg.strokePath();
    // outline
    pg.lineStyle(1.2,0xcc6600,1);pg.strokeCircle(16,20,13);
    pg.generateTexture('tex_player',36,38);
    pg.clear();pg.destroy();

    s.player=s.physics.add.sprite(W/2,H-65,'tex_player');
    s.player.setCollideWorldBounds(true);
    s.player.body.setSize(26,28);s.player.body.setOffset(4,4);

    s.hudText=s.add.text(12,10,'SCORE: 0   LIVES: 3',{fontSize:'15px',fill:'#ccaa88',fontStyle:'bold'});

    s.scoreTimer=s.time.addEvent({
      delay:1000,callback:function(){s.score++;s.hudText.setText('SCORE: '+s.score+'   LIVES: '+s.lives);},loop:true
    });

    scheduleSpawn(s);scheduleCoin(s);
  },
  update:function(){
    if(this.isOver)return;
    var s=this;
    var cursors=s.input.keyboard?s.input.keyboard.createCursorKeys():null;
    if(cursors){if(cursors.left.isDown)s.player.x-=7;if(cursors.right.isDown)s.player.x+=7;}
    if(s.input.activePointer.isDown)s.player.x=s.input.activePointer.x;
    s.player.x=Phaser.Math.Clamp(s.player.x,20,W-20);

    for(var ci=s.coins.length-1;ci>=0;ci--){
      var c=s.coins[ci];
      if(!c||!c.active){if(c)c.destroy();s.coins.splice(ci,1);continue}
      if(Math.abs(s.player.x-c.x)<22&&Math.abs(s.player.y-c.y)<22){
        s.score+=5;s.hudText.setText('SCORE: '+s.score+'   LIVES: '+s.lives);
        c.destroy();s.coins.splice(ci,1);continue;
      }
      if(c.y>H+20){c.destroy();s.coins.splice(ci,1);}
    }

    for(var i=s.enemies.length-1;i>=0;i--){
      var e=s.enemies[i];
      if(!e||!e.active){if(e)e.destroy();s.enemies.splice(i,1);continue}
      var dx=Math.abs(s.player.x-e.x),dy=Math.abs(s.player.y-e.y);
      if(dx<22&&dy<22){
        s.lives--;e.destroy();s.enemies.splice(i,1);
        s.hudText.setText('SCORE: '+s.score+'   LIVES: '+s.lives);
        s.player.setTint(0xff0000);
        s.time.delayedCall(150,function(){if(s.player)s.player.clearTint()});
        if(s.lives<=0){triggerGameOver(s);return;}
      }
      if(e.y>H+50){e.destroy();s.enemies.splice(i,1);}
    }
  }
};

function scheduleSpawn(scene){
  if(scene.isOver)return;

  // === ENEMY: SLIPPER WITH VISIBLE SOLE + TREAD ===
  var eg=scene.add.graphics();

  // Sole (rubber bottom - beige color)
  eg.fillStyle(0xddccaa,1);
  eg.fillRoundedRect(0,3,52,32,8);

  // Tread pattern (zigzag)
  eg.lineStyle(1,0xbbaa88,0.7);
  for(var ti=0;ti<4;ti++){
    var ty=8+ti*6;
    eg.beginPath();eg.moveTo(5,ty);
    for(var tx=5;tx<47;tx+=7){
      eg.lineTo(tx+3.5,ty+2);eg.lineTo(tx+7,ty);
    }
    eg.strokePath();
  }
  // vertical treads
  eg.beginPath();
  eg.moveTo(6,5);eg.lineTo(6,33);
  eg.moveTo(13,5);eg.lineTo(13,31);
  eg.moveTo(39,5);eg.lineTo(39,31);
  eg.moveTo(46,5);eg.lineTo(46,33);
  eg.strokePath();

  // Heel pad
  eg.fillStyle(0xccbb99,1);
  eg.fillRoundedRect(2,22,16,12,3);
  // Toe pad
  eg.fillStyle(0xccbb99,1);
  eg.fillRoundedRect(38,2,12,30,3);

  // Upper (pink fabric)
  eg.fillStyle(0xff4488,1);
  eg.fillRoundedRect(0,-14,52,20,7);
  eg.fillStyle(0xff66aa,0.75);
  eg.fillRect(3,-10,46,12);
  // Opening
  eg.fillStyle(0x220818,1);
  eg.fillEllipse(14,-3,14,6);
  // Strap
  eg.fillStyle(0xdd3377,1);
  eg.fillRect(11,-6,30,4);
  // Outline
  eg.lineStyle(1.2,0xcc2266,1);
  eg.strokeRoundedRect(0,-14,52,20,7);
  eg.lineStyle(1.5,0x998866,1);
  eg.strokeRoundedRect(0,3,52,32,8);

  eg.generateTexture('tex_enemy',56,48);
  eg.clear();eg.destroy();

  var ex=Phaser.Math.Between(44,W-44);
  var enemy=scene.physics.add.sprite(ex,-48,'tex_enemy');
  enemy.setVelocityY(scene.baseSpeed+scene.score*1.5);
  enemy.angle=Phaser.Math.Between(-15,15);
  scene.enemies.push(enemy);

  scene.spawnTimer=scene.time.delayedCall(Math.max(280,600-scene.score*3),function(){scheduleSpawn(scene)});
}

function scheduleCoin(scene){
  if(scene.isOver)return;
  var cg=scene.add.graphics();
  cg.fillStyle(0xffdd00,1);cg.fillCircle(10,10,9);
  cg.fillStyle(0xffee66,1);cg.fillCircle(7,7,4);
  cg.fillStyle(0xeebb00,1);cg.fillCircle(10,10,9);
  cg.lineStyle(1.5,0xcc9900,1);cg.strokeCircle(10,10,9);
  cg.lineStyle(1.5,0xaa7700,1);
  cg.beginPath();cg.moveTo(10,4);cg.lineTo(10,16);cg.strokePath();
  cg.beginPath();cg.moveTo(6,7);cg.lineTo(14,7);cg.strokePath();
  cg.beginPath();cg.moveTo(6,13);cg.lineTo(14,13);cg.strokePath();
  cg.generateTexture('tex_coin',20,20);
  cg.clear();cg.destroy();

  var coin=scene.physics.add.sprite(Phaser.Math.Between(25,W-25),-20,'tex_coin');
  coin.setVelocityY(80+scene.score*0.5);
  scene.coins.push(coin);
  scene.coinTimer=scene.time.delayedCall(Phaser.Math.Between(2000,4000),function(){scheduleCoin(scene)});
}

function triggerGameOver(s){
  s.isOver=true;s.physics.pause();
  if(s.scoreTimer)s.scoreTimer.remove();
  if(s.spawnTimer)s.spawnTimer.remove();
  if(s.coinTimer)s.coinTimer.remove();

  var mx=W/2,my=H/2;
  s.add.rectangle(mx,my,300,280,0x100820,0.97);
  s.add.text(mx,my-95,'GAME OVER',{fontSize:'34px',fill:'#ff8833',fontStyle:'bold'}).setOrigin(0.5);
  s.add.text(mx,my-45,'Score: '+s.score,{fontSize:'24px',fill:'#ffffff'}).setOrigin(0.5);

  try{
    var hs=parseInt(localStorage.getItem(BK)||'0');
    if(s.score>hs){localStorage.setItem(BK,String(s.score));s.add.text(mx,my-5,'NEW HIGH SCORE!',{fontSize:'16px',fill:'#ffcc00',fontStyle:'bold'}).setOrigin(0.5);}
    var recs=JSON.parse(localStorage.getItem(RK))||[];
    recs.push({sc:s.score,tm:new Date().toLocaleString()});
    recs.sort(function(a,b){return b.sc-a.sc});recs=recs.slice(0,10);
    localStorage.setItem(RK,JSON.stringify(recs));
  }catch(e){}

  var rb=s.add.rectangle(mx,my+55,150,44,0xff8844,0.9).setInteractive({useHandCursor:true});
  s.add.text(mx,my+55,'PLAY AGAIN',{fontSize:'17px',fill:'#000',fontStyle:'bold'}).setOrigin(0.5);
  rb.on('pointerdown',function(){s.scene.restart()});

  var mb=s.add.rectangle(mx,my+110,150,40,0xaa55ff,0.9).setInteractive({useHandCursor:true});
  s.add.text(mx,my+110,'MAIN MENU',{fontSize:'16px',fill:'#fff',fontStyle:'bold'}).setOrigin(0.5);
  mb.on('pointerdown',function(){s.scene.start('Menu')});
}

try{
  var game=new Phaser.Game({
    width:W,height:H,parent:'gw',backgroundColor:'#120822',
    scene:[StoryScene,MenuScene,RecordsScene,PlayScene],
    physics:{default:'arcade',arcade:{debug:false}},
    render:{pixelArt:false,antialias:true}
  });
}catch(e){
  document.body.innerHTML='<div style="color:red;padding:20px;font-family:monospace">ERROR: '+e+'</div>';
}
</script>
