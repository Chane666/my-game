<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Cat Escape!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#120822;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;touch-action:none;font-family:'Segoe UI',Arial,sans-serif}
canvas{display:block;max-width:100%;max-height:100%}
</style>
</head>
<body>
<div id="gw"></div>
<script src="./phaser.min.js"></script>
<script>
var W=480,H=720;
var BK='dodgeMasterHS',RK='dodgeMasterRC';

/* ========== STORY INTRO - CHASE SCENE ========== */
var StoryScene={
  key:'Story',
  create:function(){
    var s=this,mx=W/2,my=H/2;
    s.cameras.main.setBackgroundColor('#0e0620');

    // === RUNNING CAT (center of screen) ===
    var catG=s.add.graphics();
    catG.fillStyle(0xff9944,1);
    catG.fillEllipse(40,50,55,38);
    catG.fillStyle(0xffaa55,1);
    catG.fillCircle(68,36,22);
    catG.fillStyle(0xff9944,1);
    catG.fillTriangle(54,18,64,2,67,20);
    catG.fillTriangle(78,16,82,2,85,19);
    catG.fillStyle(0xff88aa,1);
    catG.fillTriangle(57,17,63,7,66,19);
    catG.fillTriangle(77,15,81,7,84,18);
    catG.fillStyle(0xffffff,1);
    catG.fillCircle(60,32,6);catG.fillCircle(76,32,6);
    catG.fillStyle(0x222222,1);
    catG.fillCircle(62,33,3);catG.fillCircle(77,33,3);
    catG.fillStyle(0xffffff,1);
    catG.fillCircle(61,31,1);catG.fillCircle(76,31,1);
    catG.fillStyle(0xff6688,1);
    catG.fillTriangle(66,40,72,40,69,44);
    catG.lineStyle(1.5,0xcc5566,1);
    catG.beginPath();catG.moveTo(65,46);catG.lineTo(69,50);catG.lineTo(73,46);catG.strokePath();
    catG.fillStyle(0xff7799,1);
    catG.fillEllipse(69,53,5,4);
    catG.lineStyle(1.2,0xddccbb,0.6);
    catG.beginPath();catG.moveTo(48,36);catG.lineTo(56,38);catG.strokePath();
    catG.beginPath();catG.moveTo(46,42);catG.lineTo(56,43);catG.strokePath();
    catG.beginPath();catG.moveTo(88,36);catG.lineTo(80,38);catG.strokePath();
    catG.beginPath();catG.moveTo(90,42);catG.lineTo(80,43);catG.strokePath();
    catG.lineStyle(3,0xff9944,1);
    catG.beginPath();catG.moveTo(12,45);catG.lineTo(2,25);catG.lineTo(8,15);catG.strokePath();
    catG.fillStyle(0xffcc88,1);
    catG.fillEllipse(58,70,14,8);
    catG.fillEllipse(75,68,14,8);
    catG.fillStyle(0xee8833,1);
    catG.fillEllipse(22,68,16,10);
    catG.fillEllipse(30,72,14,8);
    catG.lineStyle(2,0x664488,0.4);
    for(var li=0;li<5;li++){
      catG.beginPath();
      catG.moveTo(10-li*8,30+li*6);
      catG.lineTo(-2-li*8,28+li*6);
      catG.strokePath();
    }
    catG.generateTexture('story_cat',100,90);
    catG.clear();catG.destroy();

    var catSprite=s.add.sprite(mx-50,my+20,'story_cat');
    catSprite.setScale(1.6);

    // === CHASING SLIPPER (complete shape with full heel) ===
    var slpG=s.add.graphics();

    // 1. Heel (back part - complete, rounded)
    slpG.fillStyle(0xdd2244,1);
    slpG.fillRoundedRect(0,10,22,30,8);

    // 2. Main sole body (middle section)
    slpG.fillStyle(0xff3377,1);
    slpG.fillRect(18,6,36,34);

    // 3. Toe cap (front part - wider and rounded)
    slpG.fillStyle(0xff5599,1);
    slpG.fillRoundedRect(42,0,24,38,12);

    // 4. Top surface (lighter pink overlay)
    slpG.fillStyle(0xff77aa,0.7);
    slpG.fillRoundedRect(4,6,52,16,6);

    // 5. Opening (where foot goes in) - dark ellipse at back-top
    slpG.fillStyle(0x1a0410,1);
    slpG.fillEllipse(14,16,14,8);

    // 6. Strap across the top
    slpG.fillStyle(0xcc2255,1);
    slpG.fillRect(16,10,36,4);

    // 7. Sole bottom edge (darker line for depth)
    slpG.lineStyle(2.5,0xaa1144,1);
    slpG.beginPath();slpG.moveTo(2,40);slpG.lineTo(64,40);slpG.strokePath();

    // 8. Full outline
    slpG.lineStyle(1.5,0xbb1155,1);
    // heel outline
    slpG.beginPath();slpG.moveTo(0,18);slpG.lineTo(0,32);slpG.lineTo(8,40);slpG.lineTo(22,40);slpG.strokePath();
    // main body outline (bottom already drawn)
    slpG.beginPath();slpG.moveTo(22,6);slpG.lineTo(42,6);slpG.strokePath();
    // toe outline
    slpG.beginPath();slpG.moveTo(42,6);slpG.lineTo(56,6);slpG.lineTo(66,18);slpG.lineTo(66,32);slpG.lineTo(56,40);slpG.lineTo(54,40);slpG.strokePath();

    // 9. Decorative stitch lines on toe
    slpG.lineStyle(1,0xdd6699,0.5);
    slpG.beginPath();slpG.moveTo(46,14);slpG.lineTo(60,14);slpG.strokePath();
    slpG.beginPath();slpG.moveTo(48,20);slpG.lineTo(60,20);slpG.strokePath();

    // motion lines around slipper
    slpG.lineStyle(2,0xff4477,0.5);
    for(var si=0;si<4;si++){
      slpG.beginPath();
      slpG.moveTo(68+si*6,8+si*8);
      slpG.lineTo(78+si*6,6+si*8);
      slpG.strokePath();
    }

    slpG.generateTexture('story_slipper_big',80,46);
    slpG.clear();slpG.destroy();

    var slipSprite=s.add.sprite(mx-200,my+35,'story_slipper_big');
    slipSprite.setScale(1.5);

    // === ANGRY OWNER (far background, upper right) ===
    var ownG=s.add.graphics();
    ownG.fillStyle(0xffddbb,1);
    ownG.fillCircle(30,30,24);
    ownG.fillStyle(0x442200,1);
    ownG.fillEllipse(30,10,44,18);
    ownG.lineStyle(3,0x442200,1);
    ownG.beginPath();ownG.moveTo(12,20);ownG.lineTo(26,26);ownG.strokePath();
    ownG.beginPath();ownG.moveTo(48,20);ownG.lineTo(34,26);ownG.strokePath();
    ownG.fillStyle(0xffffff,1);
    ownG.fillCircle(20,32,6);ownG.fillCircle(40,32,6);
    ownG.fillStyle(0x442200,1);
    ownG.fillCircle(21,33,3);ownG.fillCircle(39,33,3);
    ownG.fillStyle(0xcc4466,1);
    ownG.fillEllipse(30,46,10,7);
    ownG.fillStyle(0xff8866,1);
    ownG.fillRoundedRect(42,40,30,14,6);
    ownG.fillStyle(0xffddbb,1);
    ownG.fillCircle(74,47,8);
    ownG.generateTexture('story_owner',86,70);
    ownG.clear();ownG.destroy();

    var ownerSprite=s.add.sprite(mx+160,my-80,'story_owner');
    ownerSprite.setScale(1.2);

    // === ANIMATIONS ===

    // Cat running bounce
    s.tweens.add({
      targets:catSprite,
      y:my+5,
      duration:250,yoyo:true,ease:'Sine.easeInOut',loop:-1,
      onRepeat:function(){catSprite.angle=(catSprite.angle===0?-3:0);}
    });

    // Slipper chasing wobble
    slipSprite.angle=-12;
    s.tweens.add({
      targets:slipSprite,
      angle:12,duration:150,yoyo:true,ease:'Sine.easeInOut',loop:-1
    });
    s.tweens.add({
      targets:slipSprite,
      x:mx-130,
      duration:2000,ease:'Cubic.easeOut',
      delay:300,onComplete:function(){
        s.cameras.main.shake(300,0.01);
        s.tweens.add({
          targets:catSprite,scaleX:1.7,scaleY:1.5,
          duration:150,yoyo:true,loop:-1
        });
      }
    });

    // Owner shaking with anger
    s.tweens.add({
      targets:ownerSprite,
      x:mx+155,duration:80,yoyo:true,loop:-1
    });
    ownerSprite.angle=5;
    s.tweens.add({
      targets:ownerSprite,
      angle:-5,duration:100,yoyo:true,loop:-1
    });

    // === TEXT ===
    s.add.text(mx,80,'CAT ESCAPE!',{
      fontSize:'40px',fill:'#ffaa33',fontStyle:'bold',
      fontFamily:'Arial Black',stroke:'#000000',strokeThickness:4
    }).setOrigin(0.5);

    s.add.text(mx,125,'She found the broken vase...',{
      fontSize:'17px',fill:'#ff6699',fontStyle:'italic'
    }).setOrigin(0.5);

    s.add.text(mx,H-140,'Dodge her slippers & collect coins to survive!',{
      fontSize:'16px',fill:'#bbaadd',align:'center'
    }).setOrigin(0.5);

    var tap=s.add.text(mx,H-80,'TAP TO START >',{
      fontSize:'22px',fill:'#ffffff',fontStyle:'bold',
      stroke:'#ff8844',strokeThickness:3
    }).setOrigin(0.5);
    s.tweens.add({targets:tap,alpha:0.3,duration:500,yoyo:true,loop:-1});

    var excl=s.add.text(mx+130,my-160,'!!!',{fontSize:'32px',fill:'#ff3333',fontStyle:'bold'});
    s.tweens.add({targets:excl,scale:1.3,duration:200,yoyo:true,loop:-1});

    s.input.on('pointerdown',function(){
      s.cameras.main.fade(400,14,6,32);
      s.time.delayedCall(400,function(){s.scene.start('Menu')});
    });
    s.cameras.main.flash(300);
  }
};

/* ========== MENU ========== */
var MenuScene={
  key:'Menu',
  create:function(){
    var s=this,mx=W/2;
    s.add.text(mx,85,'CAT ESCAPE!',{fontSize:'44px',fill:'#ffaa33',fontStyle:'bold',fontFamily:'Arial Black'}).setOrigin(0.5);
    s.add.text(mx,135,'Dodge slippers & collect coins!',{fontSize:'15px',fill:'#8877aa'}).setOrigin(0.5);
    s.add.rectangle(mx,170,300,2,0x442266).setOrigin(0.5);
    function btn(y,label,color,action){
      var bg=s.add.rectangle(mx,y,200,40,color,0.9).setStrokeStyle(2,0xffffff,0.3).setInteractive({useHandCursor:true});
      var tx=s.add.text(mx,y,label,{fontSize:'18px',fill:'#000',fontStyle:'bold'}).setOrigin(0.5);
      bg.on('pointerdown',action);
      bg.on('pointerover',function(){bg.setFillStyle(color,1);bg.setScale(1.05)});
      bg.on('pointerout',function(){bg.setFillStyle(color,0.9);bg.setScale(1)});
      return{bg:bg,tex:tx};
    }
    btn(230,'START GAME',0xff8844,function(){s.scene.start('Play')});
    btn(290,'RECORDS',0xeebb00,function(){s.scene.start('Records')});
    btn(350,'SHARE LINK',0xaa55ff,function(){
      if(navigator.clipboard)navigator.clipboard.writeText(location.href)
        .then(function(){
          var ok=s.add.text(mx,405,'Link copied!',{fontSize:'14px',fill:'#ffaa33',fontStyle:'bold'}).setOrigin(0.5);
          s.tweens.add({targets:ok,alpha:0,delay:1500,duration:500,onComplete:function(){ok.destroy()}});
        });
      else prompt('Copy this link:',location.href);
    });
    s.add.text(mx,H-30,'Arrow keys or touch to move',{fontSize:'12px',fill:'#554466'}).setOrigin(0.5);
  }
};

/* ========== RECORDS ========== */
var RecordsScene={
  key:'Records',
  create:function(){
    var s=this,mx=W/2;
    s.add.rectangle(W/2,H/2,W,H,0x100820,0.95);
    s.add.text(mx,70,'RECORDS',{fontSize:'28px',fill:'#ffcc00',fontStyle:'bold'}).setOrigin(0.5);
    s.add.rectangle(mx,98,320,2,0x332244).setOrigin(0.5);
    try{
      var recs=JSON.parse(localStorage.getItem(RK))||[];
      if(recs.length===0){
        s.add.text(mx,H/2,'No records yet!\\nPlay a game to set one.',{fontSize:'18px',color:'#665577',align:'center'}).setOrigin(0.5);
      } else {
        for(var i=0;i<recs.length&&i<10;i++){
          var medal=i===0?'GOLD':i===1?'SILVER':i===2?'BRONZE':'#'+(i+1);
          var col=i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':'#aa99bb';
          var scoreVal = recs[i].sc !== undefined ? recs[i].sc : recs[i].s;
          s.add.text(mx,140+i*34,medal+'  '+scoreVal+' pts',{fontSize:'17px',fill:col}).setOrigin(0.5);
        }
      }
    }catch(e){}
    var bb=s.add.rectangle(mx,H-70,130,42,0xdd4444,0.9).setInteractive({useHandCursor:true});
    s.add.text(mx,H-70,'BACK TO MENU',{fontSize:'16px',fill:'#fff',fontStyle:'bold'}).setOrigin(0.5);
    bb.on('pointerdown',function(){s.scene.start('Menu')});
  }
};

/* ========== PLAY ========== */
var PlayScene={
  key:'Play',
  init:function(){
    this.score=0;this.lives=3;this.baseSpeed=140;
    this.enemies=[];this.coins=[];
    this.isOver=false;this.spawnTimer=null;this.coinTimer=null;
  },
  create:function(){
    var s=this;
    s.physics.world.setBounds(0,0,W,H);

    // === PLAYER: detailed cat ===
    var pg=s.add.graphics();
    pg.fillStyle(0xff9944,1);pg.fillCircle(16,18,13);
    pg.fillStyle(0xff9944,1);
    pg.fillTriangle(4,9,11,0,12,10);
    pg.fillTriangle(28,9,21,0,20,10);
    pg.fillStyle(0xff88aa,1);
    pg.fillTriangle(7,8,10,2,11,9);
    pg.fillTriangle(25,8,22,2,21,9);
    pg.fillStyle(0xffffff,1);
    pg.fillCircle(10,15,4);pg.fillCircle(22,15,4);
    pg.fillStyle(0x222222,1);
    pg.fillCircle(11,16,2.2);pg.fillCircle(23,16,2.2);
    pg.fillStyle(0xffffff,1);
    pg.fillCircle(10.5,14.5,1);pg.fillCircle(22.5,14.5,1);
    pg.fillStyle(0xff6688,1);
    pg.fillTriangle(14,20,18,20,16,23);
    pg.lineStyle(1.2,0xcc5566,1);
    pg.beginPath();pg.moveTo(14,24);pg.lineTo(16,26);pg.lineTo(18,24);pg.strokePath();
    pg.lineStyle(1,0xddccbb,0.65);
    pg.beginPath();pg.moveTo(1,19);pg.lineTo(8,21);pg.strokePath();
    pg.beginPath();pg.moveTo(1,22);pg.lineTo(8,23);pg.strokePath();
    pg.beginPath();pg.moveTo(31,19);pg.lineTo(24,21);pg.strokePath();
    pg.beginPath();pg.moveTo(31,22);pg.lineTo(24,23);pg.strokePath();
    pg.lineStyle(1.5,0xdd6611,1);pg.strokeCircle(16,18,13);
    pg.generateTexture('tex_player',34,37);
    pg.clear();pg.destroy();

    s.player=s.physics.add.sprite(W/2,H-65,'tex_player');
    s.player.setCollideWorldBounds(true);
    s.player.body.setSize(26,28);s.player.body.setOffset(4,4);

    s.hudText=s.add.text(12,10,'SCORE: 0   LIVES: 3',{fontSize:'15px',fill:'#ccaa88',fontStyle:'bold'});

    s.scoreTimer=s.time.addEvent({
      delay:1000,callback:function(){s.score++;s.hudText.setText('SCORE: '+s.score+'   LIVES: '+s.lives);},loop:true
    });

    scheduleSpawn(s);scheduleCoin(s);
  },
  update:function(){
    if(this.isOver)return;
    var s=this;
    var cursors=s.input.keyboard?s.input.keyboard.createCursorKeys():null;
    if(cursors){if(cursors.left.isDown)s.player.x-=7;if(cursors.right.isDown)s.player.x+=7;}
    if(s.input.activePointer.isDown)s.player.x=s.input.activePointer.x;
    s.player.x=Phaser.Math.Clamp(s.player.x,20,W-20);

    for(var ci=s.coins.length-1;ci>=0;ci--){
      var c=s.coins[ci];
      if(!c||!c.active){if(c)c.destroy();s.coins.splice(ci,1);continue}
      if(Math.abs(s.player.x-c.x)<22&&Math.abs(s.player.y-c.y)<22){
        s.score+=5;s.hudText.setText('SCORE: '+s.score+'   LIVES: '+s.lives);
        c.destroy();s.coins.splice(ci,1);continue;
      }
      if(c.y>H+20){c.destroy();s.coins.splice(ci,1);}
    }

    for(var i=s.enemies.length-1;i>=0;i--){
      var e=s.enemies[i];
      if(!e||!e.active){if(e)e.destroy();s.enemies.splice(i,1);continue}
      var dx=Math.abs(s.player.x-e.x),dy=Math.abs(s.player.y-e.y);
      if(dx<22&&dy<22){
        s.lives--;e.destroy();s.enemies.splice(i,1);
        s.hudText.setText('SCORE: '+s.score+'   LIVES: '+s.lives);
        s.player.setTint(0xff0000);
        s.time.delayedCall(150,function(){if(s.player)s.player.clearTint()});
        if(s.lives<=0){triggerGameOver(s);return;}
      }
      if(e.y>H+50){e.destroy();s.enemies.splice(i,1);}
    }
  }
};

function scheduleSpawn(scene){
  if(scene.isOver)return;

  // === ENEMY: COMPLETE SLIPPER with full heel ===
  var eg=scene.add.graphics();

  // 1. Heel (back - rounded rect, darker)
  eg.fillStyle(0xdd2244,1);
  eg.fillRoundedRect(0,8,18,26,6);

  // 2. Main sole body
  eg.fillStyle(0xff3377,1);
  eg.fillRect(14,4,28,30);

  // 3. Toe cap (front - wider, lighter)
  eg.fillStyle(0xff5599,1);
  eg.fillRoundedRect(34,0,18,34,10);

  // 4. Top surface (lighter pink)
  eg.fillStyle(0xff77aa,0.65);
  eg.fillRoundedRect(3,4,43,13,5);

  // 5. Opening (dark ellipse)
  eg.fillStyle(0x1a0410,1);
  eg.fillEllipse(11,12,11,6);

  // 6. Strap
  eg.fillStyle(0xcc2255,1);
  eg.fillRect(12,8,30,3);

  // 7. Sole edge (depth line)
  eg.lineStyle(2,0xaa1144,1);
  eg.beginPath();eg.moveTo(1,34);eg.lineTo(53,34);eg.strokePath();

  // 8. Outline
  eg.lineStyle(1.2,0xbb1155,1);
  eg.beginPath();eg.moveTo(1,14);eg.lineTo(1,28);eg.lineTo(7,34);eg.lineTo(18,34);eg.strokePath();
  eg.beginPath();eg.moveTo(18,4);eg.lineTo(34,4);eg.strokePath();
  eg.beginPath();eg.moveTo(34,4);eg.lineTo(45,4);eg.lineTo(53,14);eg.lineTo(53,28);eg.lineTo(45,34);eg.lineTo(53,34);eg.strokePath();

  eg.generateTexture('tex_enemy',56,38);
  eg.clear();eg.destroy();

  var ex=Phaser.Math.Between(44,W-44);
  var enemy=scene.physics.add.sprite(ex,-38,'tex_enemy');
  enemy.setVelocityY(scene.baseSpeed+scene.score*1.5);
  enemy.angle=Phaser.Math.Between(-10,10);
  scene.enemies.push(enemy);

  scene.spawnTimer=scene.time.delayedCall(Math.max(280,600-scene.score*3),function(){scheduleSpawn(scene)});
}

function scheduleCoin(scene){
  if(scene.isOver)return;
  var cg=scene.add.graphics();
  cg.fillStyle(0xffdd00,1);cg.fillCircle(10,10,9);
  cg.fillStyle(0xffee66,1);cg.fillCircle(7,7,4);
  cg.fillStyle(0xeebb00,1);cg.fillCircle(10,10,9);
  cg.lineStyle(1.5,0xcc9900,1);cg.strokeCircle(10,10,9);
  cg.lineStyle(1.5,0xaa7700,1);
  cg.beginPath();cg.moveTo(10,4);cg.lineTo(10,16);cg.strokePath();
  cg.beginPath();cg.moveTo(6,7);cg.lineTo(14,7);cg.strokePath();
  cg.beginPath();cg.moveTo(6,13);cg.lineTo(14,13);cg.strokePath();
  cg.generateTexture('tex_coin',20,20);
  cg.clear();cg.destroy();

  var coin=scene.physics.add.sprite(Phaser.Math.Between(25,W-25),-20,'tex_coin');
  coin.setVelocityY(80+scene.score*0.5);
  scene.coins.push(coin);
  scene.coinTimer=scene.time.delayedCall(Phaser.Math.Between(2000,4000),function(){scheduleCoin(scene)});
}

function triggerGameOver(s){
  s.isOver=true;s.physics.pause();
  if(s.scoreTimer)s.scoreTimer.remove();
  if(s.spawnTimer)s.spawnTimer.remove();
  if(s.coinTimer)s.coinTimer.remove();

  var mx=W/2,my=H/2;
  s.add.rectangle(mx,my,300,280,0x100820,0.97);
  s.add.text(mx,my-95,'GAME OVER',{fontSize:'34px',fill:'#ff8833',fontStyle:'bold'}).setOrigin(0.5);
  s.add.text(mx,my-45,'Score: '+s.score,{fontSize:'24px',fill:'#ffffff'}).setOrigin(0.5);

  try{
    var hs=parseInt(localStorage.getItem(BK)||'0');
    if(s.score>hs){localStorage.setItem(BK,String(s.score));s.add.text(mx,my-5,'NEW HIGH SCORE!',{fontSize:'16px',fill:'#ffcc00',fontStyle:'bold'}).setOrigin(0.5);}
    var recs=JSON.parse(localStorage.getItem(RK))||[];
    recs.push({sc:s.score,tm:new Date().toLocaleString()});
    recs.sort(function(a,b){return b.sc-a.sc});recs=recs.slice(0,10);
    localStorage.setItem(RK,JSON.stringify(recs));
  }catch(e){}

  var rb=s.add.rectangle(mx,my+55,150,44,0xff8844,0.9).setInteractive({useHandCursor:true});
  s.add.text(mx,my+55,'PLAY AGAIN',{fontSize:'17px',fill:'#000',fontStyle:'bold'}).setOrigin(0.5);
  rb.on('pointerdown',function(){s.scene.restart()});

  var mb=s.add.rectangle(mx,my+110,150,40,0xaa55ff,0.9).setInteractive({useHandCursor:true});
  s.add.text(mx,my+110,'MAIN MENU',{fontSize:'16px',fill:'#fff',fontStyle:'bold'}).setOrigin(0.5);
  mb.on('pointerdown',function(){s.scene.start('Menu')});
}

try{
  var game=new Phaser.Game({
    width:W,height:H,parent:'gw',backgroundColor:'#120822',
