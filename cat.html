<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Cat Escape - 小猫大逃亡</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden}
  body{
    background:#10151c;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:Arial,"Microsoft YaHei",sans-serif;
    touch-action:none;
    color:#fff;
  }
  #gw{
    width:min(100vw,480px);
    height:min(100vh,720px);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  canvas{
    display:block;
    max-width:100vw;
    max-height:100vh;
    border-radius:10px;
    box-shadow:0 20px 60px rgba(0,0,0,.35);
  }
</style>
</head>
<body>
<div id="gw"></div>
<script src="./phaser.min.js"></script>
<script>
"use strict";

var GW = 480;
var GH = 720;
var STORE_KEY = "catEscapeRecordsV2";

function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }

function vibrate(pattern){
  if(navigator.vibrate){
    try{ navigator.vibrate(pattern); }catch(e){}
  }
}

function readRecords(){
  try{
    var data = JSON.parse(localStorage.getItem(STORE_KEY) || "[]");
    return Array.isArray(data) ? data : [];
  }catch(e){
    return [];
  }
}

function saveRecord(record){
  var records = readRecords();
  records.push(record);
  records.sort(function(a,b){ return b.score - a.score; });
  records = records.slice(0, 8);
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(records)); }catch(e){}
  return records;
}

function flash(scene, color, alpha, duration){
  var g = scene.add.graphics().setDepth(90);
  g.fillStyle(color, alpha).fillRect(0,0,GW,GH);
  scene.tweens.add({
    targets:g,
    alpha:0,
    duration:duration,
    onComplete:function(){ g.destroy(); }
  });
}

function toast(scene, text, color){
  var msg = scene.add.text(GW/2, GH - 92, text, {
    fontSize:"16px",
    color:color || "#ffffff",
    fontStyle:"bold",
    backgroundColor:"rgba(0,0,0,.62)",
    padding:{x:14,y:8}
  }).setOrigin(.5).setDepth(100);
  scene.tweens.add({
    targets:msg,
    y:msg.y - 24,
    alpha:0,
    duration:1100,
    ease:"Quad.easeOut",
    onComplete:function(){ msg.destroy(); }
  });
}

function makeButton(scene, x, y, w, label, color, onClick){
  var bg = scene.add.graphics();
  var text = scene.add.text(x, y, label, {
    fontSize:"17px",
    color:"#ffffff",
    fontStyle:"bold"
  }).setOrigin(.5);
  function draw(fill, scale){
    bg.clear();
    bg.fillStyle(0x000000,.22).fillRoundedRect(x - w/2 + 3, y - 18 + 4, w, 38, 10);
    bg.fillStyle(fill,1).fillRoundedRect(x - w/2, y - 18, w, 38, 10);
    bg.fillStyle(0xffffff,.18).fillRoundedRect(x - w/2 + 4, y - 15, w - 8, 13, 8);
    text.setScale(scale || 1);
  }
  draw(color,1);
  var zone = scene.add.zone(x,y,w,42).setInteractive({useHandCursor:true});
  zone.on("pointerover",function(){ draw(0xffffff,1.04); text.setColor("#17202a"); });
  zone.on("pointerout",function(){ draw(color,1); text.setColor("#ffffff"); });
  zone.on("pointerdown",function(){
    vibrate(18);
    text.setScale(.95);
    scene.time.delayedCall(90,onClick);
  });
  return {bg:bg,text:text,zone:zone};
}

function gradientBackground(scene){
  var g = scene.add.graphics();
  g.fillStyle(0x10151c,1).fillRect(0,0,GW,GH);
  g.fillStyle(0x132530,.72).fillRect(0,0,GW,GH * .52);
  g.lineStyle(1,0xffffff,.05);
  for(var y=80;y<GH;y+=80){ g.lineBetween(28,y,GW-28,y); }
  for(var x=48;x<GW;x+=96){ g.lineBetween(x,0,x,GH); }
  return g;
}

var BootScene = {
  key:"BootScene",
  preload:function(){
    var g = this.add.graphics();

    g.fillStyle(0xf7a941,1).fillCircle(24,24,17).fillRect(8,20,32,10);
    g.fillStyle(0xf7a941,1).fillCircle(13,10,7).fillCircle(35,10,7);
    g.fillStyle(0xffcf6b,1).fillCircle(14,11,4).fillCircle(34,11,4);
    g.fillStyle(0xffffff,1).fillCircle(18,22,4).fillCircle(30,22,4);
    g.fillStyle(0x222a33,1).fillCircle(18,22,1.8).fillCircle(30,22,1.8);
    g.fillStyle(0xf46c8c,1).fillRoundedRect(21,28,6,4,2);
    g.lineStyle(1,0x5c3724,.7).lineBetween(13,29,3,26).lineBetween(13,31,3,34).lineBetween(35,29,45,26).lineBetween(35,31,45,34);
    g.generateTexture("cat",48,48);
    g.clear();

    g.fillStyle(0xd5a46c,1).fillRoundedRect(5,7,38,20,7);
    g.fillStyle(0xc58c58,1).fillRoundedRect(10,12,28,10,5);
    g.fillStyle(0x6d4630,.65).fillRoundedRect(15,16,18,7,4);
    g.lineStyle(2,0xf1c084,1).strokeRoundedRect(5,7,38,20,7);
    g.generateTexture("slipper",48,34);
    g.clear();

    g.fillStyle(0xffc83d,1).fillCircle(14,14,12);
    g.fillStyle(0xffe47a,1).fillCircle(14,14,8);
    g.lineStyle(2,0xd98500,1).strokeCircle(14,14,10);
    g.fillStyle(0xd98500,1).fillRect(13,7,2,14).fillRect(8,13,12,2);
    g.generateTexture("coin",28,28);
    g.clear();

    g.fillStyle(0x65d6ff,1).fillCircle(17,17,14);
    g.fillStyle(0xffffff,.38).fillCircle(12,11,5);
    g.lineStyle(3,0xe7fbff,.9).strokeCircle(17,17,11);
    g.generateTexture("shield",34,34);
    g.clear();

    g.fillStyle(0xffffff,1).fillRect(2,2,4,18).fillRect(12,2,4,18);
    g.generateTexture("pauseIcon",18,22);
    g.clear();

    g.destroy();
  },
  create:function(){ this.scene.start("MenuScene"); }
};

var MenuScene = {
  key:"MenuScene",
  create:function(){
    var me = this;
    gradientBackground(me);
    for(var i=0;i<18;i++){
      var star = me.add.circle(Phaser.Math.Between(24,GW-24),Phaser.Math.Between(30,GH-30),Phaser.Math.Between(1,3),0xfff1b8,.5);
      me.tweens.add({targets:star,alpha:.12,duration:Phaser.Math.Between(900,1800),yoyo:true,repeat:-1});
    }
    var cat = me.add.image(GW/2,145,"cat").setScale(2.1);
    me.tweens.add({targets:cat,y:155,duration:900,yoyo:true,repeat:-1,ease:"Sine.easeInOut"});
    me.add.text(GW/2,245,"小猫大逃亡",{
      fontSize:"40px",
      color:"#ffd56f",
      fontStyle:"bold",
      stroke:"#56361c",
      strokeThickness:5
    }).setOrigin(.5);
    me.add.text(GW/2,292,"左右移动，躲开拖鞋，收集金币和护盾",{
      fontSize:"16px",
      color:"#cbd7e3"
    }).setOrigin(.5);

    var best = readRecords()[0];
    me.add.text(GW/2,340,best ? "最高分 " + best.score + "  |  最佳连击 x" + (best.combo || 0) : "还没有记录，先跑一局",{
      fontSize:"16px",
      color:"#8fe3b0",
      fontStyle:"bold"
    }).setOrigin(.5);

    makeButton(me,GW/2,410,190,"开始游戏",0x22b86f,function(){ me.scene.start("PlayScene"); });
    makeButton(me,GW/2,464,190,"记录榜",0xf3a326,function(){ me.scene.start("RecordsScene"); });
    makeButton(me,GW/2,518,190,"分享",0x4a8fe7,function(){
      var url = location.href;
      if(navigator.share){
        navigator.share({title:"小猫大逃亡",text:"来挑战小猫大逃亡！",url:url}).catch(function(){});
      }else if(navigator.clipboard){
        navigator.clipboard.writeText(url).then(function(){ toast(me,"链接已复制","#ffffff"); });
      }else{
        toast(me,url,"#ffffff");
      }
    });
    me.add.text(GW/2,GH-34,"键盘 A/D 或 ←/→，手机拖动小猫",{
      fontSize:"14px",
      color:"#8b9bad"
    }).setOrigin(.5);
  }
};

var RecordsScene = {
  key:"RecordsScene",
  create:function(){
    var me = this;
    gradientBackground(me);
    me.add.text(GW/2,82,"记录榜",{
      fontSize:"34px",
      color:"#ffd56f",
      fontStyle:"bold"
    }).setOrigin(.5);
    var panel = me.add.graphics();
    panel.fillStyle(0x182631,.92).fillRoundedRect(46,130,388,420,10);
    panel.lineStyle(2,0xffffff,.08).strokeRoundedRect(46,130,388,420,10);
    var records = readRecords();
    if(!records.length){
      me.add.text(GW/2,330,"暂无记录\n完成一局后会自动保存",{
        fontSize:"18px",
        color:"#9fb0c1",
        align:"center",
        lineSpacing:10
      }).setOrigin(.5);
    }else{
      records.slice(0,8).forEach(function(item,index){
        var y = 166 + index * 46;
        var rankColor = index === 0 ? "#ffd56f" : index < 3 ? "#9de6ff" : "#d6e2ee";
        me.add.text(78,y,String(index+1),{fontSize:"20px",color:rankColor,fontStyle:"bold"}).setOrigin(.5);
        me.add.text(112,y,"得分 " + item.score,{fontSize:"18px",color:"#ffffff",fontStyle:index===0?"bold":"normal"}).setOrigin(0,.5);
        me.add.text(300,y,"x" + (item.combo || 0),{fontSize:"16px",color:"#ffb7d1",fontStyle:"bold"}).setOrigin(.5);
        me.add.text(390,y,new Date(item.time).toLocaleDateString(),{fontSize:"13px",color:"#91a0ae"}).setOrigin(1,.5);
      });
    }
    makeButton(me,GW/2,610,178,"返回菜单",0xe65353,function(){ me.scene.start("MenuScene"); });
  }
};

var PlayScene = {
  key:"PlayScene",
  init:function(){
    this.score = 0;
    this.lives = 3;
    this.combo = 0;
    this.maxCombo = 0;
    this.level = 1;
    this.speed = 155;
    this.spawnDelay = 820;
    this.coinDelay = 1280;
    this.shielded = false;
    this.invincible = 0;
    this.closeCallTimer = 0;
    this.comboTimer = 0;
    this.isPaused = false;
    this.startedAt = 0;
  },
  create:function(){
    var me = this;
    [
      "spawnObstacle",
      "spawnCoin",
      "spawnShield",
      "collectCoin",
      "collectShield",
      "hitObstacle",
      "checkCloseCalls",
      "cleanWorld",
      "floatText",
      "togglePause",
      "finishGame"
    ].forEach(function(name){ me[name] = PlayScene[name]; });
    me.bg = gradientBackground(me);
    me.laneGraphics = me.add.graphics().setDepth(1);
    for(var x=96;x<GW;x+=96){
      me.laneGraphics.lineStyle(2,0xffffff,.08).lineBetween(x,0,x,GH);
    }

    me.obstacles = me.physics.add.group();
    me.coins = me.physics.add.group();
    me.powerups = me.physics.add.group();
    me.player = me.physics.add.sprite(GW/2,GH-92,"cat").setScale(1.18).setDepth(20);
    me.player.setCollideWorldBounds(true);
    me.player.body.setCircle(16,8,9);

    me.scoreText = me.add.text(18,18,"0",{
      fontSize:"28px",
      color:"#ffffff",
      fontStyle:"bold",
      stroke:"#000000",
      strokeThickness:4
    }).setDepth(30);
    me.metaText = me.add.text(18,55,"等级 1",{
      fontSize:"14px",
      color:"#b7c6d6"
    }).setDepth(30);
    me.lifeText = me.add.text(GW-18,20,"♥ ♥ ♥",{
      fontSize:"22px",
      color:"#ff6b87",
      fontStyle:"bold",
      stroke:"#000000",
      strokeThickness:3
    }).setOrigin(1,0).setDepth(30);
    me.comboText = me.add.text(GW/2,82,"",{
      fontSize:"22px",
      color:"#ffd56f",
      fontStyle:"bold",
      stroke:"#573a12",
      strokeThickness:3
    }).setOrigin(.5).setDepth(35);

    var pauseBg = me.add.graphics().setDepth(40);
    pauseBg.fillStyle(0x000000,.35).fillRoundedRect(GW-62,64,44,44,9);
    me.add.image(GW-40,86,"pauseIcon").setDepth(41).setScale(.85);
    me.add.zone(GW-40,86,52,52).setInteractive({useHandCursor:true}).setDepth(42).on("pointerdown",function(){
      me.togglePause();
    });

    me.physics.add.overlap(me.player,me.obstacles,me.hitObstacle,null,me);
    me.physics.add.overlap(me.player,me.coins,me.collectCoin,null,me);
    me.physics.add.overlap(me.player,me.powerups,me.collectShield,null,me);

    me.obstacleTimer = me.time.addEvent({delay:me.spawnDelay,callback:me.spawnObstacle,callbackScope:me,loop:true});
    me.coinTimer = me.time.addEvent({delay:me.coinDelay,callback:me.spawnCoin,callbackScope:me,loop:true});
    me.powerTimer = me.time.addEvent({delay:7600,callback:me.spawnShield,callbackScope:me,loop:true});
    me.cursors = me.input.keyboard.createCursorKeys();
    me.keys = me.input.keyboard.addKeys("A,D,SPACE,P");
    me.input.keyboard.on("keydown-P",function(){ me.togglePause(); });
    me.input.keyboard.on("keydown-SPACE",function(){ me.togglePause(); });
    me.input.on("pointermove",function(pointer){
      if(!me.isPaused){
        me.player.x = clamp(pointer.x,28,GW-28);
      }
    });
    me.startedAt = me.time.now;
    toast(me,"开始！","#ffffff");
  },
  update:function(time,delta){
    var me = this;
    if(me.isPaused){ return; }
    var dt = delta / 1000;
    me.score += dt * 7;
    me.scoreText.setText(String(Math.floor(me.score)));

    var targetLevel = 1 + Math.floor(me.score / 130);
    if(targetLevel !== me.level){
      me.level = targetLevel;
      me.speed = Math.min(155 + (me.level - 1) * 22, 430);
      me.spawnDelay = Math.max(360, 820 - (me.level - 1) * 42);
      me.obstacleTimer.delay = me.spawnDelay;
      me.metaText.setText("等级 " + me.level);
      toast(me,"等级 " + me.level,"#ffd56f");
    }

    var vx = 0;
    if(me.cursors.left.isDown || me.keys.A.isDown){ vx = -260; }
    if(me.cursors.right.isDown || me.keys.D.isDown){ vx = 260; }
    me.player.setVelocityX(vx);

    if(me.invincible > 0){
      me.invincible -= delta;
      me.player.alpha = me.invincible % 180 < 90 ? .45 : 1;
      if(me.invincible <= 0){ me.player.alpha = 1; }
    }
    if(me.closeCallTimer > 0){ me.closeCallTimer -= delta; }
    if(me.combo > 0){
      me.comboTimer -= delta;
      if(me.comboTimer <= 0){
        me.combo = 0;
        me.comboText.setText("");
      }
    }
    me.checkCloseCalls();
    me.cleanWorld();
  },
  spawnObstacle:function(){
    if(this.isPaused){ return; }
    var x = Phaser.Math.Between(38,GW-38);
    var obs = this.obstacles.create(x,-34,"slipper").setScale(Phaser.Math.FloatBetween(.95,1.18));
    obs.body.setCircle(15,9,2);
    obs.setVelocityY(this.speed + Phaser.Math.Between(0,38));
    obs.setAngularVelocity(Phaser.Math.Between(-150,150));
    if(this.level >= 5 && Math.random() < .22){
      obs.setVelocityX(Phaser.Math.Between(-45,45));
      obs.setBounce(1,0);
      obs.setCollideWorldBounds(true);
    }
  },
  spawnCoin:function(){
    if(this.isPaused){ return; }
    var coin = this.coins.create(Phaser.Math.Between(34,GW-34),-28,"coin");
    coin.body.setCircle(12,2,2);
    coin.setVelocityY(this.speed * .72);
    coin.setAngularVelocity(160);
  },
  spawnShield:function(){
    if(this.isPaused || this.shielded || Math.random() > .72){ return; }
    var shield = this.powerups.create(Phaser.Math.Between(36,GW-36),-34,"shield");
    shield.body.setCircle(14,3,3);
    shield.setVelocityY(this.speed * .62);
    shield.setAngularVelocity(80);
  },
  collectCoin:function(player,coin){
    var me = this;
    var x = coin.x;
    var y = coin.y;
    coin.destroy();
    me.combo++;
    me.maxCombo = Math.max(me.maxCombo,me.combo);
    me.comboTimer = 2200;
    var bonus = 12 + Math.min(me.combo - 1,8) * 3;
    me.score += bonus;
    me.comboText.setText(me.combo >= 2 ? "连击 x" + me.combo : "");
    me.comboText.setScale(1.25);
    me.tweens.add({targets:me.comboText,scale:1,duration:180,ease:"Back.easeOut"});
    me.floatText(x,y,"+" + bonus,me.combo >= 5 ? "#ff7b54" : "#ffd56f");
    flash(me,0xffd56f,.11,150);
    vibrate(20);
  },
  collectShield:function(player,shield){
    var me = this;
    shield.destroy();
    me.shielded = true;
    me.player.setTint(0x7de4ff);
    me.floatText(me.player.x,me.player.y - 28,"护盾","#7de4ff");
    toast(me,"获得护盾","#7de4ff");
    vibrate([20,30,20]);
  },
  hitObstacle:function(player,obs){
    var me = this;
    if(me.invincible > 0){ return; }
    obs.destroy();
    me.combo = 0;
    me.comboText.setText("");
    if(me.shielded){
      me.shielded = false;
      me.player.clearTint();
      me.invincible = 850;
      me.floatText(player.x,player.y - 36,"护盾抵挡","#7de4ff");
      flash(me,0x65d6ff,.16,190);
      vibrate([24,24,24]);
      return;
    }
    me.lives--;
    me.lifeText.setText(Array(Math.max(me.lives,0)+1).join("♥ "));
    me.player.setTint(0xff3157);
    me.invincible = 1200;
    flash(me,0xff3157,.22,230);
    vibrate([60,30,60]);
    me.time.delayedCall(180,function(){
      if(!me.shielded){ me.player.clearTint(); }
    });
    if(me.lives <= 0){
      me.finishGame();
    }
  },
  checkCloseCalls:function(){
    var me = this;
    if(me.closeCallTimer > 0 || me.invincible > 0){ return; }
    var px = me.player.x;
    var py = me.player.y;
    me.obstacles.getChildren().some(function(obs){
      if(obs.y < py - 45 || obs.y > py + 36){ return false; }
      var dx = Math.abs(px - obs.x);
      var dy = Math.abs(py - obs.y);
      if(dx < 46 && dy < 38 && dx > 24){
        me.score += 5;
        me.closeCallTimer = 780;
        me.floatText(px,py - 44,"惊险 +5","#7de4ff");
        flash(me,0x65d6ff,.08,140);
        vibrate(12);
        return true;
      }
      return false;
    });
  },
  cleanWorld:function(){
    function destroyOffscreen(item){
      if(item.y > GH + 70 || item.x < -80 || item.x > GW + 80){ item.destroy(); }
    }
    this.obstacles.getChildren().forEach(destroyOffscreen);
    this.coins.getChildren().forEach(destroyOffscreen);
    this.powerups.getChildren().forEach(destroyOffscreen);
  },
  floatText:function(x,y,text,color){
    var fx = this.add.text(x,y,text,{
      fontSize:"18px",
      color:color,
      fontStyle:"bold",
      stroke:"#000000",
      strokeThickness:3
    }).setOrigin(.5).setDepth(70);
    this.tweens.add({
      targets:fx,
      y:y-42,
      alpha:0,
      duration:520,
      ease:"Quad.easeOut",
      onComplete:function(){ fx.destroy(); }
    });
  },
  togglePause:function(){
    var me = this;
    me.isPaused = !me.isPaused;
    me.physics.world.isPaused = me.isPaused;
    if(me.isPaused){
      me.pauseLayer = me.add.container(0,0).setDepth(120);
      var g = me.add.graphics();
      g.fillStyle(0x000000,.62).fillRect(0,0,GW,GH);
      var title = me.add.text(GW/2,270,"已暂停",{
        fontSize:"34px",
        color:"#ffffff",
        fontStyle:"bold"
      }).setOrigin(.5);
      var hint = me.add.text(GW/2,316,"点击继续或按 P / 空格",{
        fontSize:"16px",
        color:"#cbd7e3"
      }).setOrigin(.5);
      me.pauseLayer.add([g,title,hint]);
      var resume = makeButton(me,GW/2,382,170,"继续",0x22b86f,function(){ me.togglePause(); });
      me.pauseLayer.add([resume.bg,resume.text,resume.zone]);
    }else if(me.pauseLayer){
      me.pauseLayer.destroy(true);
    }
  },
  finishGame:function(){
    var finalScore = Math.floor(this.score);
    saveRecord({score:finalScore,combo:this.maxCombo,level:this.level,time:Date.now()});
    this.scene.start("GameOverScene",{
      score:finalScore,
      combo:this.maxCombo,
      level:this.level
    });
  }
};

var GameOverScene = {
  key:"GameOverScene",
  create:function(data){
    var me = this;
    gradientBackground(me);
    me.add.text(GW/2,150,"游戏结束",{
      fontSize:"38px",
      color:"#ff6b87",
      fontStyle:"bold",
      stroke:"#35131c",
      strokeThickness:5
    }).setOrigin(.5);
    me.add.image(GW/2,224,"cat").setScale(1.8).setAlpha(.82);
    me.add.text(GW/2,310,String(data.score || 0),{
      fontSize:"56px",
      color:"#ffd56f",
      fontStyle:"bold"
    }).setOrigin(.5);
    me.add.text(GW/2,362,"最高连击 x" + (data.combo || 0) + "  |  等级 " + (data.level || 1),{
      fontSize:"18px",
      color:"#cbd7e3"
    }).setOrigin(.5);
    var best = readRecords()[0];
    me.add.text(GW/2,402,best ? "当前最高分 " + best.score : "",{
      fontSize:"16px",
      color:"#8fe3b0",
      fontStyle:"bold"
    }).setOrigin(.5);
    makeButton(me,GW/2,474,190,"再来一局",0x22b86f,function(){ me.scene.start("PlayScene"); });
