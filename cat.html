<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🐱 Cat Escape! - UI Improved</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background: linear-gradient(135deg, #1a0533 0%, #120822 50%, #0a0415 100%);
  display:flex;justify-content:center;align-items:center;
  height:100vh;overflow:hidden;touch-action:none;
  font-family: 'Arial', sans-serif;
}
canvas{display:block; border-radius: 12px; box-shadow: 0 0 30px rgba(255,170,51,0.3);}
</style>
</head>
<body>

<div id="gw"></div>

<script src="./phaser.min.js"></script>

<script>
var GW = 480, GH = 720;

// ============================================================
//  🐱 Cat Escape! v21 - UI Improved Edition
//  ✅ FIXED: Use correct generateTexture() method
//  🎨 IMPROVED: Better UI design and visual effects
// ============================================================

var S_Boot = {
  preload: function(){
    var g = this.add.graphics();
    
    // ====== PLAYER: 橙色猫咪（改进版） ======
    // 身体：椭圆形更自然
    g.fillStyle(0xff9933);
    g.fillEllipse(16, 18, 20, 24);
    
    // 耳朵：三角形 + 内耳
    g.fillStyle(0xff8833);
    g.fillTriangle(8, 8, 14, 2, 20, 10);  // 左耳外
    g.fillTriangle(12, 10, 18, 2, 24, 8); // 右耳外
    g.fillStyle(0xffaa55);
    g.fillTriangle(10, 7, 13, 4, 16, 9);  // 左耳内
    g.fillTriangle(14, 9, 17, 4, 20, 7);  // 右耳内
    
    // 眼睛：大大的萌系眼睛
    g.fillStyle(0xffffff);
    g.fillCircle(12, 16, 4);
    g.fillCircle(20, 16, 4);
    g.fillStyle(0x333333);
    g.fillCircle(12, 16, 2);
    g.fillCircle(20, 16, 2);
    
    // 鼻子和嘴巴
    g.fillStyle(0xff6688);
    g.fillCircle(16, 20, 1.5);
    
    g.generateTexture("player", 32, 36);
    g.clear();
    
    // ====== OBS: 粉色拖鞋（改进版） ======
    // 鞋底
    g.fillStyle(0xff6699);
    g.fillRoundedRect(2, 12, 32, 20, 8);
    
    // 鞋面
    g.fillStyle(0xff88aa);
    g.fillRoundedRect(4, 4, 28, 16, 6);
    
    // 装饰：鞋带孔
    g.fillStyle(0xff4488);
    for(var i = 0; i < 3; i++){
      g.fillCircle(10 + i * 8, 10, 1.5);
    }
    
    // 高光
    g.fillStyle(0xffaacc);
    g.fillRoundedRect(6, 6, 8, 4, 2);
    
    g.generateTexture("obs", 36, 36);
    g.clear();
    
    // ====== COIN: 金色硬币（改进版） ======
    // 外圈
    g.fillStyle(0xffaa00);
    g.fillCircle(12, 12, 10);
    
    // 内圈
    g.fillStyle(0xffcc00);
    g.fillCircle(12, 12, 7);
    
    // 高光
    g.fillStyle(0xffee55);
    g.fillCircle(9, 9, 2);
    
    // 符号
    g.fillStyle(0xff8800);
    g.fillRect(11, 8, 2, 8);
    g.fillRect(8, 11, 8, 2);
    
    g.generateTexture("coin", 24, 24);
    g.clear();
    
    g.destroy();
  },
  
  create: function(){
    this.scene.start("S_Menu");
  }
};

var S_Menu = {
  create: function(){
    var me = this;
    var cx = GW / 2, cy = GH / 2;
    
    // 背景装饰
    me.add.graphics().fillStyle(0x120822).fillRect(0, 0, GW, GH);
    
    // 标题：带描边和阴影
    var title = me.add.text(cx, cy - 140, "🐱 Cat Escape!", {
      fontSize: "36px",
      fill: "#ffaa33",
      fontStyle: "bold",
      stroke: "#ff6600",
      strokeThickness: 4,
      shadow: { offsetX: 2, offsetY: 2, color: "#000", blur: 4, fill: true }
    }).setOrigin(0.5);
    
    // 副标题
    me.add.text(cx, cy - 75, "Help the cat dodge flying slippers!", {
      fontSize: "14px",
      fill: "#aabbcc",
      align: "center"
    }).setOrigin(0.5);
    
    // 装饰：左右两旁的猫咪图标
    me.add.text(cx - 120, cy - 140, "🐾", {fontSize: "24px"}).setOrigin(0.5);
    me.add.text(cx + 120, cy - 140, "🐾", {fontSize: "24px"}).setOrigin(0.5);
    
    // 按钮函数（改进版：带悬停效果）
    function btn(x, y, txt, col, fn){
      var bg = me.add.graphics();
      bg.fillStyle(col);
      bg.fillRoundedRect(x - 75, y - 16, 150, 34, 14);
      
      // 高光效果
      bg.fillStyle(0xffffff, 0.2);
      bg.fillRoundedRect(x - 73, y - 14, 146, 14, 12);
      
      var label = me.add.text(x, y, txt, {
        fontSize: "16px",
        fill: "#ffffff",
        fontStyle: "bold",
        stroke: "#000000",
        strokeThickness: 2
      }).setOrigin(0.5);
      
      var zone = me.add.zone(x, y, 150, 34).setInteractive({useHandCursor: true});
      
      zone.on("pointerover", function(){
        bg.clear();
        bg.fillStyle(0xffffff);
        bg.fillRoundedRect(x - 75, y - 16, 150, 34, 14);
        bg.fillStyle(col);
        bg.fillRoundedRect(x - 73, y - 14, 146, 30, 12);
        label.setScale(1.05);
      });
      
      zone.on("pointerout", function(){
        bg.clear();
        bg.fillStyle(col);
        bg.fillRoundedRect(x - 75, y - 16, 150, 34, 14);
        bg.fillStyle(0xffffff, 0.2);
        bg.fillRoundedRect(x - 73, y - 14, 146, 14, 12);
        label.setScale(1.0);
      });
      
      zone.on("pointerdown", function(){
        label.setScale(0.95);
        me.time.delayedCall(100, fn);
      });
    }
    
    // 按钮
    btn(cx, cy + 10, "🎮 START GAME", 0x00cc66, function(){ me.scene.start("S_Play"); });
    btn(cx, cy + 60, "🏆 RECORDS", 0xffaa00, function(){ me.scene.start("S_Records"); });
    btn(cx, cy + 110, "📤 SHARE", 0x4488ff, function(){
      var url = window.location.href;
      if(navigator.share){ navigator.share({title: "🐱 Cat Escape!", url: url}); }
      else if(navigator.clipboard){ navigator.clipboard.writeText(url); me.showToast("Link copied!"); }
      else { me.showToast("Share: " + url); }
    });
    
    // 版本信息
    me.add.text(GW - 10, GH - 10, "v21 UI Improved", {
      fontSize: "10px",
      fill: "#556677"
    }).setOrigin(1, 1);
  },
  
  // Toast提示
  showToast: function(msg){
    var me = this;
    var toast = me.add.text(GW/2, GH - 50, msg, {
      fontSize: "14px",
      fill: "#ffffff",
      backgroundColor: "#000000",
      padding: { x: 10, y: 5 }
    }).setOrigin(0.5);
    
    me.tweens.add({
      targets: toast,
      alpha: 0,
      duration: 2000,
      ease: "Power2",
      onComplete: function(){ toast.destroy(); }
    });
  }
};

var S_Records = {
  create: function(){
    var me = this;
    
    // 背景
    me.add.graphics().fillStyle(0x0a1a2e).fillRoundedRect(GW/2 - 140, GH/2 - 180, 280, 360, 20);
    
    // 标题
    me.add.text(GW/2, GH/2 - 150, "🏆 RECORDS", {
      fontSize: "24px",
      fill: "#ffaa00",
      fontStyle: "bold",
      stroke: "#cc8800",
      strokeThickness: 3
    }).setOrigin(0.5);
    
    // 读取记录
    try{
      var r = JSON.parse(localStorage.getItem("catEscapeRC")) || [];
      
      if(r.length === 0){
        me.add.text(GW/2, GH/2, "No records yet!\nPlay a game to set a record!", {
          fontSize: "14px",
          fill: "#8899aa",
          align: "center"
        }).setOrigin(0.5);
      }
      else {
        for(var i = 0; i < r.length && i < 5; i++){
          var icon = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : (i+1) + ".";
          me.add.text(GW/2, GH/2 - 80 + i * 40, icon + "  " + r[i].s + " pts", {
            fontSize: "16px",
            fill: i === 0 ? "#ffcc00" : "#00ff88",
            fontStyle: i === 0 ? "bold" : "normal"
          }).setOrigin(0.5);
        }
      }
    }
    catch(e){
      me.add.text(GW/2, GH/2, "Error loading records", {
        fontSize: "14px",
        fill: "#ff4444"
      }).setOrigin(0.5);
    }
    
    // 返回按钮
    btn(me, GW/2, GH/2 + 150, "← BACK", 0xff4444, function(){ me.scene.start("S_Menu"); });
  }
};

var S_Play = {
  init: function(){
    this.score = 0;
    this.lives = 3;
    this.speed = 120;
    this.obsList = [];
    this.coinList = [];
    this.gameOver = false;
    this.combo = 0;
  },
  
  create: function(){
    var me = this;
    
    // 背景：渐变紫色
    var bg = me.add.graphics();
    bg.fillGradientStyle(0x120822, 0x120822, 0x0a0415, 0x0a0415, 1);
    bg.fillRect(0, 0, GW, GH);
    
    // 玩家
    me.player = me.physics.add.sprite(GW/2, GH - 100, "player");
    me.player.setCollideWorldBounds(true);
    me.player.setScale(1.2);
    
    // HUD
    me.scoreText = me.add.text(16, 16, "Score: 0", {
      fontSize: "18px",
      fill: "#ffffff",
      stroke: "#000000",
      strokeThickness: 3
    });
    
    me.livesText = me.add.text(GW - 16, 16, "❤❤❤", {
      fontSize: "18px",
      fill: "#ff4444"
    }).setOrigin(1, 0);
    
    me.comboText = me.add.text(GW/2, 50, "", {
      fontSize: "16px",
      fill: "#ffcc00",
      fontStyle: "bold"
    }).setOrigin(0.5);
    
    // 障碍物组
    me.obsGroup = me.physics.add.group();
    me.coinGroup = me.physics.add.group();
    
    // 碰撞检测
    me.physics.add.overlap(me.player, me.obsGroup, hitObstacle, null, me);
    me.physics.add.overlap(me.player, me.coinGroup, collectCoin, null, me);
    
    // 定时器
    me.obsTimer = me.time.addEvent({
      delay: 1000,
      callback: spawnObstacle,
      callbackScope: me,
      loop: true
    });
    
    me.coinTimer = me.time.addEvent({
      delay: 1500,
      callback: spawnCoin,
      callbackScope: me,
      loop: true
    });
    
    // 键盘控制
    me.cursors = me.input.keyboard.createCursorKeys();
    
    // 触摸控制
    me.input.on("pointermove", function(pointer){
      if(!me.gameOver){
        me.player.x = Phaser.Math.Clamp(pointer.x, 16, GW - 16);
      }
    });
    
    // 音效（可选）
    // me.coinSound = me.sound.add('coin');
    // me.hitSound = me.sound.add('hit');
  },
  
  update: function(){
    var me = this;
    if(me.gameOver) return;
    
    // 键盘控制
    if(me.cursors.left.isDown){ me.player.setVelocityX(-180); }
    else if(me.cursors.right.isDown){ me.player.setVelocityX(180); }
    else { me.player.setVelocityX(0); }
    
    // 分数递增
    me.score += 0.02;
    me.scoreText.setText("Score: " + Math.floor(me.score));
    
    // 连击计数
    if(me.score - Math.floor(me.score) < 0.02){
      me.combo++;
      if(me.combo >= 10){
        me.comboText.setText("🔥 COMBO x" + me.combo + "!");
        me.time.delayedCall(500, function(){ me.comboText.setText(""); });
      }
    }
    
    // 加速
    if(me.score > 0 && Math.floor(me.score) % 100 === 0){
      me.speed = Math.min(me.speed + 5, 400);
    }
  }
};

var S_GameOver = {
  create: function(){
    var me = this;
    var finalScore = Math.floor(me.scene.settings.data.score) || 0;
    
    // 背景遮罩
    me.add.graphics().fillStyle(0x000000, 0.8).fillRect(0, 0, GW, GH);
    
    // Game Over 面板
    me.add.graphics().fillStyle(0x1a1a2e).fillRoundedRect(GW/2 - 120, GH/2 - 160, 240, 320, 20);
    
    // 标题
    me.add.text(GW/2, GH/2 - 120, "💀 GAME OVER", {
      fontSize: "28px",
      fill: "#ff4444",
      fontStyle: "bold",
      stroke: "#000000",
      strokeThickness: 4
    }).setOrigin(0.5);
    
    // 分数
    me.add.text(GW/2, GH/2 - 60, "Score: " + finalScore, {
      fontSize: "22px",
      fill: "#ffcc00",
      fontStyle: "bold"
    }).setOrigin(0.5);
    
    // 最高分
    try{
      var r = JSON.parse(localStorage.getItem("catEscapeRC")) || [];
      var best = r.length > 0 ? r[0].s : 0;
      me.add.text(GW/2, GH/2 - 20, "Best: " + best, {
        fontSize: "16px",
        fill: "#00ff88"
      }).setOrigin(0.5);
    } catch(e) {}
    
    // 按钮
    btn(me, GW/2, GH/2 + 40, "🔄 RETRY", 0x00cc66, function(){ me.scene.start("S_Play"); });
    btn(me, GW/2, GH/2 + 90, "🏠 MENU", 0x4488ff, function(){ me.scene.start("S_Menu"); });
    
    // 保存记录
    try{
      var rc = JSON.parse(localStorage.getItem("catEscapeRC")) || [];
      rc.push({s: finalScore, t: Date.now()});
      rc.sort(function(a, b){ return b.s - a.s; });
      rc = rc.slice(0, 5);
      localStorage.setItem("catEscapeRC", JSON.stringify(rc));
    } catch(e){}
  }
};

// ====== 辅助函数 ======

function spawnObstacle(){
  var me = this;
  if(me.gameOver) return;
  
  var x = Phaser.Math.Between(36, GW - 36);
  var obs = me.obsGroup.create(x, -36, "obs");
  obs.setVelocityY(me.speed);
  obs.setAngularVelocity(Phaser.Math.Between(-50, 50));
  me.obsList.push(obs);
}

function spawnCoin(){
  var me = this;
  if(me.gameOver) return;
  
  var x = Phaser.Math.Between(36, GW - 36);
  var coin = me.coinGroup.create(x, -24, "coin");
  coin.setVelocityY(me.speed * 0.7);
  coin.setAngularVelocity(100);
  me.coinList.push(coin);
}

function hitObstacle(player, obs){
  var me = player.scene;
  if(me.gameOver) return;
  
  obs.destroy();
  me.lives--;
  me.combo = 0;
  
  // 更新生命显示
  var hearts = "";
  for(var i = 0; i < me.lives; i++) hearts += "❤";
  me.livesText.setText(hearts);
  
  // 闪烁效果
  me.player.setTint(0xff0000);
  me.time.delayedCall(200, function(){ me.player.clearTint(); });
  
  if(me.lives <= 0){
    me.gameOver = true;
    me.physics.pause();
    me.scene.start("S_GameOver", {score: me.score});
  }
}

function collectCoin(player, coin){
  var me = player.scene;
  if(me.gameOver) return;
  
  coin.destroy();
  me.score += 10;
  me.combo++;
  
  // 金币特效
  var emitter = me.add.particles(coin.x, coin.y, "coin", {
    speed: 100,
    scale: {start: 0.5, end: 0},
    alpha: {start: 1, end: 0},
    lifespan: 300,
    quantity: 5
  });
  me.time.delayedCall(500, function(){ emitter.destroy(); });
}

function btn(scene, x, y, txt, col, fn){
  var bg = scene.add.graphics();
  bg.fillStyle(col);
  bg.fillRoundedRect(x - 60, y - 14, 120, 30, 12);
  
  var label = scene.add.text(x, y, txt, {
    fontSize: "14px",
    fill: "#ffffff",
    fontStyle: "bold"
  }).setOrigin(0.5);
  
  var zone = scene.add.zone(x, y, 120, 30).setInteractive({useHandCursor: true});
  
  zone.on("pointerdown", function(){
    scene.time.delayedCall(100, fn);
  });
}

// ====== 游戏配置 ======

var config = {
  type: Phaser.AUTO,
  width: GW,
  height: GH,
  parent: "gw",
  backgroundColor: "#120822",
  physics: {
    default: "arcade",
    arcade: {
      gravity: {y: 0},
      debug: false
    }
  },
  scene: [S_Boot, S_Menu, S_Records, S_Play, S_GameOver]
};

var game = new Phaser.Game(config);
</script>

</body>
</html>
