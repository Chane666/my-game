<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dodge Master</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a2e; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
canvas { display: block; }
</style>
</head>
<body>
<script src="./phaser.min.js"></script>
<script>
var config = {
    type: Phaser.AUTO,
    width: Math.min(window.innerWidth, 480),
    height: Math.min(window.innerHeight, 720),
    backgroundColor: '#0a0a2e',
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 0 }, debug: false }
    },
    scene: {
        preload: preload,
        create: create,
        update: update
    }
};

var game = new Phaser.Game(config);
var player;
var cursors;
var obstacles;
var coins;
var scoreText;
var score = 0;
var highScore = localStorage.getItem('dodgeHighScore') || 0;
var isGameOver = false;
var spawnTimer = 0;
var coinTimer = 0;
var difficultyTimer = 0;
var spawnInterval = 1200;
var coinInterval = 2000;
var gameSpeed = 3;
var particles;

function preload() {}

function create() {
    var g = this.add.graphics();

    g.fillStyle(0x00ff88);
    g.fillCircle(16, 16, 14);
    g.generateTexture('player', 32, 32);
    g.clear();

    g.fillStyle(0xff3344);
    g.fillRoundedRect(4, 4, 28, 28, 6);
    g.generateTexture('obstacle', 36, 36);
    g.clear();

    g.fillStyle(0xffcc00);
    g.fillCircle(12, 12, 10);
    g.lineStyle(2, 0xff9900);
    g.strokeCircle(12, 12, 10);
    g.generateTexture('coin', 24, 24);
    g.clear();
    g.destroy();

    var pg = this.add.graphics();
    pg.fillStyle(0xffffff);
    pg.fillCircle(4, 4, 3);
    pg.generateTexture('particle', 8, 8);
    pg.destroy();

    obstacles = this.physics.add.group();
    coins = this.physics.add.group();

    player = this.physics.add.sprite(config.width / 2, config.height - 100, 'player');
    player.setCollideWorldBounds(true);
    player.body.setSize(26, 26);

    cursors = this.input.keyboard.createCursorKeys();
    this.input.keyboard.on('keydown-SPACE', function() {
        if (isGameOver) restartGame(this);
    }, this);

    this.input.on('pointermove', function(pointer) {
        if (!isGameOver && pointer.isDown) {
            player.x = Phaser.Math.Clamp(pointer.x, 20, config.width - 20);
            player.y = Phaser.Math.Clamp(pointer.y, 20, config.height - 20);
        }
    });

    this.physics.add.overlap(player, obstacles, hitObstacle, null, this);
    this.physics.add.overlap(player, coins, collectCoin, null, this);

    scoreText = this.add.text(10, 10, 'Score: 0', { fontSize: '22px', fill: '#fff', fontFamily: 'Arial' });
    this.add.text(10, 38, 'Best: ' + highScore, { fontSize: '14px', fill: '#aaa', fontFamily: 'Arial' });

    particles = this.add.particles(0, 0, 'particle', {
        speed: { min: 50, max: 150 },
        scale: { start: 1, end: 0 },
        lifespan: 400,
        blendMode: 'ADD'
    });
    particles.stop();

    this.flashOverlay = this.add.rectangle(config.width/2, config.height/2, config.width, config.height, 0xff0000, 0);
}

function update(time, delta) {
    if (isGameOver) return;

    var speed = 6;
    if (cursors.left.isDown) player.x -= speed;
    if (cursors.right.isDown) player.x += speed;
    if (cursors.up.isDown) player.y -= speed;
    if (cursors.down.isDown) player.y += speed;

    spawnTimer += delta;
    if (spawnTimer >= spawnInterval) {
        spawnTimer = 0;
        var obs = obstacles.create(Phaser.Math.Between(30, config.width - 30), -40, 'obstacle');
        obs.setVelocityY(gameSpeed * 60 + Phaser.Math.Between(-30, 30));
        obs.setVelocityX(Phaser.Math.Between(-80, 80));
        obs.body.setSize(28, 28);
    }

    coinTimer += delta;
    if (coinTimer >= coinInterval) {
        coinTimer = 0;
        var c = coins.create(Phaser.Math.Between(30, config.width - 30), -30, 'coin');
        c.setVelocityY((gameSpeed * 40) + Phaser.Math.Between(0, 20));
        c.body.setSize(18, 18);
    }

    difficultyTimer += delta;
    if (difficultyTimer >= 5000) {
        difficultyTimer = 0;
        gameSpeed += 0.3;
        spawnInterval = Math.max(400, spawnInterval - 80);
        coinInterval = Math.max(800, coinInterval - 100);
    }

    obstacles.children.each(function(o) {
        if (o.y > config.height + 60 || o.y < -200 || o.x < -60 || o.x > config.width + 60) o.destroy();
    });
    coins.children.each(function(c) {
        if (c.y > config.height + 50) c.destroy();
    });
}

function hitObstacle(player, obstacle) {
    if (isGameOver) return;
    isGameOver = true;

    this.tweens.add({
        targets: this.flashOverlay,
        alpha: 0.5,
        duration: 100,
        yoyo: true,
        hold: 50,
        repeat: 2,
        onComplete: function() { this.flashOverlay.alpha = 0; }.bind(this)
    });

    if (particles) particles.emitParticleAt(player.x, player.y, 15);

    player.setVisible(false);

    obstacles.clear(true, true);
    coins.clear(true, true);

    this.add.text(config.width / 2, config.height / 2 - 30, 'GAME OVER', {
        fontSize: '36px', fill: '#ff3344', fontFamily: 'Arial', fontStyle: 'bold'
    }).setOrigin(0.5);

    this.add.text(config.width / 2, config.height / 2 + 20, 'Score: ' + score, {
        fontSize: '22px', fill: '#fff', fontFamily: 'Arial'
    }).setOrigin(0.5);

    if (score > highScore) {
        highScore = score;
        localStorage.setItem('dodgeHighScore', highScore);
        this.add.text(config.width / 2, config.height / 2 + 55, 'NEW BEST!', {
            fontSize: '18px', fill: '#ffcc00', fontFamily: 'Arial'
        }).setOrigin(0.5);
    }

    this.add.text(config.width / 2, config.height / 2 + 90, 'Press SPACE or Tap to Restart', {
        fontSize: '14px', fill: '#aaa', fontFamily: 'Arial'
    }).setOrigin(0.5);

    this.input.once('pointerdown', function() {
        if (isGameOver) restartGame(this);
    }, this);
}

function collectCoin(player, coin) {
    coin.destroy();
    score += 10;
    scoreText.setText('Score: ' + score);

    if (particles) particles.emitParticleAt(coin.x, coin.y, 5);

    var txt = this.add.text(coin.x, coin.y, '+10', {
        fontSize: '16px', fill: '#ffcc00', fontFamily: 'Arial'
    }).setOrigin(0.5);
    this.tweens.add({ targets: txt, y: coin.y - 30, alpha: 0, duration: 500, onComplete: function() { txt.destroy(); } });
}

function restartGame(scene) {
    isGameOver = false;
    score = 0;
    spawnTimer = 0;
    coinTimer = 0;
    difficultyTimer = 0;
    spawnInterval = 1200;
    coinInterval = 2000;
    gameSpeed = 3;

    scene.scene.restart();
}
</script>
</body>
</html>
