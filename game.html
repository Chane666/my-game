<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Dodge Master</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;touch-action:none;font-family:Arial,sans-serif}
canvas{display:block}
#err{color:#ff4444;position:fixed;top:10px;left:10px;font-size:12px;z-index:999;font-family:monospace;word-break:break-all}
</style>
</head>
<body>
<div id="err"></div>
<div id="gw"></div>
<script src="./phaser.min.js"></script>
<script>
window.onerror=function(e){document.getElementById("err").innerText="ERR: "+e};
var W=480,H=720,BK="dodgeMasterHS",RK="dodgeMasterRC";

/* ===== MENU SCENE ===== */
var S_Menu={
  create:function(){
    var me=this,cx=W/2;
    me.add.text(cx,100,"DODGE MASTER",{fontSize:"40px",fill:"#00ff88",fontStyle:"bold"}).setOrigin(0.5);
    me.add.text(cx,150,"Avoid the red blocks!",{fontSize:"14px",fill:"#667788"}).setOrigin(0.5);
    // START button
    me.add.text(cx,220,"[ START GAME ]",{fontSize:"18px",fill:"#00dd66",fontStyle:"bold"})
      .setOrigin(0.5).setInteractive({useHandCursor:true})
      .on("pointerdown",function(){me.scene.start("S_Play")});
    // RECORDS button
    me.add.text(cx,280,"[ RECORDS ]",{fontSize:"18px",fill:"#eebb00",fontStyle:"bold"})
      .setOrigin(0.5).setInteractive({useHandCursor:true})
      .on("pointerdown",function(){me.scene.start("S_Records")});
    // SHARE button
    me.add.text(cx,340,"[ SHARE ]",{fontSize:"18px",fill:"#3388ff",fontStyle:"bold"})
      .setOrigin(0.5).setInteractive({useHandCursor:true})
      .on("pointerdown",function(){
        if(navigator.clipboard)navigator.clipboard.writeText(location.href)
          .then(function(){alert("Link copied!")});
        else prompt("Copy:",location.href);
      });
  }
};

/* ===== RECORDS SCENE ===== */
var S_Records={
  create:function(){
    var me=this,cx=W/2;
    me.add.text(cx,80,"RECORDS",{fontSize:"26px",fill:"#ffcc00",fontStyle:"bold"}).setOrigin(0.5);
    try{
      var r=JSON.parse(localStorage.getItem(RK))||[];
      if(!r.length)me.add.text(cx,H/2,"No records yet!",{fontSize:"18px",fill:"#556677"}).setOrigin(0.5);
      else for(var i=0;i<r.length&&i<10;i++)
        me.add.text(cx,150+i*32,(i+1)+". "+r[i].s+" pts",{fontSize:"17px",fill:i<3?"#ffcc00":"#aaccee"}).setOrigin(0.5);
    }catch(e){}
    me.add.text(cx,H-80,"[ BACK ]",{fontSize:"18px",fill:"#ff5544",fontStyle:"bold"})
      .setOrigin(0.5).setInteractive({useHandCursor:true})
      .on("pointerdown",function(){me.scene.start("S_Menu")});
  }
};

/* ===== PLAY SCENE ===== */
var S_Play={
  init:function(){this._sc=0;this._lv=3;this._sp=130;this._os=[];this._ov=false},
  create:function(){
    var me=this;
    me.physics.world.setBounds(0,0,W,H);
    // player
    var pg=me.add.graphics();pg.fillStyle(0x00ff88,1);pg.fillCircle(14,14,12);
    pg.generateTexture("__p",28,28);pg.clear();pg.destroy();
    me.pl=me.physics.add.sprite(W/2,H-70,"__p");me.pl.setCollideWorldBounds(true);
    // HUD
    me.hd=me.add.text(10,10,"SCORE: 0   LIVES: 3",{fontSize:"14px",fill:"#99bbcc"});
    // timer
    me.tk=me.time.addEvent({delay:1000,callback:function(){
      me._sc++;me.hd.setText("SCORE: "+me._sc+"   LIVES: "+me._lv);
    },loop:true});
    // start spawning
    me._st=true;
  },
  update:function(){
    if(this._ov)return;
    var me=this;
    // spawn
    if(me._st){
      me._st=false;
      var og=me.add.graphics();og.fillStyle(0xff3344,1);og.fillRect(0,0,28,28);
      og.generateTexture("__o",28,28);og.clear();og.destroy();
      var ob=me.physics.add.sprite(Phaser.Math.Between(30,W-30),-25,"__o");
      ob.setVelocityY(me._sp+me._sc*2);
      me._os.push(ob);
      me.time.delayedCall(Math.max(350,650-me._sc*4),function(){me._st=true});
    }
    // control
    var k=me.input.keyboard?me.input.keyboard.createCursorKeys():null;
    if(k&&k.left.isDown)me.pl.x-=6;
    if(k&&k.right.isDown)me.pl.x+=6;
    if(me.input.activePointer.isDown)me.pl.x=me.input.activePointer.x;
    me.pl.x=Phaser.Math.Clamp(me.pl.x,14,W-14);
    // collision
    for(var i=me._os.length-1;i>=0;i--){
      var o=me._os[i];if(!o||!o.active){if(o)o.destroy();me._os.splice(i,1);continue}
      if(Phaser.Math.Distance.Between(me.pl.x,me.pl.y,o.x,o.y)<24){
        me._lv--;o.destroy();me._os.splice(i,1);
        me.hd.setText("SCORE: "+me._sc+"   LIVES: "+me._lv);
        if(me._lv<=0){gameOver(me)}return;
      }
      if(o.y>H+40){o.destroy();me._os.splice(i,1)}
    }
  }
};

function gameOver(sc){
  sc._ov=true;sc.physics.pause();
  if(sc.tk)sc.tk.remove();sc._st=false;
  var cx=W/2,cy=H/2;
  sc.add.rectangle(cx,cy,280,230,0x0a1a2e,0.95);
  sc.add.text(cx,cy-70,"GAME OVER",{fontSize:"30px",fill:"#ff3344",fontStyle:"bold"}).setOrigin(0.5);
  sc.add.text(cx,cy-20,"Score: "+sc._sc,{fontSize:"22px",fill:"#fff"}).setOrigin(0.5);
  try{
    var r=JSON.parse(localStorage.getItem(RK))||[];
    r.push({s:sc._sc,t:new Date().toLocaleString()});
    r.sort(function(a,b){return b.s-a.s});r=r.slice(0,10);
    localStorage.setItem(RK,JSON.stringify(r));
    var hs=parseInt(localStorage.getItem(BK)||"0");
    if(sc._sc>hs)localStorage.setItem(BK,String(sc._sc));
  }catch(e){}
  sc.add.text(cx,cy+40,"[ RETRY ]",{fontSize:"20px",fill:"#00cc66",fontStyle:"bold"})
    .setOrigin(0.5).setInteractive({useHandCursor:true})
    .on("pointerdown",function(){sc.scene.restart()});
  sc.add(text(cx,cy+85,"[ MENU ]",{fontSize:"18px",fill:"#4488ff",fontStyle:"bold"},sc))
    .setOrigin(0.5).setInteractive({useHandCursor:true})
    .on("pointerdown",function(){sc.scene.start("S_Menu")});
}

// launch
new Phaser.Game({
  width:W,height:H,parent:"gw",
  backgroundColor:"#050510",
  scene:[S_Menu,S_Records,S_Play],
  physics:{default:"arcade",arcade:{debug:false}}
});
</script>
</body>
</html>
