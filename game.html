<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dodge Master</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a2e;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;touch-action:none;font-family:Arial,sans-serif}
canvas{display:block;border-radius:8px}
</style>
</head>
<body>
<script src="./phaser.min.js"></script>
<script>
var GW = Math.min(window.innerWidth, 480);
var GH = Math.min(window.innerHeight, 720);
var HK = 'dodgeMasterHS';

function Boot() {
    this.preload = function() {
        var g = this.add.graphics();
        g.fillStyle(0x00ff88); g.fillCircle(16, 16, 14); g.generateTexture('player', 32, 32); g.clear();
        g.fillStyle(0xff3344); g.fillRoundedRect(4, 4, 28, 28, 6); g.generateTexture('obstacle', 36, 36); g.clear();
        g.fillStyle(0xffcc00); g.fillCircle(12, 12, 10);
        g.lineStyle(2, 0xff9900); g.strokeCircle(12, 12, 10);
        g.generateTexture('coin', 24, 24); g.clear();
        g.fillStyle(0xffffff); g.fillCircle(4, 4, 3); g.generateTexture('part', 8, 8); g.clear();
        g.destroy();
    };
    this.create = function() {
        this.scene.start('Menu');
    };
}

function Menu() {
    this.create = function() {
        var s = this;
        var cx = GW / 2;
        var cy = GH / 2;

        for (var i = 0; i < 30; i++) {
            var star = s.add.circle(
                Phaser.Math.Between(0, GW),
                Phaser.Math.Between(0, GH),
                Phaser.Math.Between(1, 2),
                0xffffff,
                Phaser.Math.FloatBetween(0.15, 0.5)
            );
            s.tweens.add({
                targets: star,
                alpha: Phaser.Math.FloatBetween(0.1, 0.7),
                duration: Phaser.Math.Between(800, 2500),
                yoyo: true,
                repeat: -1,
                delay: Phaser.Math.Between(0, 2000)
            });
        }

        var title = s.add.text(cx, cy - 130, 'DODGE\nMASTER', {
            fontSize: '40px',
            fill: '#00ff88',
            fontFamily: 'Arial Black, Arial',
            fontStyle: 'bold'
        }).setOrigin(0.5).setAlign('center');

        s.tweens.add({
            targets: title,
            scale: 1.06,
            duration: 700,
            yoyo: true,
            repeat: -1,
            ease: 'Sine.easeInOut'
        });

        s.add.text(cx, cy - 35, 'Dodge . Collect . Survive', {
            fontSize: '13px',
            fill: '#7788aa'
        }).setOrigin(0.5);

        var hsVal = localStorage.getItem(HK) || 0;
        if (hsVal > 0) {
            s.add.text(cx, cy + 10, '\u2605 BEST: ' + hsVal, {
                fontSize: '16px',
                fill: '#ffcc00',
                fontStyle: 'bold'
            }).setOrigin(0.5);
        }

        makeBtn(s, cx, cy + 60, '\u25B6  START GAME', '#00ff88', function() {
            s.scene.start('Play');
        });

        s.add.text(cx, cy + 120, 'Drag or Arrow Keys to move', {
            fontSize: '11px',
            fill: '#445566'
        }).setOrigin(0.5);

        makeBtn(s, cx, cy + 160, '\u2770  SHARE GAME', '#5588ff', function() {
            doShare(s);
        }, 0.75);

        s.add.particles(0, 0, 'part', {
            x: { min: 0, max: GW },
            y: -10,
            speedY: { min: 20, max: 60 },
            speedX: { min: -10, max: 10 },
            scale: { start: 0.3, end: 0 },
            lifespan: 5000,
            quantity: 1,
            frequency: 500,
            tint: [0x3355ff, 0x00ff88, 0xff55aa],
            blendMode: 'ADD'
        });
    };
}

function PlayScene() {
    var _score = 0;
    var _paused = false;
    var _dead = false;
    var _st = 0, _ct = 0, _dt = 0;
    var _si = 1200, _ci = 2000, _spd = 3;
    var _obs, _coin, _player, _scoreTxt, _parts, _cparts;
    var _pOv, _pTxt, _pSub, _pBtns, _pauseBtn;

    this.preload = function() {};
    this.create = function() {
        var s = this;
        _score = 0; _paused = false; _dead = false;
        _st = 0; _ct = 0; _dt = 0;
        _si = 1200; _ci = 2000; _spd = 3;

        var gg = s.add.graphics();
        gg.lineStyle(1, 0x1a1a3e, 0.4);
        for (var i = 0; i < GW; i += 40) { gg.moveTo(i, 0); gg.lineTo(i, GH); }
        for (var j = 0; j < GH; j += 40) { gg.moveTo(0, j); gg.lineTo(GW, j); }

        _obs = s.physics.add.group();
        _coin = s.physics.add.group();

        _player = s.physics.add.sprite(GW / 2, GH - 100, 'player');
        _player.setCollideWorldBounds(true);
        _player.body.setSize(26, 26);

        var cursors = s.input.keyboard.createCursorKeys();

        s.input.keyboard.on('keydown-SPACE', function() {
            if (_dead) { doRestart(s); }
            else { doPause(s); }
        });

        s.input.keyboard.on('keydown-ESC', function() { doPause(s); });
        s.input.keyboard.on('keydown-P', function() { doPause(s); });

        s.input.on('pointermove', function(ptr) {
            if (!_paused && !_dead && ptr.isDown) {
                _player.x = Phaser.Math.Clamp(ptr.x, 22, GW - 22);
                _player.y = Phaser.Math.Clamp(ptr.y, 22, GH - 22);
            }
        });

        s.physics.add.overlap(_player, _obs, onHit, null, s);
        s.physics.add.overlap(_player, _coin, onCoin, null, s);

        s.add.rectangle(GW / 2, 22, GW, 44, 0x000000, 0.4).setDepth(100);

        _scoreTxt = s.add.text(14, 10, 'Score: 0', {
            fontSize: '20px', fill: '#fff', fontStyle: 'bold'
        }).setDepth(101);

        s.add.text(GW - 14, 10, 'Best: ' + (localStorage.getItem(HK) || 0), {
            fontSize: '13px', fill: '#99aabb'
        }).setOrigin(1, 0).setDepth(101);

        // Pause button
        _pauseBtn = s.add.text(GW - 30, 52, '\u275A\u275A', {
            fontSize: '16px', fill: '#667788'
        }).setOrigin(0.5).setDepth(101).setInteractive({ useHandCursor: true });
        _pauseBtn.on('pointerdown', function() { doPause(s); });
        _pauseBtn.on('pointerover', function() { _pauseBtn.setColor('#aabbcc'); });
        _pauseBtn.on('pointerout', function() { _pauseBtn.setColor('#667788'); });

        // Particles
        _parts = s.add.particles(0, 0, 'part', {
            speed: { min: 60, max: 160 },
            scale: { start: 1, end: 0 },
            lifespan: 300,
            blendMode: 'ADD'
        }).stop();

        _cparts = s.add.particles(0, 0, 'part', {
            speed: { min: 30, max: 80 },
            scale: { start: 0.6, end: 0 },
            lifespan: 250,
            tint: 0xffcc00,
            blendMode: 'ADD'
        }).stop();

        // Pause overlay
        _pOv = s.add.rectangle(GW / 2, GH / 2, GW, GH, 0x000022, 0.75)
            .setDepth(200).setVisible(false).setInteractive();
        _pTxt = s.add.text(GW / 2, GH / 2 - 30, 'PAUSED', {
            fontSize: '44px', fill: '#00ff88',
            fontFamily: 'Arial Black', fontStyle: 'bold'
        }).setOrigin(0.5).setDepth(201).setVisible(false);
        _pSub = s.add.text(GW / 2, GH / 2 + 25, 'Tap or press SPACE', {
            fontSize: '14px', fill: '#7788aa'
        }).setOrigin(0.5).setDepth(201).setVisible(false);

        // Pause buttons array
        _pBtns = [];

        var rb = s.add.text(GW / 2, GH / 2 + 80, '\u25B6  RESUME', {
            fontSize: '18px', fill: '#00ff88', fontStyle: 'bold',
            backgroundColor: '#001a0a', padding: { x: 20, y: 10 }
        }).setOrigin(0.5).setDepth(201).setVisible(false).setInteractive({ useHandCursor: true });
        rb.on('pointerdown', function() { doPause(s); });
        rb.on('pointerover', function() { rb.setStyle({ backgroundColor: '#003320' }); });
        rb.on('pointerout', function() { rb.setStyle({ backgroundColor: '#001a0a' }); });
        _pBtns.push(rb);

        var qb = s.add.text(GW / 2, GH / 2 + 130, '\u25C0  MENU', {
            fontSize: '18px', fill: '#ff4466', fontStyle: 'bold',
            backgroundColor: '#1a0008', padding: { x: 20, y: 10 }
        }).setOrigin(0.5).setDepth(201).setVisible(false).setInteractive({ useHandCursor: true });
        qb.on('pointerdown', function() { s.scene.start('Menu'); });
        qb.on('pointerover', function() { qb.setStyle({ backgroundColor: '#330015' }); });
        qb.on('pointerout', function() { qb.setStyle({ backgroundColor: '#1a0008' }); });
        _pBtns.push(qb);

        // Entry anim
        _player.setAlpha(0).setScale(2);
        s.tweens.add({ targets: _player, alpha: 1, scale: 1, duration: 450, ease: 'Back.easeOut' });
        s.cameras.main.shake(180, 0.003);
    };

    this.update = function(time, delta) {
        if (_paused || _dead) return;
        var s = this;
        var mv = 6.5;
        var c = s.input.keyboard.createCursorKeys();
        if (c.left.isDown) _player.x -= mv;
        if (c.right.isDown) _player.x += mv;
        if (c.up.isDown) _player.y -= mv;
        if (c.down.isDown) _player.y += mv;

        _st += delta;
        if (_st >= _si) {
            _st = 0;
            var o = _obs.create(Phaser.Math.Between(35, GW - 35), -40, 'obstacle');
            o.setVelocityY(_spd * 60 + Phaser.Math.Between(-20, 20));
            o.setVelocityX(Phaser.Math.Between(-90, 90));
            o.body.setSize(28, 28);
        }

        _ct += delta;
        if (_ct >= _ci) {
            _ct = 0;
            var cn = _coin.create(Phaser.Math.Between(35, GW - 35), -30, 'coin');
            cn.setVelocityY(_spd * 40 + Phaser.Math.Between(0, 20));
            cn.body.setSize(18, 18);
            s.tweens.add({
                targets: cn,
                scale: { from: 0.8, to: 1.15 },
                duration: 350,
                yoyo: true,
                repeat: -1,
                ease: 'Sine.easeInOut'
            });
        }

        _dt += delta;
        if (_dt >= 5000) {
            _dt = 0;
            _spd += 0.3;
            _si = Math.max(350, _si - 70);
            _ci = Math.max(700, _ci - 90);
            var spT = s.add.text(GW / 2, GH / 2, 'SPEED UP!', {
                fontSize: '18px', fill: '#ff5533', fontStyle: 'bold'
            }).setOrigin(0.5).setDepth(80).setAlpha(0);
            s.tweens.add({
                targets: spT,
                alpha: 1,
                y: GH / 2 - 20,
                duration: 300,
                yoyo: true,
                repeat: 1,
                onComplete: function() { spT.destroy(); }
            });
        }

        _obs.children.each(function(x) {
            if (x.y > GH + 60 || x.y < -200 || x.x < -60 || x.x > GW + 60) x.destroy();
        });
        _coin.children.each(function(x) {
            if (x.y > GH + 50) x.destroy();
        });

        if (time % 50 < 15) {
            _parts.emitParticleAt(
                _player.x + Phaser.Math.FloatBetween(-6, 6),
                _player.y + 12, 1
            );
        }
    };

    function doPause(s) {
        if (_dead) return;
        _paused = !_paused;
        var hide = !_paused;
        _pOv.setVisible(!hide);
        _pTxt.setVisible(!hide);
        _pSub.setVisible(!hide);
        for (var i = 0; i < _pBtns.length; i++) {
            _pBtns[i].setVisible(!hide);
        }
        if (_paused) { s.physics.pause(); }
        else { s.physics.resume(); }
    }

    function onHit(ply, ob) {
        var s = this;
        if (_dead) return;
        _dead = true;

        _parts.emitParticleAt(_player.x, _player.y, 30);
        s.cameras.main.shake(280, 0.02);
        s.cameras.main.flash(180, 255, 0, 0, false);

        _player.setVisible(false);
        _obs.clear(true, true);
        _coin.clear(true, true);
        if (_pauseBtn) _pauseBtn.setVisible(false);

        // GO Panel
        var pnl = s.add.container(GW / 2, GH / 2).setDepth(150);
        pnl.add(s.add.rectangle(0, 0, 280, 250, 0x08081e, 0.93).setStrokeStyle(2, 0xff3344));
        pnl.add(s.add.text(0, -85, 'GAME OVER', {
            fontSize: '34px', fill: '#ff3344',
            fontFamily: 'Arial Black', fontStyle: 'bold'
        }).setOrigin(0.5));
        pnl.add(s.add.text(0, -38, 'Score: ' + _score, {
            fontSize: '26px', fill: '#ffffff', fontStyle: 'bold'
        }).setOrigin(0.5));

        var bHs = parseInt(localStorage.getItem(HK) || 0);
        if (_score > bHs) {
            localStorage.setItem(HK, String(_score));
            var nr = s.add.text(0, 5, '\u2605 NEW RECORD! \u2605', {
                fontSize: '18px', fill: '#ffcc00', fontStyle: 'bold'
            }).setOrigin(0.5);
            pnl.add(nr);
            s.tweens.add({ targets: nr, scale: { from: 1.2, to: 1 }, duration: 400, yoyo: true, repeat: 2 });
        } else {
            pnl.add(s.add.text(0, 5, 'Best: ' + bHs, {
                fontSize: '15px', fill: '#888899'
            }).setOrigin(0.5));
        }

        addPnlBtn(s, pnl, 0, 52, '\u25B6  AGAIN', '#00ff88', function() { doRestart(s); });
        addPnlBtn(s, pnl, 0, 100, '\u25C0  MENU', '#5588ff', function() { s.scene.start('Menu'); });
        addPnlBtn(s, pnl, 0, 148, '\u2770  SHARE', '#aa55ff', function() { doShare(s, _score); });

        pnl.setScale(0.3).setAlpha(0);
        s.tweens.add({ targets: pnl, scale: 1, alpha: 1, duration: 420, ease: 'Back.easeOut' });
    }

    function onCoin(ply, cn) {
        var s = this;
        cn.destroy();
        _score += 10;
        _scoreTxt.setText('Score: ' + _score);

        _cparts.emitParticleAt(cn.x, cn.y, 8);

        var ft = s.add.text(cn.x, cn.y - 10, '+10', {
            fontSize: '17px', fill: '#ffcc00', fontStyle: 'bold'
        }).setOrigin(0.5).setDepth(50);
        s.tweens.add({
            targets: ft, y: cn.y - 38, alpha: 0,
            duration: 480, ease: 'Cubic.easeOut',
            onComplete: function() { ft.destroy(); }
        });

        s.tweens.add({ targets: _scoreTxt, scale: { from: 1.15, to: 1 }, duration: 140 });
    }

    function doRestart(s) {
        s.scene.restart();
    }
}

function addPnlBtn(s, parent, x, y, text, color, cb) {
    var btn = s.add.text(x, y, text, {
        fontSize: '15px', fill: color, fontStyle: 'bold',
        backgroundColor: Phaser.Display.Color.IntegerToColor(color).darken(50).rgba,
        padding: { x: 24, y: 9 }
    }).setOrigin(0.5).setInteractive({ useHandCursor: true });
    parent.add(btn);
    btn.on('pointerover', function() {
        btn.setStyle({ backgroundColor: Phaser.Display.Color.IntegerToColor(color).darken(30).rgba });
    });
    btn.on('pointerout', function() {
        btn.setStyle({ backgroundColor: Phaser.Display.Color.IntegerToColor(color).darken(50).rgba });
    });
    btn.on('pointerdown', cb);
}

function makeBtn(scene, x, y, text, color, cb, scl) {
    if (!scl) scl = 1;
    var bw = 220 * scl, bh = 48 * scl;
    var bg = scene.add.rectangle(x, y, bw, bh, color, 0.1).setStrokeStyle(1.5, color)
        .setInteractive({ useHandCursor: true });
    var lbl = scene.add.text(x, y, text, {
        fontSize: String(Math.round(18 * scl)) + 'px',
        fill: color,
        fontStyle: 'bold'
    }).setOrigin(0.5);
    bg.on('pointerover', function() { bg.setFillStyle(color, 0.22); bg.setScale(1.04); });
    bg.on('pointerout', function() { bg.setFillStyle(color, 0.1); bg.setScale(1); });
    bg.on('pointerdown', cb);
    return bg;
}

function doShare(scene, sc) {
    var url = window.location.href;
    var val = sc || 0;
    var msg = 'Dodge Master - I scored ' + val + '! Can you beat me? ' + url;
    if (navigator.share) {
        navigator.share({ title: 'Dodge Master', text: msg, url: url })
            .catch(function() { doCopy(url, scene); });
    } else {
        doCopy(url, scene);
    }
}

function doCopy(url, scene) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(function() {
            showFb(scene, 'Link copied! Paste & send \u2705');
        });
    } else {
        showFb(scene, url);
    }
}

function showFb(scene, msg) {
    var fb = scene.add.text(GW / 2, GH - 70, msg, {
        fontSize: '14px', fill: '#00ff88',
        backgroundColor: '#0a0a2e', padding: { x: 14, y: 8 }
    }).setOrigin(0.5).setDepth(300);
    scene.tweens.add({
        targets: fb, y: GH - 100, alpha: 0,
        duration: 2000, delay: 800,
        onComplete: function() { fb.destroy(); }
    });
}

/* LAUNCH */
var game = new Phaser.Game({
    type: Phaser.AUTO,
    width: GW,
    height: GH,
    backgroundColor: '#0a0a2e',
    physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
    scene: [Boot, Menu, PlayScene]
});
</script>
</body>
</html>
