<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Dodge Master</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;touch-action:none;font-family:Arial,sans-serif}
canvas{display:block}
</style>
</head>
<body>
<div id="gw"></div>
<script src="./phaser.min.js"></script>
<script>
var GW=480,GH=720;
var HK="dodgeMasterHS",RK="dodgeMasterRC";
function getBest(){try{return parseInt(localStorage.getItem(HK))||0}catch(e){return 0}}
function saveBest(s){try{localStorage.setItem(HK,s)}catch(e){}}
function getRecs(){try{return JSON.parse(localStorage.getItem(RK))||[]}catch(e){return[]}}
function addRec(s){
  try{
    var r=getRecs();
    r.push({s:s,d:Date.now()});
    r.sort(function(a,b){return b.s-a.s});
    if(r.length>5)r.length=5;
    localStorage.setItem(RK,JSON.stringify(r));
  }catch(e){}
}
var S_Boot={
  preload:function(){
    var g=this.add.graphics();
    g.fillStyle(0x00ff88);
    g.fillCircle(16,16,14);
    g.generateTexture("player",32,32);
    g.clear();
    g.fillStyle(0xff3344);
    g.fillRoundedRect(4,4,28,28,6);
    g.generateTexture("obstacle",36,36);
    g.clear();
    g.fillStyle(0xffcc00);
    g.fillCircle(12,12,10);
    g.lineStyle(2,0xff9900);
    g.strokeCircle(12,12,10);
    g.generateTexture("coin",24,24);
    g.clear();
    g.fillStyle(0xffffff);
    g.fillCircle(4,4,3);
    g.generateTexture("part",8,8);
    g.clear();
    g.destroy();
  },
  create:function(){this.scene.start("S_Menu")}
};
function mkBtn(sc,x,y,txt,col,cb){
  var bg=sc.add.graphics();
  bg.fillStyle(col);
  bg.fillRoundedRect(x-75,y-15,150,32,14);
  var t=sc.add.text(x,y,txt,{fontSize:"14px",fill:"#000",fontStyle:"bold"}).setOrigin(0.5);
  var h=sc.add.zone(x,y,150,32).setInteractive({useHandCursor:true});
  h.on("pointerover",function(){bg.clear();bg.fillStyle(0xffffff);bg.fillRoundedRect(x-75,y-15,150,32,14)});
  h.on("pointerout",function(){bg.clear();bg.fillStyle(col);bg.fillRoundedRect(x-75,y-15,150,32,14)});
  h.on("pointerdown",function(){sc.time.delayedCall(120,cb)});
}
var S_Menu={
  create:function(){
    var me=this;
    var cx=GW/2,cy=GH/2;
    for(var i=0;i<25;i++){
      var s=me.add.circle(Phaser.Math.Between(0,GW),Phaser.Math.Between(0,GH),Phaser.Math.Between(1,2),0xffffff,Phaser.Math.FloatBetween(0.12,0.45));
      me.tweens.add({targets:s,alpha:Phaser.Math.FloatBetween(0.1,0.7),duration:Phaser.Math.Between(800,2500),yoyo:true,repeat:-1,delay:Phaser.Math.Between(0,2000)});
    }
    var title=me.add.text(cx,cy-140,"DODGE\nMASTER",{fontSize:"42px",fill:"#00ff88",fontFamily:"Arial Black,Arial",fontStyle:"bold"}).setOrigin(0.5).setAlign("center");
    me.tweens.add({targets:title,scale:1.06,duration:700,yoyo:true,repeat:-1,ease:"Sine.easeInOut"});
    me.add.text(cx,cy-35,"Dodge . Collect . Survive",{fontSize:"13px",fill:"#7788aa"}).setOrigin(0.5);
    var hs=getBest();
    if(hs>0){me.add.text(cx,cy+5,"BEST: "+hs,{fontSize:"16px",fill:"#ffcc00",fontStyle:"bold"}).setOrigin(0.5)}
    mkBtn(me,cx,cy+60,"START",0x00ff88,function(){me.scene.start("S_Play")});
    mkBtn(me,cx,cy+110,"RECORDS",0xffcc00,function(){showRecs(me)});
    mkBtn(me,cx,cy+160,"SHARE",0x5588ff,function(){doShare(me)});
    me.add.text(cx,cy+215,"Drag or Arrow Keys to move",{fontSize:"11px",fill:"#445566"}).setOrigin(0.5);
  }
};
function showRecs(sc){
  var recs=getRecs();
  var overlay=sc.add.graphics();
  overlay.fillStyle(0x000000,0.88);
  overlay.fillRect(0,0,GW,GH);
  var panel=sc.add.graphics();
  panel.fillStyle(0x0a1a2e);
  panel.fillRoundedRect(GW/2-130,GH/2-170,260,340,16);
  panel.lineStyle(2,0xffcc00,1);
  panel.strokeRoundedRect(GW/2-130,GH/2-170,260,340,16);
  sc.add.text(GW/2,GH/2-140,"RECORDS",{fontSize:"20px",fill:"#ffcc00",fontStyle:"bold"}).setOrigin(0.5);
  if(recs.length===0){
    sc.add.text(GW/2,GH/2,"No records yet",{fontSize:"14px",fill:"#667788"}).setOrigin(0.5);
  }else{
    for(var i=0;i<recs.length;i++){
      var d=new Date(recs[i].d);
      var ds=(d.getMonth()+1)+"/"+d.getDate()+" "+d.getHours()+":"+(d.getMinutes()<10?"0":"")+d.getMinutes();
      sc.add.text(GW/2-90,GH/2-90+i*38,(i+1)+".  "+recs[i].s+" pts",{fontSize:"14px",fill:"#00ff88"}).setOrigin(0,0.5);
      sc.add.text(GW/2+100,GH/2-90+i*38,ds,{fontSize:"10px",fill:"#556677"}).setOrigin(1,0.5);
    }
  }
  var closeBg=sc.add.graphics();
  closeBg.fillStyle(0xff4444);
  closeBg.fillRoundedRect(GW/2-45,GH/2+140,90,32,14);
  sc.add.text(GW/2,GH/2+156,"CLOSE",{fontSize:"14px",fill:"#fff"}).setOrigin(0.5);
  var hit=sc.add.zone(GW/2,GH/2+156,90,32).setInteractive({useHandCursor:true});
  hit.on("pointerdown",function(){
    overlay.destroy();panel.destroy();closeBg.destroy();
    sc.children.each(function(c){
      if(!c||!c.text)return;
      var t=c.text;
      if(t.indexOf("RECORDS")>=0||t.indexOf("No records")>=0||t.indexOf("pts")>=0||t.indexOf("CLOSE")>=0||t.indexOf("am")>=0){
        c.destroy();
      }
    });
    hit.destroy();
  });
}
function doShare(sc){
  var s=window.location.href;
  if(navigator.share){
    navigator.share({title:"Dodge Master",text:"Can you beat my score?",url:s});
  }else{
    try{
      navigator.clipboard.writeText(s);
      var t=sc.add.text(GW/2,GH-60,"Link copied!",{fontSize:"14px",fill:"#00ff88"}).setOrigin(0.5);
      sc.time.delayedCall(2000,function(){t.destroy()});
    }catch(e){
      prompt("Copy this link:",s);
    }
  }
}
var S_Play={
  init:function(){this.score=0;this.lives=3;this.speed=80;this.level=1;this.obs=[];this.gameOver=false;this.dragX=null;this.invince=0;this.pUp=null;this.pType=null;this.pTime=0},
  create:function(){
    var me=this;
    me.physics.world.setBounds(0,0,GW,GH);
    me.player=me.physics.add.sprite(GW/2,GH-80,"player");
    me.player.setCollideWorldBounds(true);
    me.player.body.setCircle(14);
    me.scoreT=me.add.text(12,8,"SCORE: 0",{fontSize:"13px",fill:"#aabbcc"});
    me.levelT=me.add.text(GW-12,8,"Lv 1",{fontSize:"11px",fill:"#556677"}).setOrigin(1,0);
    me.livesT=me.add.text(GW/2,8,"",{fontSize:"13px",fill:"#ff4444"}).setOrigin(0.5);
    me.updateLives=function(){
      var h="";
      for(var i=0;i<me.lives;i++)h+="鈼?;
      me.livesT.setText(h);
    };
    me.updateLives();
    me.timer=me.time.addEvent({delay:1000,callback:function(){
      me.score+=1;
      me.scoreT.setText("SCORE: "+me.score);
      if(me.score>=me.level*80){me.level++;me.speed+=12;me.levelT.setText("Lv "+me.level)}
    },loop:true});
    spawnObs(me);
    me.input.on("pointermove",function(p){
      if(me.dragX!==null&&!me.gameOver){
        var dx=p.x-me.dragX;
        me.player.x+=dx*1.5;
        me.player.x=Phaser.Math.Clamp(me.player.x,16,GW-16);
      }
      me.dragX=p.x;
    });
    me.input.on("pointerdown",function(p){me.dragX=p.x});
    me.input.on("pointerup",function(){me.dragX=null});
    if(me.input.keyboard){
      me.cursorKeys=me.input.keyboard.createCursorKeys();
    }
    me.particles=me.add.particles("part");
    me.pTrail=me.particles.createEmitter({x:0,y:0,speed:0,scale:{start:0.4,end:0},lifespan:400,quantity:1,frequency:60,blendMode:"ADD",follow:me.player});
  },
  update:function(){
    if(this.gameOver)return;
    var me=this;
    if(me.cursorKeys){
      var v=0;
      if(me.cursorKeys.left.isDown)v=-1;
      if(me.cursorKeys.right.isDown)v=1;
      me.player.x+=v*me.speed*0.9;
      me.player.x=Phaser.Math.Clamp(me.player.x,16,GW-16);
    }
    if(me.invince>0){
      me.invince--;
      me.player.alpha=0.5+Math.sin(me.invince*0.4)*0.5;
    }else{
      me.player.alpha=1;
    }
    if(me.pType&&me.pTime>0){
      me.pTime--;
      if(me.pTime<=0){me.pType=null;me.speed=Math.max(80,me.speed-60);me.player.clearTint()}
    }
    for(var i=me.obs.length-1;i>=0;i--){
      var o=me.obs[i];
      if(!o.active)continue;
      if(me.player.active&&!me.invince){
        var dx=me.player.x-o.x;
        var dy=me.player.y-o.y;
        if(Math.sqrt(dx*dx+dy*dy)<26){
          if(me.pType==="shield"){
            o.destroy();
            me.obs.splice(i,1);
            continue;
          }
          me.lives--;
          me.updateLives();
          me.invince=90;
          me.cameras.main.shake(200,0.04);
          var e=me.add.particles("part");
          e.createEmitter({x:me.player.x,y:me.player.y,speed:{min:-120,max:120},scale:{start:0.6,end:0},lifespan:450,quantity:10,tint:[0xff3344,0xff8800],blendMode:"ADD"});
          setTimeout(function(em){em.destroy()},600,e);
          if(me.lives<=0){doGameOver(me)}
          return;
        }
      }
      if(o.y>GH+20){o.destroy();me.obs.splice(i,1)}
    }
    if(me.pUp&&me.player.active&&me.pUp.active){
      var dx2=me.player.x-me.pUp.x;
      var dy2=me.player.y-me.pUp.y;
      if(Math.sqrt(dx2*dx2+dy2*dy2)<24){
        if(me.pType==="shield"){me.player.clearTint()}
        me.pType=me.pUp.type;
        me.pTime=300;
        me.pUp.destroy();
        me.pUp=null;
        if(me.pType==="slow"){me.speed=Math.max(40,me.speed-60);me.player.setTint(0x4488ff)}
        if(me.pType==="shield"){me.player.setTint(0xffaa00)}
        var e2=me.add.particles("part");
        e2.createEmitter({x:me.player.x,y:me.player.y,speed:{min:-60,max:60},scale:{start:0.5,end:0},lifespan:500,quantity:8,tint:[0x00ff88,0x4488ff,0xffcc00],blendMode:"ADD"});
        setTimeout(function(em){em.destroy()},700,e2);
      }
    }
    if(me.pUp&&me.pUp.y>GH+20){me.pUp.destroy();me.pUp=null}
  }
};
function spawnObs(sc){
  if(sc.gameOver)return;
  var spacing=Math.max(600-sc.level*35,250);
  var x=Phaser.Math.Between(30,GW-30);
  var o=sc.physics.add.sprite(x,-30,"obstacle");
  o.setVelocityY(sc.speed);
  o.body.setCircle(14);
  o.body.setOffset(4,4);
  sc.obs.push(o);
  sc.time.delayedCall(spacing,function(){spawnObs(sc)});
}
function doGameOver(sc){
  sc.gameOver=true;
  sc.physics.pause();
  addRec(sc.score);
  var best=getBest();
  if(sc.score>best)saveBest(sc.score);
  var overlay=sc.add.graphics();
  overlay.fillStyle(0x000000,0.7);
  overlay.fillRect(0,0,GW,GH);
  var panel=sc.add.graphics();
  panel.fillStyle(0x0a1a2e);
  panel.fillRoundedRect(GW/2-120,GH/2-160,240,320,20);
  var col=sc.score>=best&&best>0?0xffcc00:0xff3344;
  panel.lineStyle(2,col,1);
  panel.strokeRoundedRect(GW/2-120,GH/2-160,240,320,20);
  sc.add.text(GW/2,GH/2-120,"GAME OVER",{fontSize:"22px",fill:"#ff3344",fontStyle:"bold"}).setOrigin(0.5);
  sc.add.text(GW/2,GH/2-70,"SCORE",{fontSize:"12px",fill:"#667788"}).setOrigin(0.5);
  sc.add.text(GW/2,GH/2-45,sc.score.toString(),{fontSize:"36px",fill:"#ffffff",fontStyle:"bold"}).setOrigin(0.5);
  if(sc.score>=best&&best>0){
    sc.add.text(GW/2,GH/2-10,"NEW BEST!",{fontSize:"14px",fill:"#ffcc00",fontStyle:"bold"}).setOrigin(0.5);
  }
  sc.add.text(GW/2,GH/2+20,"BEST: "+getBest(),{fontSize:"14px",fill:"#aabbcc"}).setOrigin(0.5);
  mkBtn(sc,GW/2,GH/2+80,"RETRY",0x00ff88,function(){sc.scene.restart()});
  mkBtn(sc,GW/2,GH/2+125,"MENU",0x5588ff,function(){sc.scene.start("S_Menu")});
}
var cf={
  type:"renderer",
  width:GW,
  height:GH,
  parent:"gw",
  backgroundColor:"#050510",
  scene:[S_Boot,S_Menu,S_Play],
  physics:{default:"arcade",arcade:{debug:false}}
};
if(typeof Phaser!=="undefined"){
  new Phaser.Game(cf);
}else{
  console.error("Phaser not loaded");
}
</script>
</body>
</html>
